<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">감정기복력</h1>
    <p class="sub">나는 하루 안에서 기분이 얼마나 빠르게 오르내리는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"아침부터 기분이 별로다.",
      a:[
        ["그냥 하루를 시작한다",0],
        ["조금 조용해진다",1],
        ["하루 전체가 무거워진다",2],
        ["오늘은 이미 망한 것 같다",3]
      ]
    },
    {
      q:"좋은 일이 하나 생겼다.",
      a:[
        ["기분 좋게 넘긴다",0],
        ["조금 밝아진다",1],
        ["갑자기 하루가 좋아진다",2],
        ["세상이 나를 응원하는 것 같다",3]
      ]
    },
    {
      q:"누가 무심하게 한마디 했다.",
      a:[
        ["크게 신경 안 쓴다",0],
        ["잠깐 기분이 상한다",1],
        ["한동안 마음에 남는다",2],
        ["그 말 하나로 기분이 추락한다",3]
      ]
    },
    {
      q:"배고픈데 일이 안 풀린다.",
      a:[
        ["그냥 참고 한다",0],
        ["조금 예민해진다",1],
        ["짜증이 올라온다",2],
        ["내 감정이 배터리 1%다",3]
      ]
    },
    {
      q:"기분 좋다가 갑자기 가라앉는다.",
      a:[
        ["거의 그런 적 없다",0],
        ["가끔 있다",1],
        ["꽤 자주 있다",2],
        ["내 기분은 예고 없이 방향을 튼다",3]
      ]
    },
    {
      q:"날씨가 흐리다.",
      a:[
        ["별 영향 없다",0],
        ["조금 처진다",1],
        ["기분도 같이 흐려진다",2],
        ["하늘이 내 멘탈을 조종한다",3]
      ]
    },
    {
      q:"갑자기 칭찬을 들었다.",
      a:[
        ["고맙다고 한다",0],
        ["기분이 좋아진다",1],
        ["한동안 웃음이 난다",2],
        ["방금 내 하루가 부활했다",3]
      ]
    },
    {
      q:"내 감정 변화는?",
      a:[
        ["비교적 안정적이다",0],
        ["가끔 흔들린다",1],
        ["자주 오르내린다",2],
        ["내 마음엔 롤러코스터가 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🪨",
      type:"감정 안정형",
      name:"기분이 쉽게 흔들리지 않는 사람",
      desc:"당신은 하루 중 작은 일에 크게 흔들리지 않는다. 좋은 일이 있어도 차분하고, 불편한 일이 생겨도 오래 끌려가지 않는다. 감정이 없는 게 아니라 감정의 방향키를 비교적 잘 잡고 있는 사람이다.",
      traits:["감정 변화가 크지 않음","작은 말에 덜 흔들림","기분 회복이 빠름","하루 리듬이 안정적인 편"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 출렁형",
      name:"흔들려도 금방 돌아오는 사람",
      desc:"당신은 기분이 가끔 오르내리지만 오래 머물지는 않는다. 좋은 말에 힘이 나고, 불편한 말에 잠깐 가라앉기도 한다. 그래도 감정이 하루 전체를 완전히 끌고 가는 편은 아니다.",
      traits:["기분 변화가 가끔 있음","좋은 말에 힘을 받음","나쁜 일도 금방 넘김","감정 회복력이 있는 편"]
    },
    {
      min:12,
      max:17,
      icon:"🌦️",
      type:"감정 날씨형",
      name:"하루 기분이 자주 바뀌는 사람",
      desc:"당신은 작은 일에도 기분이 꽤 쉽게 달라진다. 칭찬 한마디에 살아나고, 애매한 표정 하나에 가라앉는다. 하루가 일정한 선으로 흐르기보다 날씨처럼 맑아졌다 흐려졌다를 반복한다.",
      traits:["작은 반응에 기분이 바뀜","날씨나 컨디션 영향을 받음","좋은 일에 크게 살아남","나쁜 말이 오래 남는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🎢",
      type:"감정 롤러코스터형",
      name:"기분이 하루에도 몇 번씩 갈아타는 사람",
      desc:"당신의 감정은 조용히 머물지 않는다. 아침엔 가라앉았다가, 한마디 칭찬에 살아나고, 작은 변수에 다시 무너진다. 밖에서는 괜찮은 척해도 속에서는 이미 여러 번 날씨가 바뀐다.",
      traits:["감정 변화 폭이 큼","작은 일에도 크게 흔들림","기분이 빠르게 오르내림","컨디션에 따라 하루가 달라짐"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
