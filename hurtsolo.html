<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">혼자상처력</h1>
    <p class="sub">나는 아무 말 없이 혼자 얼마나 깊게 상처받는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대가 별뜻 없이 한 말이 계속 남는다.",
      a:[
        ["금방 넘긴다",0],
        ["조금 신경 쓰인다",1],
        ["한동안 생각난다",2],
        ["혼자 의미를 붙이며 아파한다",3]
      ]
    },
    {
      q:"단톡방에서 내 말만 반응이 적다.",
      a:[
        ["그럴 수도 있다",0],
        ["살짝 머쓱하다",1],
        ["괜히 민망해진다",2],
        ["대화방에서 조용히 사라지고 싶다",3]
      ]
    },
    {
      q:"누가 내 약점을 가볍게 말했다.",
      a:[
        ["웃고 넘긴다",0],
        ["조금 불편하다",1],
        ["속으로 오래 남는다",2],
        ["겉으론 웃고 속으론 무너진다",3]
      ]
    },
    {
      q:"친한 사람이 나를 빼고 약속을 잡았다.",
      a:[
        ["사정이 있겠지 한다",0],
        ["조금 서운하다",1],
        ["내가 불편한가 생각한다",2],
        ["혼자 관계 정리까지 간다",3]
      ]
    },
    {
      q:"상대 말투가 평소보다 차갑다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["살짝 눈치 본다",1],
        ["내가 뭘 했나 떠올린다",2],
        ["혼자 며칠 치 시나리오를 쓴다",3]
      ]
    },
    {
      q:"상처받았는데 상대는 모르는 것 같다.",
      a:[
        ["크게 상관없다",0],
        ["조금 답답하다",1],
        ["말할까 말까 고민한다",2],
        ["말 못 하고 혼자 쌓아둔다",3]
      ]
    },
    {
      q:"서운한 마음이 생겼을 때 나는?",
      a:[
        ["바로 풀거나 말한다",0],
        ["조금 지나면 괜찮다",1],
        ["혼자 오래 곱씹는다",2],
        ["겉으론 괜찮고 속으론 장례식이다",3]
      ]
    },
    {
      q:"내 상처 처리 방식은?",
      a:[
        ["빨리 털어낸다",0],
        ["조금 생각한다",1],
        ["혼자 정리하는 시간이 길다",2],
        ["아무 말 없이 깊이 들어간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"빠른 회복형",
      name:"상처보다 넘김이 빠른 사람",
      desc:"당신은 사소한 말에 오래 머물지 않는다. 불편한 일이 있어도 금방 다른 가능성을 생각하고, 마음을 빠르게 돌려놓는다. 무심한 사람이 아니라, 스스로를 오래 괴롭히지 않는 사람이다.",
      traits:["사소한 말에 오래 묶이지 않음","감정 회복이 빠름","관계를 과하게 해석하지 않음","상처를 크게 키우지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 서운형",
      name:"상처받아도 티는 덜 나는 사람",
      desc:"당신은 서운함을 느끼지만 그 감정에 완전히 끌려가지는 않는다. 말투가 차갑거나 반응이 적으면 마음이 살짝 흔들리지만, 시간이 지나면 스스로 정리하려고 한다.",
      traits:["서운함을 느끼지만 회복 가능","상대 반응에 조금 민감함","혼자 생각하는 시간이 있음","감정을 크게 드러내진 않음"]
    },
    {
      min:12,
      max:17,
      icon:"🥲",
      type:"혼자 곱씹기형",
      name:"괜찮다 하고 밤에 다시 보는 사람",
      desc:"당신은 상처를 바로 말하기보다 혼자 안고 가는 편이다. 그때는 웃고 넘겼지만, 밤이 되면 말투와 표정이 다시 떠오른다. 상대는 지나간 일인데 당신 마음속에서는 아직 대화가 끝나지 않았다.",
      traits:["겉으론 괜찮은 척함","혼자 오래 곱씹음","상대 말투에 민감함","서운함을 바로 말하기 어려움"]
    },
    {
      min:18,
      max:24,
      icon:"🫧",
      type:"무음 상처형",
      name:"아무 말 없이 마음속에 방 하나 만드는 사람",
      desc:"당신은 상처를 크게 표현하지 않지만 깊게 보관한다. 누가 봐도 괜찮아 보이는데 마음속에서는 이미 여러 장면이 반복 재생된다. 말하지 못한 서운함이 쌓이면 어느 순간 조용히 거리를 두는 타입이다.",
      traits:["상처를 말보다 침묵으로 처리함","혼자 관계를 많이 해석함","서운함이 깊게 쌓임","갑자기 거리두기를 할 수 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 혼자상처력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 혼자상처력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
