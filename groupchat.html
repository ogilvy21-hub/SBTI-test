        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">단톡방생존력</h1>
    <p class="sub">나는 단톡방에서 얼마나 자연스럽게 살아남는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"단톡방 알림이 100개 쌓였다.",
      a:[
        ["처음부터 천천히 읽는다",0],
        ["대충 흐름만 본다",1],
        ["마지막 몇 줄만 본다",2],
        ["안 읽은 척 마음의 문을 닫는다",3]
      ]
    },
    {
      q:"누가 내 이름을 불렀다.",
      a:[
        ["바로 답한다",0],
        ["조금 늦게 답한다",1],
        ["무슨 일인지 먼저 눈치 본다",2],
        ["내 이름이 아닌 척하고 싶다",3]
      ]
    },
    {
      q:"단톡방에서 갑자기 약속을 잡는다.",
      a:[
        ["바로 가능 여부를 말한다",0],
        ["일정을 확인해본다",1],
        ["일단 조용히 지켜본다",2],
        ["누가 나 대신 거절해주길 바란다",3]
      ]
    },
    {
      q:"대화가 너무 빨리 올라간다.",
      a:[
        ["열심히 따라간다",0],
        ["중요한 말만 챙긴다",1],
        ["이모티콘으로 생존한다",2],
        ["이미 대화권 밖으로 밀려났다",3]
      ]
    },
    {
      q:"갑자기 의견을 물어본다.",
      a:[
        ["내 생각을 말한다",0],
        ["무난한 쪽으로 답한다",1],
        ["다들 좋은 것 같다고 한다",2],
        ["나는 투명 인간이 되고 싶다",3]
      ]
    },
    {
      q:"단톡방 분위기가 어색해졌다.",
      a:[
        ["먼저 풀어본다",0],
        ["가벼운 말을 던진다",1],
        ["이모티콘 하나 보낸다",2],
        ["숨을 참고 화면을 닫는다",3]
      ]
    },
    {
      q:"내가 보낸 말 뒤로 조용해졌다.",
      a:[
        ["별생각 없다",0],
        ["조금 신경 쓰인다",1],
        ["내 말을 다시 읽어본다",2],
        ["방금 단톡방을 망친 것 같다",3]
      ]
    },
    {
      q:"내 단톡방 생존 방식은?",
      a:[
        ["대화에 잘 참여한다",0],
        ["필요할 때만 말한다",1],
        ["읽고 조용히 있는 편이다",2],
        ["단톡방에서는 거의 멸종위기종이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"💬",
      type:"대화 주도형",
      name:"단톡방에서도 존재감 확실한 사람",
      desc:"당신은 단톡방에서 크게 밀리지 않는다. 대화가 빨라도 잘 따라가고, 필요한 말도 바로 한다. 누가 의견을 물어보면 숨지 않고 답한다. 단톡방이 피곤할 때도 있지만, 적어도 그 안에서 사라지지는 않는다.",
      traits:["답장이 빠른 편","대화 참여가 자연스러움","의견을 잘 말함","단톡방 분위기에 잘 적응함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"무난 생존형",
      name:"말할 때만 등장하는 단톡방 주민",
      desc:"당신은 단톡방에서 과하게 나서지는 않지만 필요할 때는 등장한다. 대화 전체를 다 따라가진 않아도 중요한 내용은 챙긴다. 적당히 말하고 적당히 빠지는 거리 조절을 꽤 잘하는 사람이다.",
      traits:["필요한 말은 함","대화 흐름을 대충 파악함","무난한 답변을 잘함","단톡방 피로를 조절함"]
    },
    {
      min:12,
      max:17,
      icon:"👀",
      type:"읽기 전문형",
      name:"읽고 있지만 없는 척하는 사람",
      desc:"당신은 단톡방을 보고는 있지만 쉽게 끼어들지 않는다. 분위기를 살피고, 타이밍을 재고, 괜히 말이 튈까 봐 조용히 있는 시간이 많다. 그래도 중요한 순간에는 이모티콘 하나로 생존 신고를 한다.",
      traits:["읽기는 자주 함","말할 타이밍을 많이 봄","이모티콘 사용률이 높음","대화 참여보다 관찰이 편함"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"단톡방 유령형",
      name:"초대됐지만 영혼은 나간 사람",
      desc:"당신은 단톡방에서 조용히 사라지는 쪽에 가깝다. 알림이 쌓이면 더 보기 싫고, 이름이 불리면 잠깐 심장이 내려앉는다. 나가기엔 애매하고, 있기엔 피곤한 방에서 오늘도 조용히 생존 중이다.",
      traits:["알림이 쌓이면 외면함","이름 불리면 부담스러움","대화 참여가 피곤함","단톡방에서 존재감이 희미함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
