        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">프로미루기력</h1>
    <p class="sub">나는 일을 얼마나 예쁘게 미루는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"해야 할 일이 눈앞에 있다.",
      a:[
        ["바로 시작한다",0],
        ["조금 준비하고 시작한다",1],
        ["일단 마음의 준비를 한다",2],
        ["시작하기 전 청소부터 한다",3]
      ]
    },
    {
      q:"마감이 아직 며칠 남았다.",
      a:[
        ["미리 해둔다",0],
        ["조금씩 한다",1],
        ["내일의 나를 믿는다",2],
        ["마감 전날의 나는 천재다",3]
      ]
    },
    {
      q:"일을 시작하려고 앉았다.",
      a:[
        ["그대로 시작한다",0],
        ["자료를 먼저 본다",1],
        ["커피가 필요해진다",2],
        ["책상 정리 없이는 시작할 수 없다",3]
      ]
    },
    {
      q:"중요한 연락을 해야 한다.",
      a:[
        ["바로 한다",0],
        ["조금 생각하고 한다",1],
        ["문장을 계속 고친다",2],
        ["보내기 전 하루가 지난다",3]
      ]
    },
    {
      q:"해야 할 일을 미룬 뒤 내 마음은?",
      a:[
        ["찝찝해서 바로 한다",0],
        ["조금 신경 쓰인다",1],
        ["아직 괜찮다고 생각한다",2],
        ["오히려 여유로운 척한다",3]
      ]
    },
    {
      q:"마감이 코앞으로 다가왔다.",
      a:[
        ["이미 끝났다",0],
        ["대부분 끝냈다",1],
        ["그때부터 속도가 난다",2],
        ["심장이 일을 대신 시작한다",3]
      ]
    },
    {
      q:"할 일을 적어둔 목록을 봤다.",
      a:[
        ["하나씩 처리한다",0],
        ["쉬운 것부터 한다",1],
        ["목록을 다시 예쁘게 정리한다",2],
        ["정리한 것만으로 뿌듯하다",3]
      ]
    },
    {
      q:"내 미루기 스타일은?",
      a:[
        ["거의 안 미룬다",0],
        ["가끔 미룬다",1],
        ["자주 미루지만 결국 한다",2],
        ["미루는 과정에도 나름의 미학이 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"✅",
      type:"즉시 실행형",
      name:"생각보다 손이 먼저 가는 사람",
      desc:"당신은 일을 오래 묵혀두지 않는다. 해야 할 일이 보이면 일단 시작하고, 마음의 부담이 커지기 전에 처리한다. 남들이 보기엔 부지런한 사람이고, 본인 입장에서는 미뤄두는 불편함이 더 싫은 사람이다.",
      traits:["일을 빨리 시작함","마감 전에 마음이 편함","할 일을 오래 쌓아두지 않음","미루는 불편함을 싫어함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"적당한 미루기형",
      name:"미루긴 해도 선은 지키는 사람",
      desc:"당신은 가끔 미루지만 완전히 놓아버리지는 않는다. 조금 쉬고, 조금 딴짓하고, 다시 돌아와서 처리한다. 마감 앞에서 살짝 긴장하긴 해도 결국 자기 몫은 해내는 현실적인 타입이다.",
      traits:["가끔 미루지만 회복 가능","쉬운 일부터 처리함","마감 감각은 있는 편","결국 해야 할 일은 해냄"]
    },
    {
      min:12,
      max:17,
      icon:"🫠",
      type:"마감 점화형",
      name:"발등에 불 붙어야 재능 나오는 사람",
      desc:"당신은 시간이 넉넉할 때보다 마감이 가까워질수록 집중력이 올라간다. 평소에는 준비, 정리, 고민으로 시간을 보내다가 급해지는 순간 갑자기 속도가 붙는다. 문제는 그 속도가 매번 심장을 데리고 온다는 점이다.",
      traits:["마감 직전에 집중력 상승","시작 전 준비 시간이 김","딴짓을 준비 과정처럼 씀","급해져야 손이 빨라짐"]
    },
    {
      min:18,
      max:24,
      icon:"⏳",
      type:"프로 미루기형",
      name:"내일의 나를 과신하는 사람",
      desc:"당신은 미루기를 거의 하나의 기술처럼 다룬다. 지금 안 해도 될 이유를 빠르게 찾고, 해야 할 일을 앞에 두고도 다른 일을 멋지게 해낸다. 마감 전날의 나를 믿지만, 정작 그날의 나는 매번 울면서 등장한다.",
      traits:["내일의 나를 자주 믿음","할 일 앞에서 다른 일이 갑자기 중요해짐","마감 직전 폭발력이 있음","미루는 동안 마음은 계속 찔림"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 프로미루기력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 프로미루기력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
