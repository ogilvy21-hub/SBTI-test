<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">인생귀찮력</h1>
    <p class="sub">나는 일상 전체를 얼마나 귀찮아하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"아침에 일어나야 한다.",
      a:[
        ["바로 일어난다",0],
        ["조금 더 누워 있는다",1],
        ["알람을 몇 번 끈다",2],
        ["인생이 너무 이르다",3]
      ]
    },
    {
      q:"씻어야 하는데 몸이 무겁다.",
      a:[
        ["바로 씻는다",0],
        ["조금 미룬다",1],
        ["한참 누워 있다 간다",2],
        ["씻는 것도 프로젝트 같다",3]
      ]
    },
    {
      q:"밥을 챙겨 먹어야 한다.",
      a:[
        ["제대로 챙겨 먹는다",0],
        ["간단히 먹는다",1],
        ["대충 때운다",2],
        ["씹는 것도 귀찮다",3]
      ]
    },
    {
      q:"밖에 나갈 일이 생겼다.",
      a:[
        ["준비하고 나간다",0],
        ["조금 귀찮지만 나간다",1],
        ["취소할 방법을 생각한다",2],
        ["현관문이 너무 멀다",3]
      ]
    },
    {
      q:"할 일이 하나 생겼다.",
      a:[
        ["바로 처리한다",0],
        ["쉬운 것부터 한다",1],
        ["미뤄둔다",2],
        ["생긴 순간부터 피곤하다",3]
      ]
    },
    {
      q:"누가 만나자고 한다.",
      a:[
        ["좋으면 바로 약속 잡는다",0],
        ["일정을 본다",1],
        ["나가기 귀찮아서 고민한다",2],
        ["마음은 반갑지만 몸은 거절했다",3]
      ]
    },
    {
      q:"방 정리를 해야 한다.",
      a:[
        ["바로 정리한다",0],
        ["보이는 곳만 한다",1],
        ["조금 더 미룬다",2],
        ["어지러운 것도 인테리어다",3]
      ]
    },
    {
      q:"내 귀찮음 스타일은?",
      a:[
        ["해야 할 건 한다",0],
        ["가끔 귀찮아한다",1],
        ["자주 미룬다",2],
        ["인생 전체가 로딩 중이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🏃",
      type:"즉시 실행형",
      name:"귀찮아도 움직이는 사람",
      desc:"당신은 귀찮음을 오래 끌고 가지 않는다. 해야 할 일이 있으면 일단 움직이고, 미루는 시간보다 처리하는 시간이 낫다고 생각한다. 귀찮지 않은 사람은 아니지만 귀찮음에게 주도권을 쉽게 넘기지 않는다.",
      traits:["해야 할 일을 바로 처리함","생활 리듬이 비교적 안정적임","미루는 시간이 짧음","귀찮아도 몸을 움직임"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"생활 귀찮형",
      name:"귀찮지만 어떻게든 하는 사람",
      desc:"당신은 자주 귀찮아하지만 결국 할 건 한다. 준비가 늦고 시작이 느릴 때는 있어도, 완전히 놓아버리지는 않는다. 침대와 현실 사이에서 잠깐 갈등하다가 결국 현실 쪽으로 걸어 나오는 사람이다.",
      traits:["시작이 조금 느림","그래도 마무리는 하는 편","외출 전 귀찮음이 있음","생활은 대체로 유지함"]
    },
    {
      min:12,
      max:17,
      icon:"🛋️",
      type:"상시 로딩형",
      name:"시작 버튼이 잘 안 눌리는 사람",
      desc:"당신은 무언가를 시작하기까지 시간이 오래 걸린다. 씻기, 밥 먹기, 답장하기, 정리하기까지 다 마음의 준비가 필요하다. 할 수는 있지만 시작 전까지 몸과 마음이 계속 로딩 중이다.",
      traits:["할 일을 자주 미룸","시작까지 시간이 오래 걸림","외출 준비가 부담스러움","작은 일도 크게 느껴짐"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"인생 절전형",
      name:"숨 쉬는 것도 가끔 귀찮은 사람",
      desc:"당신에게 일상은 생각보다 많은 에너지를 요구한다. 씻기, 먹기, 나가기, 답장하기, 정리하기가 전부 작은 산처럼 느껴질 때가 있다. 움직이기 싫은 게으름이라기보다 세상이 자꾸 너무 많은 버튼을 누르게 하는 느낌이다.",
      traits:["기본 생활도 자주 귀찮음","침대 체류 시간이 김","외출 약속이 부담스러움","미루는 일이 일상적임"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
