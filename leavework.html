        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">퇴근집착력</h1>
    <p class="sub">나는 퇴근 시간을 얼마나 간절하게 기다리는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"출근하자마자 시계를 봤다.",
      a:[
        ["그냥 시간 확인이다",0],
        ["가끔 본다",1],
        ["퇴근까지 몇 시간인지 계산한다",2],
        ["이미 마음은 퇴근길이다",3]
      ]
    },
    {
      q:"오후 5시가 가까워졌다.",
      a:[
        ["하던 일을 계속한다",0],
        ["슬슬 정리한다",1],
        ["오늘 할 일 범위를 줄인다",2],
        ["내 영혼이 가방을 챙긴다",3]
      ]
    },
    {
      q:"퇴근 10분 전 일이 생겼다.",
      a:[
        ["필요하면 처리한다",0],
        ["조금 당황한다",1],
        ["내일 해도 되는지 본다",2],
        ["지금 이건 인간적으로 아니다",3]
      ]
    },
    {
      q:"상사가 퇴근 직전 말을 건다.",
      a:[
        ["차분히 듣는다",0],
        ["짧게 끝나길 바란다",1],
        ["속으로 시간을 본다",2],
        ["그 순간 모든 행복이 멈춘다",3]
      ]
    },
    {
      q:"퇴근 후 계획이 있다.",
      a:[
        ["있으면 좋은 정도다",0],
        ["조금 기대된다",1],
        ["그 생각으로 버틴다",2],
        ["오늘 회사는 그 계획의 프롤로그다",3]
      ]
    },
    {
      q:"야근 가능성이 생겼다.",
      a:[
        ["상황을 본다",0],
        ["기분이 조금 가라앉는다",1],
        ["급격히 예민해진다",2],
        ["내 하루가 강제로 압수된 느낌이다",3]
      ]
    },
    {
      q:"퇴근 버튼을 찍는 순간 나는?",
      a:[
        ["그냥 나간다",0],
        ["조금 홀가분하다",1],
        ["기분이 확 좋아진다",2],
        ["그 순간부터 진짜 인생 시작이다",3]
      ]
    },
    {
      q:"내 퇴근 집착은?",
      a:[
        ["크지 않다",0],
        ["가끔 기다린다",1],
        ["매일 꽤 기다린다",2],
        ["퇴근은 하루의 유일한 빛이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"💼",
      type:"업무 집중형",
      name:"퇴근보다 일을 먼저 보는 사람",
      desc:"당신은 퇴근을 기다리긴 하지만 거기에 하루 전체를 걸지는 않는다. 일이 남아 있으면 처리하고, 시간이 되면 정리한다. 회사가 좋다기보다 해야 할 것과 끝낼 것을 비교적 분리해서 보는 사람이다.",
      traits:["퇴근 시간에 크게 흔들리지 않음","업무 마무리를 중요하게 봄","야근 가능성에도 비교적 침착함","시간보다 일의 상태를 먼저 봄"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"정상 퇴근희망형",
      name:"퇴근은 좋지만 티는 덜 내는 사람",
      desc:"당신은 퇴근이 가까워지면 기분이 좋아진다. 그래도 해야 할 일은 어느 정도 챙긴다. 퇴근을 기다리는 마음은 있지만, 너무 노골적으로 시계를 보는 편은 아니다.",
      traits:["퇴근 시간이 가까우면 힘이 남","슬슬 정리를 시작함","야근은 싫지만 버틸 수 있음","퇴근 후 계획을 소중히 여김"]
    },
    {
      min:12,
      max:17,
      icon:"⌚",
      type:"퇴근 카운트형",
      name:"오후부터 시계와 대화하는 사람",
      desc:"당신은 퇴근 시간이 가까워질수록 집중력이 회사 밖으로 이동한다. 5시 이후 들어오는 일에는 예민해지고, 퇴근 후 계획이 오늘의 진짜 목적처럼 느껴진다. 마음속에는 늘 남은 시간이 표시된다.",
      traits:["퇴근 시간을 자주 계산함","퇴근 직전 업무에 민감함","오후부터 에너지가 달라짐","퇴근 후 시간이 중요함"]
    },
    {
      min:18,
      max:24,
      icon:"🚪",
      type:"퇴근 숭배형",
      name:"퇴근해야 비로소 살아나는 사람",
      desc:"당신에게 퇴근은 단순한 업무 종료가 아니다. 하루를 되찾는 순간이다. 퇴근 직전 일이 생기면 마음이 무너지고, 퇴근 버튼을 찍는 순간 세상이 다시 선명해진다. 몸은 회사에 있어도 영혼은 늘 출입구 근처에 있다.",
      traits:["퇴근만 바라보고 버팀","퇴근 직전 업무를 매우 싫어함","야근 가능성에 크게 흔들림","퇴근 후 시간을 진짜 하루로 느낌"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
