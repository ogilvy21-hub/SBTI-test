        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">충동구매력</h1>
    <p class="sub">나는 마음에 꽂힌 물건을 얼마나 빠르게 결제하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"우연히 예쁜 물건을 봤다.",
      a:[
        ["그냥 구경만 한다",0],
        ["가격부터 확인한다",1],
        ["장바구니에 넣어둔다",2],
        ["이미 결제창까지 갔다",3]
      ]
    },
    {
      q:"오늘만 특가 문구가 떴다.",
      a:[
        ["필요 없으면 넘긴다",0],
        ["살짝 고민한다",1],
        ["후기를 찾아본다",2],
        ["오늘만이라면 오늘 사야 한다",3]
      ]
    },
    {
      q:"SNS에서 누가 쓰는 걸 봤다.",
      a:[
        ["별생각 없다",0],
        ["조금 궁금해진다",1],
        ["검색해본다",2],
        ["내 손에도 있어야 할 것 같다",3]
      ]
    },
    {
      q:"장바구니에 넣어둔 물건이 있다.",
      a:[
        ["며칠 더 고민한다",0],
        ["가격 변화를 본다",1],
        ["곧 살 것 같다",2],
        ["장바구니는 사실 대기실이다",3]
      ]
    },
    {
      q:"스트레스 받은 날 쇼핑앱을 켰다.",
      a:[
        ["보기만 한다",0],
        ["필요한 것만 본다",1],
        ["작은 걸 하나 산다",2],
        ["내 감정이 결제 버튼을 눌렀다",3]
      ]
    },
    {
      q:"배송비가 아깝다.",
      a:[
        ["그냥 안 산다",0],
        ["필요한 것만 산다",1],
        ["하나 더 담는다",2],
        ["무료배송 금액은 채우라고 있는 거다",3]
      ]
    },
    {
      q:"결제 후 마음은?",
      a:[
        ["필요한 걸 사서 괜찮다",0],
        ["조금 설렌다",1],
        ["기분이 확 좋아진다",2],
        ["택배 오기 전까지 삶의 낙이 생긴다",3]
      ]
    },
    {
      q:"내 충동구매 스타일은?",
      a:[
        ["거의 안 한다",0],
        ["가끔 흔들린다",1],
        ["꽤 자주 산다",2],
        ["꽂히면 손가락이 먼저 움직인다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🧘",
      type:"결제 신중형",
      name:"장바구니 앞에서도 침착한 사람",
      desc:"당신은 마음에 드는 물건을 봐도 쉽게 흔들리지 않는다. 필요한지, 가격은 괜찮은지, 오래 쓸 수 있는지 먼저 생각한다. 사고 싶은 마음보다 멈추는 힘이 조금 더 강한 사람이다.",
      traits:["충동구매가 적음","결제 전 고민이 김","필요성을 먼저 봄","할인 문구에 쉽게 안 흔들림"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가끔 흔들림형",
      name:"살까 말까 하다가 겨우 참는 사람",
      desc:"당신은 쇼핑 앞에서 완전히 무너지지는 않는다. 예쁜 물건이나 할인 문구에 마음이 흔들리지만, 그래도 한 번쯤 멈춰 생각한다. 가끔은 참지만, 가끔은 나에게 선물이라는 말에 넘어간다.",
      traits:["할인에 조금 약함","장바구니를 자주 봄","가끔 보상 소비를 함","결제 전 고민은 하는 편"]
    },
    {
      min:12,
      max:17,
      icon:"🛒",
      type:"장바구니 점화형",
      name:"넣어두면 결국 사는 사람",
      desc:"당신은 마음에 들어온 물건을 오래 잊지 못한다. 처음엔 장바구니에만 넣어둔다고 생각하지만, 어느새 후기와 가격을 확인하고 있다. 결제까지 시간이 걸릴 뿐, 마음은 이미 많이 기울어 있다.",
      traits:["장바구니가 자주 찜 목록이 됨","후기 검색을 많이 함","보상 소비에 약함","마음에 꽂히면 오래 생각함"]
    },
    {
      min:18,
      max:24,
      icon:"⚡",
      type:"즉시 결제형",
      name:"꽂히면 택배부터 상상하는 사람",
      desc:"당신은 마음에 꽂히는 순간 결제 속도가 빨라진다. 할인, 후기, 무료배송, 감정 보상까지 이유는 충분하다. 문제는 결제하고 나서야 내가 뭘 샀는지 천천히 깨닫는 날도 있다는 것이다.",
      traits:["결정과 결제가 빠름","오늘만 특가에 약함","감정 소비가 잦음","택배 기다리는 시간이 즐거움"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
