<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">리액션과잉력</h1>
    <p class="sub">나는 사람들 앞에서 반응을 얼마나 크게 해주는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"친구가 별거 아닌 얘기를 한다.",
      a:[
        ["조용히 듣는다",0],
        ["적당히 맞장구친다",1],
        ["꽤 크게 반응한다",2],
        ["내가 더 신나서 이야기를 살린다",3]
      ]
    },
    {
      q:"누가 새 옷을 입고 왔다.",
      a:[
        ["괜찮다고 말한다",0],
        ["잘 어울린다고 한다",1],
        ["오 오늘 좋은데 한다",2],
        ["거의 스타일리스트처럼 칭찬한다",3]
      ]
    },
    {
      q:"상대가 웃긴 얘기를 했다.",
      a:[
        ["미소 짓는다",0],
        ["가볍게 웃는다",1],
        ["크게 웃는다",2],
        ["내 웃음소리가 분위기를 장악한다",3]
      ]
    },
    {
      q:"누가 힘든 일을 털어놨다.",
      a:[
        ["차분히 들어준다",0],
        ["공감하며 듣는다",1],
        ["같이 속상해한다",2],
        ["내가 더 화나서 대신 분노한다",3]
      ]
    },
    {
      q:"단톡방에 좋은 소식이 올라왔다.",
      a:[
        ["축하한다고 한다",0],
        ["이모티콘을 보낸다",1],
        ["말과 이모티콘을 같이 보낸다",2],
        ["축하 퍼레이드를 열어준다",3]
      ]
    },
    {
      q:"처음 만난 사람이 말을 건다.",
      a:[
        ["필요한 만큼 답한다",0],
        ["무난하게 웃으며 말한다",1],
        ["분위기를 맞춰준다",2],
        ["어색함을 못 참고 진행자가 된다",3]
      ]
    },
    {
      q:"누가 내 반응을 기대하는 눈치다.",
      a:[
        ["그냥 자연스럽게 반응한다",0],
        ["조금 더 웃어준다",1],
        ["상대가 민망하지 않게 크게 반응한다",2],
        ["반응 서비스 정신이 자동으로 켜진다",3]
      ]
    },
    {
      q:"내 리액션 스타일은?",
      a:[
        ["담백한 편",0],
        ["적당히 하는 편",1],
        ["꽤 크게 하는 편",2],
        ["내 리액션이 거의 방송용이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😐",
      type:"담백 반응형",
      name:"리액션보다 진심이 조용한 사람",
      desc:"당신은 반응을 크게 꾸미는 편은 아니다. 웃기면 웃고, 좋으면 좋다고 말하지만 과하게 표현하지 않는다. 차가워 보일 때도 있지만, 사실은 마음보다 얼굴이 덜 움직이는 쪽에 가깝다.",
      traits:["반응이 담백함","과한 표현을 잘 안 함","조용히 듣는 편","진심을 크게 포장하지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"적당 맞장구형",
      name:"필요한 만큼 분위기를 맞추는 사람",
      desc:"당신은 상대가 민망하지 않을 정도로 반응을 잘 해준다. 억지로 분위기를 띄우진 않지만, 대화가 끊기지 않게 맞장구를 친다. 리액션이 과하진 않아도 같이 있으면 편한 사람이다.",
      traits:["맞장구를 잘 침","상대 말을 잘 들어줌","표현이 과하지 않음","대화 분위기를 무난하게 유지함"]
    },
    {
      min:12,
      max:17,
      icon:"👏",
      type:"분위기 살림형",
      name:"상대 말에 조명을 켜주는 사람",
      desc:"당신은 사람들의 말을 그냥 흘려보내지 않는다. 웃긴 말엔 크게 웃고, 좋은 일엔 진심으로 축하하고, 힘든 일엔 같이 감정을 실어준다. 덕분에 주변 사람들은 내 얘기가 살아나는 느낌을 받는다.",
      traits:["반응이 풍부함","칭찬과 공감을 잘함","분위기를 잘 살림","상대가 말하기 편해짐"]
    },
    {
      min:18,
      max:24,
      icon:"🎤",
      type:"리액션 방송형",
      name:"대화에 효과음 넣고 사는 사람",
      desc:"당신의 리액션은 조용히 지나가지 않는다. 누가 말하면 표정, 목소리, 몸짓이 함께 움직인다. 상대는 민망할 틈이 없고, 분위기는 금방 살아난다. 가끔은 내가 말한 사람보다 더 신나 있는 순간도 있다.",
      traits:["리액션이 크고 빠름","분위기 전환을 잘함","감정 표현이 풍부함","대화에서 존재감이 큼"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
