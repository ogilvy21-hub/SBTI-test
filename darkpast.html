        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">흑역사력</h1>
    <p class="sub">나는 과거의 나에게 얼마나 자주 고통받는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"갑자기 예전 말실수가 떠올랐다.",
      a:[
        ["금방 잊는다",0],
        ["잠깐 민망하다",1],
        ["한동안 생각난다",2],
        ["이불 속에서 조용히 사라지고 싶다",3]
      ]
    },
    {
      q:"예전 사진을 발견했다.",
      a:[
        ["그땐 그랬지 한다",0],
        ["조금 웃기다",1],
        ["왜 저랬지 싶다",2],
        ["당장 삭제하고 싶다",3]
      ]
    },
    {
      q:"친구가 옛날 이야기를 꺼냈다.",
      a:[
        ["편하게 듣는다",0],
        ["살짝 긴장한다",1],
        ["주제를 바꾸고 싶다",2],
        ["그 기억은 우리 사이에서 봉인해야 한다",3]
      ]
    },
    {
      q:"잠들기 직전 갑자기 과거가 온다.",
      a:[
        ["거의 없다",0],
        ["가끔 온다",1],
        ["꽤 자주 온다",2],
        ["밤마다 과거의 내가 출근한다",3]
      ]
    },
    {
      q:"예전에 보낸 메시지를 다시 봤다.",
      a:[
        ["별생각 없다",0],
        ["조금 어색하다",1],
        ["내 문체가 낯설다",2],
        ["누가 내 손가락을 조종했나 싶다",3]
      ]
    },
    {
      q:"사람들이 내 옛날 모습을 기억한다.",
      a:[
        ["괜찮다",0],
        ["조금 부끄럽다",1],
        ["괜히 신경 쓰인다",2],
        ["제발 업데이트된 나만 기억해줬으면 한다",3]
      ]
    },
    {
      q:"실수했던 장소를 다시 지나간다.",
      a:[
        ["그냥 지나간다",0],
        ["살짝 생각난다",1],
        ["그때 장면이 재생된다",2],
        ["그 공간만 아직도 나를 알아보는 것 같다",3]
      ]
    },
    {
      q:"내 흑역사에 대한 마음은?",
      a:[
        ["그냥 추억이다",0],
        ["웃을 수는 있다",1],
        ["웃기긴 한데 아프다",2],
        ["나만의 비공개 다큐멘터리다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"기억 정리형",
      name:"과거랑 적당히 화해한 사람",
      desc:"당신은 흑역사에 크게 끌려다니지 않는다. 예전의 나를 떠올려도 오래 부끄러워하지 않고, 그 시절의 실수도 지나간 장면으로 남긴다. 가끔 민망하긴 해도 현재의 나를 더 크게 믿는 편이다.",
      traits:["과거를 오래 붙잡지 않음","민망함 회복이 빠름","추억과 흑역사를 구분함","현재의 나를 더 믿음"]
    },
    {
      min:6,
      max:11,
      icon:"😅",
      type:"가벼운 이불킥형",
      name:"가끔 과거에게 찔리는 사람",
      desc:"당신은 흑역사가 아예 없진 않다. 갑자기 떠오르는 말실수나 사진 한 장에 잠깐 멈칫하지만, 그래도 금방 일상으로 돌아온다. 부끄럽지만 웃을 수 있는 정도의 흑역사를 품고 사는 타입이다.",
      traits:["가끔 혼자 민망해짐","옛날 사진에 약함","이불킥 후 회복 가능","웃으면서 넘기려 노력함"]
    },
    {
      min:12,
      max:17,
      icon:"🫠",
      type:"과거 재생형",
      name:"밤마다 과거의 나한테 혼나는 사람",
      desc:"당신의 흑역사는 조용히 있다가 꼭 잠들기 직전에 찾아온다. 예전 말투, 표정, 메시지 하나까지 선명하게 살아나서 마음을 두드린다. 남들은 잊었을 일을 당신만 고화질로 보관하고 있다.",
      traits:["잠들기 전 과거 재생 잦음","혼자 갑자기 민망해짐","남들은 잊은 일을 혼자 기억함","옛날 내 모습에 엄격함"]
    },
    {
      min:18,
      max:24,
      icon:"💀",
      type:"흑역사 박물관형",
      name:"과거의 나를 아직 고소하고 싶은 사람",
      desc:"당신의 머릿속에는 흑역사 전용 보관함이 있다. 사소한 말실수도 장편 영화처럼 남고, 오래된 사진 한 장도 멘탈을 흔든다. 하지만 그만큼 당신은 지금의 나를 더 잘 만들고 싶은 사람이다.",
      traits:["흑역사 저장력이 강함","옛날 기억이 너무 생생함","혼자 부끄러움에 깊게 빠짐","현재의 나를 더 엄격하게 관리함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
