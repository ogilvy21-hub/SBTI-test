        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">미련력</h1>
    <p class="sub">나는 지나간 사람과 순간을 얼마나 오래 붙잡는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"끝난 일을 자꾸 떠올린다.",
      a:[
        ["거의 안 떠올린다",0],
        ["가끔 생각난다",1],
        ["꽤 오래 생각한다",2],
        ["머릿속에서 시즌2까지 나온다",3]
      ]
    },
    {
      q:"예전 대화방을 다시 본다.",
      a:[
        ["안 본다",0],
        ["가끔 훑어본다",1],
        ["기분 이상할 때 찾아본다",2],
        ["대화방이 거의 박물관이다",3]
      ]
    },
    {
      q:"좋았던 순간이 생각났다.",
      a:[
        ["좋았지 하고 넘긴다",0],
        ["잠깐 미소 짓는다",1],
        ["그때로 돌아가고 싶다",2],
        ["갑자기 마음속 재개봉이다",3]
      ]
    },
    {
      q:"끝난 관계의 SNS를 보게 됐다.",
      a:[
        ["안 본다",0],
        ["우연히 보면 넘긴다",1],
        ["가끔 찾아본다",2],
        ["알고리즘보다 내가 더 빠르다",3]
      ]
    },
    {
      q:"물건 하나에 추억이 남아 있다.",
      a:[
        ["필요 없으면 버린다",0],
        ["조금 고민한다",1],
        ["쉽게 못 버린다",2],
        ["그 물건은 이미 유물이다",3]
      ]
    },
    {
      q:"그때 다른 선택을 했다면?",
      a:[
        ["크게 생각 안 한다",0],
        ["한 번쯤 상상한다",1],
        ["자주 되짚어본다",2],
        ["내 머릿속엔 평행우주가 있다",3]
      ]
    },
    {
      q:"마음이 끝났는지 확인하는 법은?",
      a:[
        ["생각 안 나면 끝이다",0],
        ["생각나도 괜찮으면 끝이다",1],
        ["아직 신경 쓰이면 끝이 아니다",2],
        ["끝났다고 말하면서 계속 본다",3]
      ]
    },
    {
      q:"내 미련 스타일은?",
      a:[
        ["정리 빠른 편",0],
        ["가끔 남는 편",1],
        ["꽤 오래 남는 편",2],
        ["마음속에 임대 계약이 길다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🍃",
      type:"정리 빠른형",
      name:"끝난 건 비교적 잘 보내는 사람",
      desc:"당신은 지나간 일에 오래 머물지 않는다. 좋았던 순간도 있었고 아쉬운 일도 있었지만, 끝난 것은 끝난 것으로 받아들이는 편이다. 차갑다기보다 마음의 방을 오래 비워두지 않는 사람이다.",
      traits:["과거에 오래 머물지 않음","정리가 비교적 빠름","추억과 현재를 잘 구분함","끝난 관계를 붙잡지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가끔 회상형",
      name:"생각나도 다시 살아가는 사람",
      desc:"당신은 가끔 지나간 일을 떠올린다. 예전 대화, 좋았던 날, 아쉬운 선택이 문득 생각날 때가 있다. 그래도 그 기억이 현재를 완전히 붙잡지는 않는다. 잠깐 흔들려도 다시 오늘로 돌아오는 사람이다.",
      traits:["가끔 추억을 떠올림","아쉬움은 있지만 오래 잠기지 않음","현재로 돌아오는 힘이 있음","감정 정리가 느리진 않음"]
    },
    {
      min:12,
      max:17,
      icon:"🌙",
      type:"잔상 보관형",
      name:"끝난 장면을 자꾸 되감는 사람",
      desc:"당신은 마음에 남은 장면을 쉽게 지우지 못한다. 지나간 말 한마디, 표정 하나, 그날의 분위기까지 자주 떠올린다. 이미 끝났다는 걸 알아도 마음 한쪽에서는 아직 엔딩 크레딧이 내려가지 않았다.",
      traits:["지난 대화를 자주 떠올림","물건과 장소에 추억이 오래 남음","끝난 관계도 신경 쓰임","상상을 통해 과거를 되감음"]
    },
    {
      min:18,
      max:24,
      icon:"📼",
      type:"추억 재개봉형",
      name:"마음속에서 아직 상영 중인 사람",
      desc:"당신에게 과거는 지나간 장면이 아니라 아직 재생 중인 영화에 가깝다. 끝난 관계도, 놓친 순간도, 하지 못한 말도 마음속에서 계속 다른 버전으로 이어진다. 밖에서는 괜찮은 척하지만 안에서는 아직 상영관 불이 꺼지지 않았다.",
      traits:["과거 장면을 오래 붙잡음","끝난 관계의 흔적을 자주 봄","후회와 상상이 길어짐","추억을 쉽게 버리지 못함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
