<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">답장미루기력</h1>
    <p class="sub">나는 답장을 얼마나 자연스럽게 미루는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"카톡 알림이 떴다.",
      a:[
        ["바로 답장한다",0],
        ["조금 있다 한다",1],
        ["읽기 전에 마음의 준비를 한다",2],
        ["일단 알림창에서만 본다",3]
      ]
    },
    {
      q:"답장을 해야 하는데 말이 안 떠오른다.",
      a:[
        ["짧게라도 보낸다",0],
        ["조금 고민하고 보낸다",1],
        ["문장 생각하다 시간이 간다",2],
        ["생각만 하다가 하루가 간다",3]
      ]
    },
    {
      q:"상대가 별말 아닌 메시지를 보냈다.",
      a:[
        ["가볍게 답한다",0],
        ["조금 있다 답한다",1],
        ["답장 타이밍을 잰다",2],
        ["별말 아닌데도 묵혀둔다",3]
      ]
    },
    {
      q:"읽씹처럼 보일까 봐 걱정된다.",
      a:[
        ["걱정 없이 답한다",0],
        ["조금 신경 쓴다",1],
        ["그래서 안 읽고 둔다",2],
        ["안 읽씹으로 내 평화를 지킨다",3]
      ]
    },
    {
      q:"친한 사람이 길게 메시지를 보냈다.",
      a:[
        ["정성껏 바로 답한다",0],
        ["시간 날 때 답한다",1],
        ["답장 분량이 부담된다",2],
        ["정성껏 답하려다 영원히 미룬다",3]
      ]
    },
    {
      q:"답장을 미룬 지 꽤 됐다.",
      a:[
        ["바로 사과하고 답한다",0],
        ["늦었다고 말하고 답한다",1],
        ["이제 뭐라고 하지 고민한다",2],
        ["늦은 답장용 세계관을 만든다",3]
      ]
    },
    {
      q:"메시지를 읽고 답장창을 열었다.",
      a:[
        ["바로 쓴다",0],
        ["몇 번 고친다",1],
        ["썼다 지웠다 한다",2],
        ["답장창만 열었다가 닫는다",3]
      ]
    },
    {
      q:"내 답장 스타일은?",
      a:[
        ["빠르고 깔끔하다",0],
        ["상황 따라 다르다",1],
        ["자주 늦어진다",2],
        ["마음속으론 이미 답장했다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"⚡",
      type:"즉답 생존형",
      name:"알림보다 손이 빠른 사람",
      desc:"당신은 답장을 오래 묵혀두지 않는다. 메시지를 보면 바로 처리하고, 대화의 흐름을 길게 끊지 않는다. 답장이 쌓여 있는 상태를 오히려 더 불편하게 느끼는 사람이다.",
      traits:["답장이 빠른 편","읽고 바로 처리함","대화 흐름을 잘 이어감","밀린 메시지를 싫어함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"보통 텀형",
      name:"늦어도 돌아오는 사람",
      desc:"당신은 답장을 항상 빠르게 하진 않지만, 너무 오래 사라지지도 않는다. 상황에 따라 텀이 생기고, 바쁠 때는 잠깐 미루지만 결국 다시 돌아온다. 상대도 크게 불안해하지 않는 무난한 타입이다.",
      traits:["답장 텀이 적당함","바쁘면 잠깐 미룸","그래도 결국 답함","대화 부담이 크지 않음"]
    },
    {
      min:12,
      max:17,
      icon:"😶‍🌫️",
      type:"안읽씹 보호형",
      name:"알림창에서만 살아가는 사람",
      desc:"당신은 답장을 해야 한다는 걸 알지만, 바로 들어가지는 않는다. 읽으면 답해야 할 것 같아서 알림창에 머물고, 문장을 고르다 시간이 흐른다. 마음속으로는 이미 답했지만 상대 화면에는 아직 아무것도 없다.",
      traits:["알림창 확인이 잦음","읽기 전에 부담을 느낌","답장 문장을 오래 고름","마음속 답장이 실제보다 빠름"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"답장 잠수형",
      name:"마음속으론 이미 장문 보낸 사람",
      desc:"당신의 답장은 마음속에서 먼저 완성된다. 문제는 손가락이 그 속도를 따라오지 못한다는 점이다. 늦어진 답장에는 사연이 쌓이고, 그 사연이 부담이 되어 또 늦어진다.",
      traits:["답장을 오래 묵혀둠","늦을수록 더 부담됨","읽지 않은 채 보관하는 일이 많음","답장 타이밍을 놓치기 쉬움"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
