<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">검색집착력</h1>
    <p class="sub">나는 궁금한 게 생기면 얼마나 끝까지 찾아보는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"모르는 단어가 나왔다.",
      a:[
        ["대충 넘긴다",0],
        ["나중에 찾아본다",1],
        ["바로 검색한다",2],
        ["뜻보다 유래까지 본다",3]
      ]
    },
    {
      q:"드라마에 낯익은 배우가 나왔다.",
      a:[
        ["그냥 본다",0],
        ["어디서 봤지 생각한다",1],
        ["이름을 검색한다",2],
        ["필모그래피까지 훑는다",3]
      ]
    },
    {
      q:"몸에 작은 증상이 생겼다.",
      a:[
        ["며칠 지켜본다",0],
        ["간단히 검색한다",1],
        ["여러 글을 찾아본다",2],
        ["검색하다가 병명 후보가 늘어난다",3]
      ]
    },
    {
      q:"누가 흥미로운 얘기를 했다.",
      a:[
        ["그렇구나 한다",0],
        ["조금 궁금하다",1],
        ["집에 가서 찾아본다",2],
        ["대화 중 이미 검색창을 열었다",3]
      ]
    },
    {
      q:"맛집을 가야 한다.",
      a:[
        ["가까운 곳으로 간다",0],
        ["별점만 본다",1],
        ["리뷰를 꽤 본다",2],
        ["메뉴판, 좌석, 주차까지 확인한다",3]
      ]
    },
    {
      q:"물건을 사기 전 나는?",
      a:[
        ["필요하면 산다",0],
        ["후기 몇 개만 본다",1],
        ["가격 비교를 한다",2],
        ["리뷰 지옥에서 한 시간 보낸다",3]
      ]
    },
    {
      q:"검색하다가 다른 정보가 보인다.",
      a:[
        ["원래 것만 본다",0],
        ["가끔 눌러본다",1],
        ["관련 글을 계속 본다",2],
        ["처음 검색한 이유를 잊는다",3]
      ]
    },
    {
      q:"내 검색 스타일은?",
      a:[
        ["필요할 때만 한다",0],
        ["궁금하면 찾아본다",1],
        ["자주 깊게 판다",2],
        ["검색이 검색을 낳는다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😌",
      type:"필요 검색형",
      name:"궁금해도 잘 넘기는 사람",
      desc:"당신은 모르는 게 생겨도 꼭 바로 찾아봐야 하는 편은 아니다. 필요한 정보만 확인하고, 크게 중요하지 않으면 넘긴다. 검색창이 삶을 끌고 가기보다 내가 필요할 때만 꺼내 쓰는 도구에 가깝다.",
      traits:["필요할 때만 검색함","모르는 것도 잘 넘김","정보에 오래 붙잡히지 않음","검색 시간이 짧은 편"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 검색형",
      name:"궁금하면 한 번쯤 찾아보는 사람",
      desc:"당신은 궁금한 것이 생기면 검색해보지만 오래 빠지지는 않는다. 단어 뜻, 배우 이름, 맛집 리뷰 정도는 확인한다. 그래도 필요한 답을 얻으면 다시 원래 하던 일로 돌아오는 편이다.",
      traits:["궁금하면 바로 확인함","검색 후 금방 돌아옴","간단한 정보 확인을 좋아함","리뷰와 별점을 참고함"]
    },
    {
      min:12,
      max:17,
      icon:"🔎",
      type:"정보 파고들기형",
      name:"검색하다가 관련 글까지 보는 사람",
      desc:"당신은 한 번 검색을 시작하면 꽤 깊게 들어간다. 처음엔 단순히 이름 하나가 궁금했을 뿐인데, 어느새 관련 기사와 후기, 댓글까지 보고 있다. 정보를 찾는 과정 자체가 묘하게 재밌는 사람이다.",
      traits:["검색 시간이 긴 편","관련 정보를 계속 눌러봄","후기와 비교를 많이 봄","궁금증이 꼬리를 무는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🕳️",
      type:"검색 블랙홀형",
      name:"검색창에 들어가면 한동안 안 나오는 사람",
      desc:"당신에게 검색은 단순한 확인이 아니다. 하나를 찾다가 둘을 보고, 둘을 보다가 전혀 다른 세계로 빠진다. 배우 이름을 검색했는데 어린 시절 인터뷰까지 보고 있고, 맛집을 찾다가 도시 상권까지 파고드는 사람이다.",
      traits:["검색이 길게 이어짐","처음 목적을 자주 잊음","정보를 끝까지 확인하고 싶어함","관련 글과 댓글까지 파고듦"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
