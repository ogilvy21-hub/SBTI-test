        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">현실부정력</h1>
    <p class="sub">나는 불편한 현실을 얼마나 자연스럽게 못 본 척하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"해야 할 일이 산처럼 쌓였다.",
      a:[
        ["하나씩 처리한다",0],
        ["우선 쉬운 것부터 본다",1],
        ["잠깐 못 본 척한다",2],
        ["일단 침대에 누워 현실을 끈다",3]
      ]
    },
    {
      q:"통장 잔고를 확인해야 한다.",
      a:[
        ["바로 확인한다",0],
        ["조금 긴장하고 본다",1],
        ["보기 싫어서 미룬다",2],
        ["안 보면 아직 있는 돈 같다",3]
      ]
    },
    {
      q:"마감이 가까워졌다.",
      a:[
        ["바로 시작한다",0],
        ["계획을 다시 세운다",1],
        ["아직 괜찮다고 생각한다",2],
        ["마감 전날의 나를 믿는다",3]
      ]
    },
    {
      q:"몸이 피곤한데 쉬어야 한다.",
      a:[
        ["바로 쉰다",0],
        ["조금 조절한다",1],
        ["괜찮은 척한다",2],
        ["내 몸의 신호를 알림 끄듯 넘긴다",3]
      ]
    },
    {
      q:"관계가 조금 이상해진 것 같다.",
      a:[
        ["대화를 해본다",0],
        ["상황을 살핀다",1],
        ["괜찮겠지 넘긴다",2],
        ["모른 척하면 예전으로 돌아갈 것 같다",3]
      ]
    },
    {
      q:"문제가 생겼다는 걸 직감했다.",
      a:[
        ["바로 확인한다",0],
        ["조금 무섭지만 본다",1],
        ["확인하기 전까지 미룬다",2],
        ["확인 안 하면 아직 문제 전이다",3]
      ]
    },
    {
      q:"미뤄둔 일이 계속 생각난다.",
      a:[
        ["바로 처리한다",0],
        ["메모해둔다",1],
        ["다른 걸 하며 잊으려 한다",2],
        ["생각나면 더 강하게 딴짓한다",3]
      ]
    },
    {
      q:"내 현실부정 방식은?",
      a:[
        ["거의 안 한다",0],
        ["가끔 미룬다",1],
        ["꽤 자주 못 본 척한다",2],
        ["현실이 오면 일단 커튼을 친다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"✅",
      type:"현실 직면형",
      name:"보기 싫어도 일단 확인하는 사람",
      desc:"당신은 불편한 현실을 오래 피하지 않는다. 통장, 마감, 관계 문제처럼 마음이 무거운 일도 결국 직접 확인한다. 겁이 없는 게 아니라 확인하지 않으면 더 커진다는 걸 아는 사람이다.",
      traits:["문제를 바로 확인함","미룬 일의 부담을 싫어함","불편한 현실도 직접 봄","수습이 비교적 빠름"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"잠깐 회피형",
      name:"못 본 척해도 결국 돌아오는 사람",
      desc:"당신은 현실이 부담스러우면 잠깐 눈을 돌린다. 하지만 완전히 놓아버리지는 않는다. 마음의 준비가 끝나면 다시 돌아와 확인하고, 가능한 만큼 정리한다. 현실부정과 책임감이 적당히 공존한다.",
      traits:["잠깐 미루지만 결국 확인함","마음의 준비 시간이 필요함","쉬운 것부터 처리함","현실 감각은 살아 있음"]
    },
    {
      min:12,
      max:17,
      icon:"😶‍🌫️",
      type:"안 보면 평온형",
      name:"확인 전까지는 아직 괜찮은 사람",
      desc:"당신은 불편한 현실을 마주하기 전까지 시간이 필요하다. 확인하면 진짜가 될 것 같아서 미루고, 모른 척하면 잠깐은 마음이 편해진다. 다만 미뤄둔 현실은 조용히 뒤에서 덩치를 키운다.",
      traits:["확인을 미루는 일이 잦음","문제를 직감해도 늦게 봄","딴짓으로 불안을 덮음","마감 전까지 괜찮다고 믿음"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"현실 차단형",
      name:"안 보면 없는 일인 사람",
      desc:"당신은 불편한 현실이 오면 마음속 커튼을 먼저 친다. 통장도, 마감도, 관계 문제도 안 보면 잠깐은 존재감이 줄어든다. 하지만 그 평온은 오래가지 않고, 결국 더 큰 알림으로 돌아올 때가 많다.",
      traits:["불편한 현실 확인을 오래 미룸","마감 직전까지 버팀","문제를 안 보는 것으로 버팀","딴짓으로 마음을 진정시킴"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
