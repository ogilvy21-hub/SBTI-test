<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">칭찬갈망력</h1>
    <p class="sub">나는 칭찬 한마디에 얼마나 오래 살아나는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"누가 잘했다고 말해줬다.",
      a:[
        ["고맙다고 넘긴다",0],
        ["기분이 좋아진다",1],
        ["하루 종일 생각난다",2],
        ["그 말로 일주일은 버틴다",3]
      ]
    },
    {
      q:"열심히 했는데 아무도 모른다.",
      a:[
        ["그래도 괜찮다",0],
        ["조금 아쉽다",1],
        ["누가 알아줬으면 한다",2],
        ["내 노력 지금 실종됐다",3]
      ]
    },
    {
      q:"칭찬을 들으면 나는?",
      a:[
        ["담담한 편이다",0],
        ["살짝 웃는다",1],
        ["속으로 많이 좋아한다",2],
        ["겉으론 괜찮은 척, 속은 축제다",3]
      ]
    },
    {
      q:"내가 한 일을 누가 알아봤다.",
      a:[
        ["고맙다고 한다",0],
        ["조금 뿌듯하다",1],
        ["더 열심히 하고 싶어진다",2],
        ["이 맛에 내가 산다",3]
      ]
    },
    {
      q:"칭찬이 없으면 동기부여가?",
      a:[
        ["크게 상관없다",0],
        ["조금 떨어진다",1],
        ["꽤 흔들린다",2],
        ["칭찬 없으면 배터리 절전모드다",3]
      ]
    },
    {
      q:"단체방에서 내 성과가 언급됐다.",
      a:[
        ["그냥 확인한다",0],
        ["기분 좋게 본다",1],
        ["몇 번 다시 본다",2],
        ["캡처해서 마음속 앨범에 저장한다",3]
      ]
    },
    {
      q:"누가 무심하게 한마디 칭찬했다.",
      a:[
        ["그럴 수도 있지 한다",0],
        ["조금 기억에 남는다",1],
        ["계속 곱씹는다",2],
        ["그 사람 오늘부터 좋은 사람이다",3]
      ]
    },
    {
      q:"내 칭찬 반응은?",
      a:[
        ["담백하게 받는다",0],
        ["기분 좋게 받는다",1],
        ["오래 저장한다",2],
        ["칭찬은 내 정신 영양제다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😌",
      type:"담백 수용형",
      name:"칭찬에도 중심이 흔들리지 않는 사람",
      desc:"당신은 칭찬을 기분 좋게 받지만 거기에 크게 기대지는 않는다. 누가 알아주면 고맙고, 아니어도 해야 할 일을 한다. 인정이 힘이 되긴 하지만 내 기준까지 대신 정해주지는 않는다.",
      traits:["칭찬에 크게 휘둘리지 않음","자기 기준이 비교적 분명함","담담하게 고마움을 표현함","인정 없이도 움직이는 편"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"기분 충전형",
      name:"칭찬 한마디면 조금 더 힘나는 사람",
      desc:"당신은 칭찬을 들으면 확실히 기분이 좋아진다. 다만 칭찬이 없다고 무너지는 정도는 아니다. 누군가 알아봐 주면 더 힘이 나고, 그 말이 하루를 조금 가볍게 만들어준다.",
      traits:["칭찬을 기분 좋게 받음","인정받으면 의욕이 생김","아쉬움은 있어도 금방 회복함","좋은 말을 오래 기억함"]
    },
    {
      min:12,
      max:17,
      icon:"🌟",
      type:"인정 갈망형",
      name:"잘했다는 말이 꽤 필요한 사람",
      desc:"당신은 노력한 만큼 누군가 알아봐 주길 바란다. 칭찬이 없으면 괜히 서운하고, 내가 한 일이 공중에 흩어진 것처럼 느껴질 때가 있다. 잘했다는 말 한마디가 생각보다 큰 에너지가 된다.",
      traits:["칭찬에 동기부여를 많이 받음","인정받지 못하면 서운함","좋은 말을 반복해서 떠올림","노력을 알아봐 주길 바람"]
    },
    {
      min:18,
      max:24,
      icon:"🏆",
      type:"칭찬 생존형",
      name:"칭찬으로 배터리 충전하는 사람",
      desc:"당신에게 칭찬은 그냥 좋은 말이 아니다. 지친 마음을 다시 켜는 충전기다. 누군가 잘했다고 말해주면 표정은 숨겨도 속에서는 이미 시상식이 열린다. 문제는 칭찬이 없을 때 마음이 급격히 꺼질 때가 있다는 것이다.",
      traits:["칭찬에 크게 살아남","인정 욕구가 강한 편","좋은 말을 오래 저장함","칭찬이 없으면 의욕이 떨어짐"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
