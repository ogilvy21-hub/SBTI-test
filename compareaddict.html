<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">비교중독력</h1>
    <p class="sub">나는 남의 삶을 보며 얼마나 자주 내 삶을 재는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"SNS에서 잘 사는 사람을 봤다.",
      a:[
        ["그냥 넘긴다",0],
        ["좋겠다 생각한다",1],
        ["내 상황이랑 비교한다",2],
        ["갑자기 내 인생이 초라해진다",3]
      ]
    },
    {
      q:"친구가 좋은 소식을 전했다.",
      a:[
        ["진심으로 축하한다",0],
        ["부럽긴 하다",1],
        ["나는 뭐 하고 있나 싶다",2],
        ["축하와 현타가 동시에 온다",3]
      ]
    },
    {
      q:"동갑인 사람이 성공한 걸 봤다.",
      a:[
        ["대단하다고 생각한다",0],
        ["조금 자극받는다",1],
        ["내 속도가 늦은 것 같다",2],
        ["내 인생 진도표가 망가진 느낌이다",3]
      ]
    },
    {
      q:"남의 연애나 결혼 소식을 봤다.",
      a:[
        ["보기 좋다",0],
        ["살짝 부럽다",1],
        ["내 상황이 생각난다",2],
        ["괜히 나만 뒤처진 것 같다",3]
      ]
    },
    {
      q:"누가 좋은 물건을 샀다.",
      a:[
        ["그냥 취향이라 생각한다",0],
        ["좋아 보인다",1],
        ["나도 갖고 싶어진다",2],
        ["내 물건이 갑자기 낡아 보인다",3]
      ]
    },
    {
      q:"회사에서 누가 칭찬받았다.",
      a:[
        ["잘했나 보다 한다",0],
        ["나도 더 잘해야겠다 생각한다",1],
        ["나와 비교하게 된다",2],
        ["내 존재감이 줄어든 느낌이다",3]
      ]
    },
    {
      q:"남의 일상을 보고 마음이 흔들린다.",
      a:[
        ["거의 안 흔들린다",0],
        ["가끔 부럽다",1],
        ["자주 비교한다",2],
        ["남의 일상이 내 멘탈을 흔든다",3]
      ]
    },
    {
      q:"내 비교 습관은?",
      a:[
        ["별로 없는 편",0],
        ["가끔 하는 편",1],
        ["꽤 자주 하는 편",2],
        ["비교가 거의 자동재생이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🌿",
      type:"자기속도형",
      name:"남의 삶에 쉽게 흔들리지 않는 사람",
      desc:"당신은 남의 좋은 소식을 봐도 내 삶을 크게 깎아내리지 않는다. 부러운 순간은 있어도 그것이 내 가치의 기준이 되지는 않는다. 남의 속도와 내 속도를 어느 정도 분리해서 보는 사람이다.",
      traits:["남의 성취에 덜 흔들림","자기 속도를 지키는 편","비교보다 관찰에 가까움","부러움이 오래 남지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가끔 비교형",
      name:"부럽지만 다시 내 자리로 오는 사람",
      desc:"당신은 남의 삶을 보며 가끔 흔들린다. 좋은 집, 좋은 직장, 멋진 일상을 보면 부러운 마음이 생긴다. 그래도 그 감정이 오래 머물지는 않는다. 잠깐 비교하다가 다시 내 하루로 돌아온다.",
      traits:["가끔 부러움을 느낌","비교 후 금방 회복함","자극으로 바꾸려 함","내 상황도 어느 정도 받아들임"]
    },
    {
      min:12,
      max:17,
      icon:"📏",
      type:"상시 비교형",
      name:"남의 인생으로 내 점수를 매기는 사람",
      desc:"당신은 주변 사람들의 성취와 일상을 자주 내 삶과 비교한다. 누가 잘되면 축하하면서도 마음 한쪽이 바빠진다. 내 속도가 늦은 건 아닌지, 내가 놓친 건 없는지 자꾸 확인하게 된다.",
      traits:["남의 성취에 쉽게 흔들림","SNS를 보고 비교가 잦음","내 위치를 자주 확인함","부러움과 불안이 함께 옴"]
    },
    {
      min:18,
      max:24,
      icon:"🪞",
      type:"비교 과몰입형",
      name:"남의 삶을 보다가 내 마음이 닳는 사람",
      desc:"당신은 남의 삶을 볼 때 내 삶까지 함께 평가하게 된다. 누군가의 좋은 소식이 순수한 축하로만 머물지 않고, 내 부족함을 비추는 거울처럼 느껴질 때가 많다. 비교를 멈추고 싶어도 마음이 먼저 반응한다.",
      traits:["비교가 자동으로 시작됨","남의 성취가 내 불안으로 이어짐","SNS 후 기분이 가라앉음","내 삶을 자주 부족하게 느낌"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
