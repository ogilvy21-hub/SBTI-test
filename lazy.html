<style>
:root{
  --font-sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-background-danger: #fff1f2;
  --color-text-primary: #111111;
  --color-text-secondary: #555555;
  --color-text-tertiary: #888888;
  --color-text-danger: #e11d48;
  --color-border-primary: #222222;
  --color-border-secondary: #d9d9d9;
  --color-border-tertiary: #e5e5e5;
  --color-border-danger: #f43f5e;
  --border-radius-lg: 16px;
  --border-radius-md: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f3f3f3}
#app{max-width:560px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}
.screen.active{display:block}
.tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--color-background-danger);color:var(--color-text-danger);margin-bottom:1rem}
h1{font-size:28px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-bottom:.75rem}
.sub{font-size:15px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1.5rem}
.start-btn{width:100%;padding:14px;border-radius:var(--border-radius-lg);border:1.5px solid var(--color-border-primary);background:var(--color-background-primary);font-size:16px;font-weight:500;color:var(--color-text-primary);cursor:pointer;transition:background .15s}
.start-btn:hover{background:var(--color-background-secondary)}
.prog-wrap{margin-bottom:1.5rem}
.prog-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-bottom:.5rem}
.prog-fill{height:100%;background:var(--color-text-danger);border-radius:2px;transition:width .3s ease}
.prog-label{font-size:12px;color:var(--color-text-tertiary)}
.q-num{font-size:12px;font-weight:500;color:var(--color-text-danger);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem}
.q-text{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.5;margin-bottom:1.25rem}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:14px 16px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:14px;color:var(--color-text-primary);cursor:pointer;text-align:left;transition:all .15s;line-height:1.5}
.choice:hover{border-color:var(--color-border-danger);background:var(--color-background-danger);color:var(--color-text-danger)}
.choice.selected{border-color:var(--color-border-danger);background:var(--color-background-danger);color:var(--color-text-danger)}
.nav-row{display:flex;gap:8px;margin-top:1.25rem}
.nav-btn{flex:1;padding:12px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn.next{border-color:var(--color-border-danger);color:var(--color-text-danger)}
.nav-btn.next:hover{background:var(--color-background-danger)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.result-icon{font-size:48px;margin-bottom:1rem;display:block;text-align:center}
.result-type{font-size:13px;font-weight:500;color:var(--color-text-danger);text-align:center;margin-bottom:.4rem;letter-spacing:.06em}
.result-name{font-size:26px;font-weight:500;color:var(--color-text-primary);text-align:center;margin-bottom:1rem}
.score-bar-wrap{background:var(--color-background-secondary);border-radius:4px;height:8px;margin-bottom:1.5rem;overflow:hidden}
.score-bar-fill{height:100%;background:var(--color-text-danger);border-radius:4px;transition:width 1s ease}
.result-desc{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;font-size:14px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:1.5rem}
.traits{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.trait{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-secondary)}
.trait strong{display:block;font-size:12px;color:var(--color-text-tertiary);font-weight:400;margin-bottom:2px}
.retry-btn{width:100%;padding:13px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:background .15s}
.retry-btn:hover{background:var(--color-background-secondary)}
.divider{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.home-link{display:inline-block;margin-top:1rem;font-size:13px;color:var(--color-text-tertiary);text-decoration:none}
.home-link:hover{color:var(--color-text-primary)}
.adsense-inpost-bottom{margin:24px 0 8px;}
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;left:-9999px">귀찮음력 테스트 — 나는 얼마나 귀찮음을 잘 느끼는 사람일까?</h2>

  <div id="intro" class="screen active">
    <div class="tag">SBTI 귀찮음력 테스트</div>
    <h1>나는 과연<br>얼마나 귀찮음을 잘 느낄까?</h1>
    <p class="sub">8가지 상황에서 당신의 반응을 선택하면<br>당신의 귀찮음력 유형을 알려드립니다.</p>
    <div class="divider"></div>
    <button class="start-btn" onclick="startQuiz()">테스트 시작하기</button>
    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </div>

  <div id="quiz" class="screen">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
      <div class="prog-label" id="prog-label">1 / 8</div>
    </div>
    <div class="q-num" id="q-num">Q 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="prevQ()" disabled>이전</button>
      <button class="nav-btn next" id="next-btn" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>

  <div id="result" class="screen">
    <span class="result-icon" id="r-icon"></span>
    <div class="result-type" id="r-type"></div>
    <div class="result-name" id="r-name"></div>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="r-bar" style="width:0%"></div></div>
    <div class="result-desc" id="r-desc"></div>
    <div class="traits" id="r-traits"></div>

    <button class="retry-btn" onclick="restart()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </div>
</div>

<script>
const qs=[
  {q:"배달 앱을 켰는데 리뷰 쓰기 알림이 떴다.",c:["바로 쓴다.","생각은 하지만 자주 미룬다.","나중에 쓰자 하고 넘긴다.","절대 안 쓴다. 귀찮다."]},
  {q:"씻으러 가야 하는데 침대가 너무 편하다.",c:["바로 일어난다.","조금만 쉬고 간다.","한참 미루다 간다.","오늘은 그냥 내일 씻고 싶다."]},
  {q:"답장해야 할 메시지가 여러 개 쌓였다.",c:["바로 답한다.","순서대로 천천히 답한다.","생각만 하다가 미룬다.","열어보기도 귀찮다."]},
  {q:"택배 상자를 버리려면 분리수거를 해야 한다.",c:["바로 정리한다.","조금 두었다가 한다.","며칠 쌓아둔다.","상자 자체가 인테리어가 된다."]},
  {q:"주말에 해야 할 일이 있는데 누워 있다.",c:["계획대로 한다.","조금 쉬고 시작한다.","미루다가 밤에 한다.","해야 하는 걸 알지만 안 한다."]},
  {q:"친구가 만나자고 했는데 딱히 일정은 없다.",c:["좋다 하고 나간다.","조금 고민하다 결정한다.","나갈 준비가 귀찮아 망설인다.","안 바빠도 나가기 싫다."]},
  {q:"집에서 뭔가 찾으려는데 자리에서 일어나야 한다.",c:["바로 찾으러 간다.","잠깐 고민 후 움직인다.","누가 대신 가져다주면 좋겠다 싶다.","없으면 없는 대로 산다."]},
  {q:"앱 업데이트 알림이 떴다.",c:["바로 업데이트한다.","기억나면 한다.","한참 미뤘다가 한다.","업데이트? 나중에 알아서 되겠지."]},
];

const results=[
  {min:0,max:6,icon:"⚡",type:"즉시 실행형",name:"귀찮음이 적은 사람",desc:"해야 할 일이 생기면 비교적 바로 움직이는 타입입니다. 미루는 시간이 짧고, 귀찮다는 감정보다 처리하고 끝내는 편이 더 편합니다. 생활 리듬이 단정한 편이라 주변에서 부지런하다는 말을 듣기 쉽습니다.",traits:["실행력 좋음","미루기 적음","생활 정리 빠름","부지런한 편"]},
  {min:7,max:12,icon:"🙂",type:"보통 미룸형",name:"적당히 귀찮은 사람",desc:"귀찮다는 감정은 분명 있지만 완전히 손 놓지는 않는 타입입니다. 당장 하긴 싫어도 결국은 하게 되는 편이고, 미루더라도 어느 정도 선에서 정리합니다. 가장 현실적인 귀찮음력 유형입니다.",traits:["현실적 미루기","결국 해냄","적당한 귀찮음","균형형"]},
  {min:13,max:18,icon:"🛋️",type:"고강도 미룸형",name:"귀찮음에 자주 지는 사람",desc:"해야 할 일보다 하기 싫은 마음이 먼저 올라오는 타입입니다. 시작까지 시간이 오래 걸리고, 작은 일도 마음속에서는 크게 느껴질 수 있습니다. 다만 한 번 시동만 걸리면 의외로 해내는 경우도 많습니다.",traits:["시작이 어려움","미루는 습관 있음","에너지 소모 큼","시동 필요"]},
  {min:19,max:24,icon:"🦥",type:"초귀찮음형",name:"가만히 있고 싶은 사람",desc:"움직여야 하는 대부분의 일에 먼저 귀찮음이 드는 타입입니다. 해야 하는 걸 알아도 몸이 바로 반응하지 않고, 사소한 일도 크게 번거롭게 느껴질 수 있습니다. 게으르다기보다 에너지를 아끼는 쪽에 가까운 유형입니다.",traits:["움직임 최소화","미루기 강함","누워있기 최적화","에너지 절약형"]},
];

let cur=0,scores=Array(qs.length).fill(-1);

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(){
  cur=0;
  scores=Array(qs.length).fill(-1);
  renderQ();
  show('quiz');
}

function renderQ(){
  const q=qs[cur];
  document.getElementById('prog').style.width=((cur+1)/qs.length*100)+'%';
  document.getElementById('prog-label').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('q-num').textContent='Q '+(cur+1);
  document.getElementById('q-text').textContent=q.q;
  const ch=document.getElementById('choices');
  ch.innerHTML='';
  q.c.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice'+(scores[cur]===i?' selected':'');
    btn.textContent=c;
    btn.onclick=()=>pick(i);
    ch.appendChild(btn);
  });
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=scores[cur]===-1;
  document.getElementById('next-btn').textContent=cur===qs.length-1?'결과 보기':'다음';
}

function pick(i){
  scores[cur]=i;
  document.querySelectorAll('.choice').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  document.getElementById('next-btn').disabled=false;
}

function prevQ(){
  if(cur>0){
    cur--;
    renderQ();
  }
}

function nextQ(){
  if(scores[cur]===-1)return;
  if(cur<qs.length-1){
    cur++;
    renderQ();
  }else{
    showResult();
  }
}

function showResult(){
  const total=scores.reduce((a,b)=>a+b,0);
  const r=results.find(x=>total>=x.min&&total<=x.max);
  document.getElementById('r-icon').textContent=r.icon;
  document.getElementById('r-type').textContent=r.type;
  document.getElementById('r-name').textContent=r.name;
  document.getElementById('r-desc').textContent=r.desc;
  const tr=document.getElementById('r-traits');
  tr.innerHTML=r.traits.map(t=>`<div class="trait"><strong>특징</strong>${t}</div>`).join('');
  show('result');
  setTimeout(()=>{document.getElementById('r-bar').style.width=Math.round(total/24*100)+'%'},100);
}

function restart(){
  cur=0;
  scores=Array(qs.length).fill(-1);
  document.getElementById('r-bar').style.width='0%';
  show('intro');
}
</script>
