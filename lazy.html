        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">귀찮음력</h1>
    <p class="sub">나는 사소한 일에도 얼마나 귀찮아지는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"침대에 누웠는데 물이 마시고 싶다.",
      a:[
        ["바로 일어나 마신다",0],
        ["조금 고민하다 마신다",1],
        ["참을 수 있나 본다",2],
        ["그냥 목마른 사람으로 잔다",3]
      ]
    },
    {
      q:"택배가 문 앞에 도착했다.",
      a:[
        ["바로 가져온다",0],
        ["조금 있다 가져온다",1],
        ["보이는데도 미룬다",2],
        ["문 앞에서 하루 묵을 수 있다",3]
      ]
    },
    {
      q:"씻어야 하는 시간이 됐다.",
      a:[
        ["바로 씻는다",0],
        ["조금 쉬고 씻는다",1],
        ["마음의 준비가 필요하다",2],
        ["샤워 전까지 인생이 무겁다",3]
      ]
    },
    {
      q:"친구가 갑자기 나오라고 한다.",
      a:[
        ["바로 준비한다",0],
        ["상황 보고 나간다",1],
        ["준비 과정이 먼저 귀찮다",2],
        ["나가는 상상만으로 피곤하다",3]
      ]
    },
    {
      q:"방이 조금 지저분해졌다.",
      a:[
        ["바로 치운다",0],
        ["눈에 띄는 것만 치운다",1],
        ["언젠가 치워야지 한다",2],
        ["내 방도 나를 이해해줄 거라 믿는다",3]
      ]
    },
    {
      q:"밥을 먹어야 하는데 차려야 한다.",
      a:[
        ["바로 차려 먹는다",0],
        ["간단히 먹는다",1],
        ["배달 앱을 본다",2],
        ["먹는 것도 귀찮아서 누워 있는다",3]
      ]
    },
    {
      q:"해야 할 일이 5분이면 끝난다.",
      a:[
        ["바로 끝낸다",0],
        ["조금 있다 한다",1],
        ["5분짜리라 더 미룬다",2],
        ["5분을 위해 몸을 움직일 수 없다",3]
      ]
    },
    {
      q:"내 귀찮음 스타일은?",
      a:[
        ["별로 심하지 않다",0],
        ["가끔 귀찮다",1],
        ["자주 몸이 안 움직인다",2],
        ["생각만 해도 이미 지친다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🏃",
      type:"즉시 처리형",
      name:"귀찮기 전에 끝내는 사람",
      desc:"당신은 작은 일을 오래 끌지 않는다. 귀찮다는 생각이 들기 전에 몸이 먼저 움직이고, 할 일을 쌓아두는 상태를 더 불편하게 느낀다. 부지런하다기보다 미뤄둔 찝찝함을 싫어하는 사람이다.",
      traits:["작은 일을 바로 처리함","몸이 비교적 빨리 움직임","미룬 일의 찝찝함을 싫어함","생활 루틴이 안정적임"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"생활 귀찮형",
      name:"귀찮아도 결국 하는 사람",
      desc:"당신은 귀찮음을 느끼지만 완전히 놓아버리지는 않는다. 조금 미루고, 조금 투덜대고, 결국 처리한다. 귀찮음과 책임감이 적당히 싸우다가 대체로 책임감이 이기는 타입이다.",
      traits:["조금 미뤄도 결국 함","간단한 방식으로 해결함","귀찮음이 심하진 않음","책임감이 마지막에 이김"]
    },
    {
      min:12,
      max:17,
      icon:"🛋️",
      type:"몸무거움형",
      name:"생각은 했는데 몸이 안 간 사람",
      desc:"당신은 해야 한다는 걸 알면서도 몸이 잘 움직이지 않는다. 물 마시기, 씻기, 택배 가져오기처럼 사소한 일도 가끔 큰 미션처럼 느껴진다. 마음속으로는 이미 했지만 현실은 아직 그대로다.",
      traits:["사소한 일도 자주 미룸","시작 전 에너지가 많이 듦","누워 있으면 움직이기 어려움","마음속 완료가 현실보다 빠름"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"귀찮음 만렙형",
      name:"움직임 자체가 이벤트인 사람",
      desc:"당신에게 작은 일은 작은 일이 아닐 때가 많다. 일어나는 것, 씻는 것, 나가는 것, 답하는 것까지 전부 에너지가 든다. 게으른 사람이 아니라 세상 모든 행동의 진입장벽을 크게 느끼는 사람이다.",
      traits:["움직이기 전 고민이 김","준비 과정부터 피곤함","누워 있는 시간이 길어짐","작은 일도 큰일처럼 느껴짐"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
