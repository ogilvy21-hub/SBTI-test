        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">인간혐오력</h1>
    <p class="sub">나는 사람에게 얼마나 빨리 지치는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"단톡방 알림이 계속 울린다.",
      a:[
        ["재밌게 본다",0],
        ["필요한 것만 본다",1],
        ["조금 피곤해진다",2],
        ["무음이 내 평화를 지킨다",3]
      ]
    },
    {
      q:"사람 많은 곳에 오래 있었다.",
      a:[
        ["오히려 기분이 난다",0],
        ["괜찮은 편이다",1],
        ["집에 가고 싶어진다",2],
        ["영혼이 먼저 집에 도착한다",3]
      ]
    },
    {
      q:"누가 계속 자기 얘기만 한다.",
      a:[
        ["잘 들어준다",0],
        ["적당히 맞장구친다",1],
        ["점점 멍해진다",2],
        ["내 안의 문이 조용히 닫힌다",3]
      ]
    },
    {
      q:"갑자기 약속이 생겼다.",
      a:[
        ["좋다",0],
        ["상황 봐서 나간다",1],
        ["살짝 부담된다",2],
        ["취소 사유를 먼저 찾는다",3]
      ]
    },
    {
      q:"처음 만난 사람과 대화해야 한다.",
      a:[
        ["편하게 한다",0],
        ["조금 어색하지만 괜찮다",1],
        ["에너지가 빨리 닳는다",2],
        ["대화 시작 전에 이미 피곤하다",3]
      ]
    },
    {
      q:"사람들이 내게 계속 연락한다.",
      a:[
        ["고맙다",0],
        ["조금 바쁠 뿐이다",1],
        ["답장 압박이 생긴다",2],
        ["폰을 멀리 두고 싶어진다",3]
      ]
    },
    {
      q:"불필요한 친목 분위기가 생겼다.",
      a:[
        ["잘 어울린다",0],
        ["적당히 맞춘다",1],
        ["빨리 끝났으면 한다",2],
        ["내향인의 비상벨이 울린다",3]
      ]
    },
    {
      q:"내 사회 에너지 상태는?",
      a:[
        ["꽤 넉넉하다",0],
        ["보통은 된다",1],
        ["금방 닳는 편이다",2],
        ["사람 만나면 충전기가 필요하다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😊",
      type:"인류 친화형",
      name:"사람 만나도 배터리 남는 사람",
      desc:"당신은 사람을 만나는 데 에너지가 크게 닳지 않는다. 대화, 모임, 새로운 만남도 비교적 자연스럽게 받아들인다. 사람 속에서도 긴장보다 호기심이 먼저 올라오는 편이다.",
      traits:["사람 많은 곳에 비교적 강함","처음 만난 사람과도 대화 가능","모임 후에도 에너지가 남음","사회적 상황에 적응이 빠름"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"선택적 사회형",
      name:"좋은 사람은 좋은데 오래는 힘든 사람",
      desc:"당신은 사람을 싫어한다기보다 에너지를 아껴 쓰는 쪽에 가깝다. 편한 사람과의 시간은 좋지만, 오래 이어지는 대화나 불필요한 친목은 조금 부담스럽다. 적당한 거리감이 있을 때 가장 편하다.",
      traits:["좋은 사람과는 잘 지냄","긴 모임은 조금 피곤함","적당한 거리감을 좋아함","혼자 회복하는 시간이 필요함"]
    },
    {
      min:12,
      max:17,
      icon:"😮‍💨",
      type:"사회 배터리 부족형",
      name:"사람 만나면 집이 더 좋아지는 사람",
      desc:"당신은 사람과 시간을 보내고 나면 혼자 있는 시간이 꼭 필요하다. 대화는 할 수 있지만 오래 이어지면 금방 지친다. 집에 돌아와 조용히 누웠을 때 비로소 하루가 정리되는 타입이다.",
      traits:["사회 에너지가 빨리 닳음","약속 전부터 살짝 부담됨","집에 오면 안도감이 큼","혼자 있어야 회복됨"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"인간관계 방전형",
      name:"사람 소리만 들어도 배터리 닳는 사람",
      desc:"당신은 사람을 완전히 싫어한다기보다, 사람에게 너무 빨리 소모된다. 단톡방 알림, 갑작스러운 약속, 의미 없는 친목이 마음의 배터리를 빠르게 깎는다. 조용한 거리와 혼자 있는 시간이 당신에게는 생존 공간이다.",
      traits:["단톡방 알림에 쉽게 지침","갑작스러운 약속이 부담됨","불필요한 친목을 싫어함","혼자 있는 시간이 절실함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 인간혐오력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 인간혐오력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
