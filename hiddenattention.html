        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">관종숨김력</h1>
    <p class="sub">나는 관심받고 싶지만 아닌 척을 얼마나 잘하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"새 옷을 입고 나갔다.",
      a:[
        ["별생각 없다",0],
        ["알아봐주면 좋긴 하다",1],
        ["누가 말해주길 살짝 기다린다",2],
        ["관심 없는 척하면서 반응을 스캔한다",3]
      ]
    },
    {
      q:"SNS에 사진을 올렸다.",
      a:[
        ["올리고 잊는다",0],
        ["반응이 궁금하긴 하다",1],
        ["몇 번 확인한다",2],
        ["안 보는 척 계속 새로고침한다",3]
      ]
    },
    {
      q:"칭찬을 들었다.",
      a:[
        ["고맙다고 한다",0],
        ["살짝 민망하다",1],
        ["괜히 아닌 척한다",2],
        ["속으로는 이미 박수 치고 있다",3]
      ]
    },
    {
      q:"내 얘기가 대화 주제로 나왔다.",
      a:[
        ["자연스럽게 듣는다",0],
        ["조금 신경 쓰인다",1],
        ["겉으로는 무심한 척한다",2],
        ["귀는 이미 그쪽으로 출근했다",3]
      ]
    },
    {
      q:"사람들이 내 변화를 못 알아본다.",
      a:[
        ["그럴 수 있다",0],
        ["조금 아쉽다",1],
        ["괜히 한 번 더 티 낸다",2],
        ["못 본 척하는 건지 의심한다",3]
      ]
    },
    {
      q:"단체사진을 찍는다.",
      a:[
        ["그냥 찍는다",0],
        ["잘 나오면 좋겠다",1],
        ["내 위치와 표정을 신경 쓴다",2],
        ["자연스러운 척 각도를 계산한다",3]
      ]
    },
    {
      q:"누가 내 성과를 언급했다.",
      a:[
        ["담담하게 듣는다",0],
        ["기분이 좋아진다",1],
        ["겸손한 척 반응한다",2],
        ["속으로 시상식 멘트를 준비한다",3]
      ]
    },
    {
      q:"내 관심받고 싶은 마음은?",
      a:[
        ["거의 없다",0],
        ["가끔 있다",1],
        ["꽤 있는데 숨긴다",2],
        ["없는 척하는 데 에너지를 많이 쓴다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"무심 담백형",
      name:"관심보다 편안함이 좋은 사람",
      desc:"당신은 관심을 크게 의식하지 않는다. 누가 알아봐주면 고맙지만, 못 알아봐도 마음이 크게 흔들리지 않는다. 보여주는 것보다 내 상태가 편한 쪽을 더 중요하게 여기는 사람이다.",
      traits:["반응에 크게 흔들리지 않음","칭찬을 담담하게 받음","보여주기보다 편안함을 중시함","관심 욕구가 낮은 편"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"은근 기대형",
      name:"알아봐주면 살짝 기분 좋은 사람",
      desc:"당신은 관심을 대놓고 바라진 않지만, 누가 알아봐주면 기분이 좋아진다. 새 옷, 새 머리, 작은 성과를 누가 말해주면 하루가 조금 밝아진다. 다만 그 마음을 크게 티 내지는 않는다.",
      traits:["칭찬에 기분이 좋아짐","반응을 조금 기다림","관심을 부담스럽게 요구하진 않음","은근한 인정 욕구가 있음"]
    },
    {
      min:12,
      max:17,
      icon:"🤭",
      type:"숨은 관종형",
      name:"아닌 척하면서 반응 기다리는 사람",
      desc:"당신은 관심받고 싶은 마음을 꽤 잘 숨긴다. 겉으로는 아무렇지 않은 척하지만, 누가 알아봤는지, 누가 반응했는지 조용히 확인한다. 관심을 원하지만 티 나는 건 또 싫은 섬세한 타입이다.",
      traits:["반응을 조용히 확인함","칭찬받으면 아닌 척함","관심은 좋지만 티 내긴 싫음","무심한 척을 꽤 잘함"]
    },
    {
      min:18,
      max:24,
      icon:"🎭",
      type:"관심 위장형",
      name:"관심 없는 척에 진심인 사람",
      desc:"당신은 관심받고 싶은 마음과 아닌 척하고 싶은 마음이 같이 산다. 새로고침은 하지만 안 본 척하고, 칭찬은 좋은데 민망한 척한다. 겉으로는 쿨한데 속으로는 작은 반응 하나까지 놓치지 않는다.",
      traits:["관심 없는 척을 자주 함","반응 하나에도 기분이 움직임","칭찬받으면 겸손 모드가 켜짐","속으로는 무대 중앙을 원함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 관종숨김력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 관종숨김력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
