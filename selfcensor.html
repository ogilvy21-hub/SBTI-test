<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">자기검열력</h1>
    <p class="sub">나는 말하기 전에 얼마나 스스로를 지우는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"하고 싶은 말이 떠올랐다.",
      a:[
        ["그냥 말한다",0],
        ["한 번 생각하고 말한다",1],
        ["표현을 고르고 말한다",2],
        ["결국 안 하는 쪽을 고른다",3]
      ]
    },
    {
      q:"단톡방에 답을 쓰다가 멈췄다.",
      a:[
        ["바로 보낸다",0],
        ["조금 고친다",1],
        ["여러 번 읽어본다",2],
        ["쓰다가 조용히 삭제한다",3]
      ]
    },
    {
      q:"내 의견이 남들과 다르다.",
      a:[
        ["편하게 말한다",0],
        ["부드럽게 말한다",1],
        ["상대 반응을 먼저 본다",2],
        ["굳이 말하지 않기로 한다",3]
      ]
    },
    {
      q:"누가 내 말에 애매한 표정을 지었다.",
      a:[
        ["크게 신경 안 쓴다",0],
        ["조금 신경 쓰인다",1],
        ["내가 이상했나 싶다",2],
        ["그 뒤로 말수가 확 줄어든다",3]
      ]
    },
    {
      q:"SNS에 글을 올리려 한다.",
      a:[
        ["바로 올린다",0],
        ["한두 번 고친다",1],
        ["반응을 상상해본다",2],
        ["올리기 전에 마음이 식는다",3]
      ]
    },
    {
      q:"농담을 하려다가 생각이 많아졌다.",
      a:[
        ["그냥 한다",0],
        ["상황을 보고 한다",1],
        ["불편해할까 봐 줄인다",2],
        ["농담도 검열하다가 지나간다",3]
      ]
    },
    {
      q:"내가 불편했던 점을 말해야 한다.",
      a:[
        ["차분히 말한다",0],
        ["조심스럽게 말한다",1],
        ["상대가 상처받을까 걱정한다",2],
        ["내가 참는 게 빠르다고 생각한다",3]
      ]
    },
    {
      q:"내 말하기 습관은?",
      a:[
        ["생각보다 솔직하다",0],
        ["적당히 조심한다",1],
        ["말하기 전에 많이 고른다",2],
        ["말보다 삭제가 빠르다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😎",
      type:"솔직 발언형",
      name:"말보다 눈치가 늦게 오는 사람",
      desc:"당신은 하고 싶은 말을 오래 묵혀두지 않는다. 생각이 떠오르면 비교적 자연스럽게 말하고, 반응을 지나치게 두려워하지 않는다. 가끔은 말하고 나서야 분위기를 확인하지만, 적어도 스스로를 과하게 지우지는 않는다.",
      traits:["하고 싶은 말을 잘 꺼냄","반응을 너무 오래 계산하지 않음","의견 표현이 빠른 편","자기검열이 심하지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"적당 조심형",
      name:"말은 하지만 한 번 다듬는 사람",
      desc:"당신은 솔직함과 조심스러움 사이에서 균형을 잡는다. 말하기 전에 표현을 한 번 고르고, 상대가 불편하지 않을 정도로 톤을 조절한다. 자기검열이 아주 심하진 않지만, 말의 온도는 늘 살핀다.",
      traits:["표현을 부드럽게 고름","상대 반응을 어느 정도 봄","의견을 완전히 숨기진 않음","무난한 대화 균형감이 있음"]
    },
    {
      min:12,
      max:17,
      icon:"🤐",
      type:"속말 보관형",
      name:"머릿속 문장은 많은데 입 밖엔 적은 사람",
      desc:"당신은 하고 싶은 말이 많아도 쉽게 꺼내지 않는다. 단어 하나, 표정 하나, 상대 반응 하나까지 생각하다가 말의 크기가 점점 작아진다. 말하지 않은 문장들이 머릿속에 조용히 쌓이는 타입이다.",
      traits:["말하기 전에 오래 생각함","상대 표정에 민감함","쓴 글을 자주 고침","속으로 삼킨 말이 많음"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"자기 삭제형",
      name:"보내기 전에 나를 지우는 사람",
      desc:"당신은 말하기 전에 스스로를 너무 많이 편집한다. 괜히 오해받을까 봐, 분위기를 망칠까 봐, 상대가 불편할까 봐 문장을 지우고 또 지운다. 당신의 침묵은 생각이 없어서가 아니라 너무 많은 생각이 지나간 자리다.",
      traits:["메시지를 쓰고 지우는 일이 잦음","의견보다 분위기를 먼저 봄","불편함을 말하기 어렵다","스스로를 자주 뒤로 물림"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 자기검열력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 자기검열력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
