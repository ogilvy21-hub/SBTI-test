<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">도파민중독력</h1>
    <p class="sub">나는 3초만 심심해도 자극을 찾는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"엘리베이터를 기다리는 10초 동안 나는?",
      a:[
        ["그냥 기다린다",0],
        ["주변을 본다",1],
        ["폰을 한 번 본다",2],
        ["이미 숏폼 하나 열었다",3]
      ]
    },
    {
      q:"밥 먹을 때 영상이 없으면?",
      a:[
        ["괜찮다",0],
        ["조금 허전하다",1],
        ["뭔가 틀고 싶다",2],
        ["밥맛이 절반으로 줄어든다",3]
      ]
    },
    {
      q:"잠깐 쉬는 시간이 생겼다.",
      a:[
        ["가만히 쉰다",0],
        ["음악 정도 듣는다",1],
        ["SNS를 켠다",2],
        ["앱 여러 개를 순회한다",3]
      ]
    },
    {
      q:"핸드폰 알림이 울렸다.",
      a:[
        ["나중에 본다",0],
        ["조금 있다 본다",1],
        ["금방 확인한다",2],
        ["몸이 먼저 반응한다",3]
      ]
    },
    {
      q:"영상 하나만 보려 했다.",
      a:[
        ["하나만 본다",0],
        ["두세 개 본다",1],
        ["시간이 좀 지난다",2],
        ["어느새 밤이 깊어졌다",3]
      ]
    },
    {
      q:"아무것도 안 하는 시간이 생기면?",
      a:[
        ["편하다",0],
        ["조금 심심하다",1],
        ["뭐라도 하고 싶다",2],
        ["정적이 나를 공격하는 것 같다",3]
      ]
    },
    {
      q:"새로운 콘텐츠를 발견했다.",
      a:[
        ["관심 있으면 본다",0],
        ["일단 저장한다",1],
        ["바로 몇 개 찾아본다",2],
        ["그 주제로 하루가 사라진다",3]
      ]
    },
    {
      q:"내 집중력 상태는?",
      a:[
        ["꽤 안정적이다",0],
        ["보통은 유지된다",1],
        ["자주 흔들린다",2],
        ["알림 하나에 영혼이 이동한다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🌿",
      type:"저자극 생존형",
      name:"심심함을 견딜 줄 아는 사람",
      desc:"당신은 자극이 없어도 크게 흔들리지 않는다. 기다리는 시간, 조용한 시간, 아무것도 안 하는 시간을 비교적 편하게 받아들인다. 빠른 재미보다 마음이 덜 피곤한 상태를 더 소중하게 여기는 편이다.",
      traits:["정적에 강한 편","핸드폰 확인이 급하지 않음","쉬는 시간을 쉬는 시간으로 씀","자극 없이도 버틸 수 있음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 자극형",
      name:"심심하면 한 번쯤 폰 보는 사람",
      desc:"당신은 적당한 자극을 좋아한다. 지루하면 폰을 보고, 밥 먹을 때 영상이 있으면 더 좋지만 없어도 큰 문제는 없다. 자극을 즐기지만 아직은 내가 끌려간다기보다 내가 고르는 쪽에 가깝다.",
      traits:["가끔 폰으로 빈 시간을 채움","영상이 있으면 더 좋음","자극을 즐기지만 조절 가능","심심함을 아주 싫어하진 않음"]
    },
    {
      min:12,
      max:17,
      icon:"📱",
      type:"알림 반응형",
      name:"3초만 조용해도 폰 찾는 사람",
      desc:"당신은 작은 빈틈을 그냥 두기 어렵다. 기다리는 시간에는 폰이 필요하고, 밥 먹을 때는 영상이 있으면 마음이 안정된다. 하루 곳곳에 짧은 자극을 꽂아 넣으며 지루함을 밀어내는 타입이다.",
      traits:["빈 시간이 생기면 폰부터 찾음","숏폼에 자주 빨려 들어감","알림에 반응이 빠름","조용한 시간이 조금 어색함"]
    },
    {
      min:18,
      max:24,
      icon:"⚡",
      type:"풀충전 자극형",
      name:"도파민이 출퇴근을 안 하는 사람",
      desc:"당신의 하루에는 자극이 끊기기 어렵다. 영상, 알림, SNS, 검색, 음악이 빈틈을 빠르게 채운다. 심심함은 쉬는 시간이 아니라 견뎌야 하는 미션처럼 느껴지고, 폰은 거의 몸의 일부처럼 움직인다.",
      traits:["숏폼 연속 시청에 강함","알림을 거의 바로 확인함","무자극 시간이 힘듦","콘텐츠 순회가 일상임"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
