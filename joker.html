<style>

}

  text-align:center;
  font-size:42px;

  font-weight:700;
}

.score-bar-wrap{
  width:100%;
  height:14px;
  border-radius:999px;
  background:#ececec;
  overflow:hidden;

}

.score-bar-fill{

}

}

.traits{
  display:grid;
  grid-template-columns:1fr 1fr;

  margin-bottom:1.5rem;
}

.trait{
  background:#fff;
  border:1px solid #e5e5e5;

}

.trait strong{
  display:block;

  font-size:12px;
  margin-bottom:5px;
}

.home-link{
  display:inline-block;
  margin-top:1rem;
  font-size:13px;
  color:#888;
  text-decoration:none;
}

.adsense-inpost-bottom{
  margin:24px 0 8px;
}
</style>

  <h1>나는 분위기를 위해<br>웃긴 척하는 사람일까?</h1>

  <p class="sub">
    분위기가 싸해지면 괜히 말 한마디 더 하게 되는 사람.<br>
    모두 웃을 때까지 혼자 애쓰는 사람.<br><br>
    당신 안의 광대력을 확인해보세요.
  </p>

  <div class="divider"></div>

  <button class="start-btn" onclick="startQuiz()">테스트 시작하기</button>

</div>

<div id="quiz" class="screen">

  <div class="prog-wrap">
    <div class="prog-bar">
      <div class="prog-fill" id="prog"></div>
    </div>
    <div class="prog-label" id="prog-label">1 / 8</div>
  </div>

  <div class="q-num" id="q-num"></div>

  <div class="choices" id="choices"></div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevQ()">이전</button>
    <button class="nav-btn next" id="next-btn" onclick="nextQ()" disabled>다음</button>
  </div>

</div>

<div id="result" class="screen">

  <span class="result-icon" id="r-icon"></span>
  <div class="result-type" id="r-type"></div>
  <div class="result-name" id="r-name"></div>

  <div class="score-bar-wrap">
    <div class="score-bar-fill" id="r-bar"></div>
  </div>

  <div class="result-desc" id="r-desc"></div>

  <div class="traits" id="r-traits"></div>

  <button class="retry-btn" onclick="restart()">다시 테스트하기</button>

  <div class="adsense-slot adsense-inpost-bottom">

         style="display:block; width:100%;"
         data-ad-client="ca-pub-6295549457389423"
         data-ad-slot="4063532035"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});

  <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>

</div>
</div>

<script>
const questions = [
{
q:"단톡방 분위기가 싸해졌다.",
a:[
["굳이 안 나선다",0],
["가볍게 반응한다",1],
["분위기 살릴 드립을 친다",2],
["혼자서라도 분위기 살리려 한다",3]
]
},
{
q:"사람들이 웃으면 기분이 좋아진다.",
a:[
["별 느낌 없다",0],
["적당히 좋다",1],
["꽤 뿌듯하다",2],
["내 존재 이유 같다",3]
]
},
{
q:"처음 보는 사람들과 있을 때",
a:[
["조용히 있는 편",0],
["눈치 보며 적응",1],
["먼저 분위기를 푼다",2],
["내가 분위기 담당이 된다",3]
]
},
{
q:"내 이야기보다 웃긴 이야기를 더 많이 한다.",
a:[
["거의 안 한다",0],
["가끔 한다",1],
["자주 한다",2],
["습관처럼 한다",3]
]
},
{
q:"사람들이 조용하면 괜히 불안하다.",
a:[
["전혀 아니다",0],
["조금 그렇다",1],
["꽤 그렇다",2],
["못 참고 뭔가 한다",3]
]
},
{
q:"내가 희생해서 분위기 맞춘 적",
a:[
["거의 없다",0],
["조금 있다",1],
["꽤 많다",2],
["매우 많다",3]
]
},
{
q:"사람들이 날 재밌는 사람으로 기억하면",
a:[
["상관없다",0],
["나쁘지 않다",1],
["좋다",2],
["그게 가장 좋다",3]
]
},
{
q:"혼자 있을 때 실제 성격은",
a:[
["차분하다",0],
["평범하다",1],
["생각보다 조용하다",2],
["완전 다른 사람 같다",3]
]
}
];

const results = [
{
min:0,max:5,
icon:"🪨",
type:"무덤덤형",
name:"분위기 무관심러",
desc:"억지로 분위기를 맞추지 않는 타입입니다. 조용한 상황도 편하게 받아들이고, 굳이 웃기려 애쓰지 않습니다.",
traits:["감정 소비 적음","혼자도 편함","분위기 휘말림 적음","현실적"]
},
{
min:6,max:11,
icon:"🙂",
type:"적당한 사회형",
name:"눈치형 리액션러",
desc:"필요할 때는 분위기를 맞추지만, 선을 넘지는 않는 타입입니다. 사회성도 있지만 에너지 조절도 잘합니다.",
traits:["적당한 리액션","사회성 있음","눈치 빠름","균형형"]
},
{
min:12,max:17,
icon:"🎭",
type:"분위기 메이커형",
name:"사람 웃기는 게 좋은 사람",
desc:"사람들이 웃는 걸 좋아하고, 분위기를 자연스럽게 이끄는 타입입니다. 주변에서 은근히 많이 찾는 스타일입니다.",
traits:["리액션 좋음","분위기 리더","친화력 높음","유머 사용"]
},
{
min:18,max:24,
icon:"🤡",
type:"광대 MAX형",
name:"분위기 살리다 지친 사람",
desc:"어색한 공기만 보면 몸이 먼저 반응하는 타입입니다. 모두 웃고 있어도 혼자 계속 분위기를 챙기고 있을 가능성이 큽니다.",
traits:["분위기 집착","과몰입형","희생 잦음","혼자 지침"]
}
];

let current = 0;
let scores = [];

function startQuiz(){
  current = 0;
  scores = [];
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){

  const q = questions[current];

  document.getElementById("prog").style.width =
    ((current)/questions.length)*100 + "%";

  document.getElementById("prog-label").innerText =
    (current+1)+" / "+questions.length;

  document.getElementById("q-num").innerText =
    "Q"+(current+1);

  document.getElementById("q-text").innerText = q.q;

  const wrap = document.getElementById("choices");
  wrap.innerHTML = "";

  q.a.forEach((item,idx)=>{

    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerText = item[0];

    btn.onclick = ()=>{

      document.querySelectorAll(".choice")
        .forEach(el=>el.classList.remove("selected"));

      btn.classList.add("selected");

      scores[current] = item[1];

      document.getElementById("next-btn").disabled = false;
    };

    wrap.appendChild(btn);
  });

  document.getElementById("next-btn").disabled = true;
}

function nextQ(){

  if(current < questions.length-1){

    current++;
    renderQuestion();

  }else{

    showResult();
  }
}

function prevQ(){

  if(current===0)return;

  current--;
  renderQuestion();
}

function showResult(){

  const total = scores.reduce((a,b)=>a+b,0);

  const result = results.find(r =>
    total >= r.min && total <= r.max
  );

  showScreen("result");

  document.getElementById("r-icon").innerText = result.icon;
  document.getElementById("r-type").innerText = result.type;
  document.getElementById("r-name").innerText = result.name;
  document.getElementById("r-desc").innerText = result.desc;

  document.getElementById("r-bar").style.width =
    ((total/24)*100)+"%";

  document.getElementById("r-traits").innerHTML =
    result.traits.map(t => `
      <div class="trait">
        <strong>특징</strong>
        ${t}
      </div>
    `).join("");
}

function restart(){

  showScreen("intro");
}

function showScreen(id){

  document.querySelectorAll(".screen")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");
}
</script>
