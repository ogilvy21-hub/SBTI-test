        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">상상복수력</h1>
    <p class="sub">나는 머릿속에서 얼마나 완벽하게 복수하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"누가 나를 은근히 무시했다.",
      a:[
        ["그냥 넘긴다",0],
        ["조금 기분 나쁘다",1],
        ["집에 가서 다시 생각난다",2],
        ["머릿속에서 이미 반격 멘트가 완성된다",3]
      ]
    },
    {
      q:"그때 못 한 말이 뒤늦게 떠올랐다.",
      a:[
        ["금방 잊는다",0],
        ["아쉽긴 하다",1],
        ["몇 번 다시 생각한다",2],
        ["혼자 재대결을 시작한다",3]
      ]
    },
    {
      q:"상대가 뻔뻔하게 굴었다.",
      a:[
        ["상황을 넘긴다",0],
        ["속으로만 불편하다",1],
        ["어떻게 말할지 상상한다",2],
        ["정확히 무너뜨리는 장면까지 그린다",3]
      ]
    },
    {
      q:"억울한 일이 생겼다.",
      a:[
        ["해결 방법을 찾는다",0],
        ["조금 화가 난다",1],
        ["계속 곱씹는다",2],
        ["내가 이기는 엔딩을 여러 버전으로 만든다",3]
      ]
    },
    {
      q:"상대가 내 앞에서 잘난 척을 한다.",
      a:[
        ["그럴 수 있다",0],
        ["살짝 거슬린다",1],
        ["반박할 포인트를 찾는다",2],
        ["머릿속에서 이미 공개 처형했다",3]
      ]
    },
    {
      q:"화가 났는데 말로 못 했다.",
      a:[
        ["나중에 잊는다",0],
        ["조금 남는다",1],
        ["혼자 대사를 다시 만든다",2],
        ["상상 속 나는 말싸움 천재다",3]
      ]
    },
    {
      q:"나를 힘들게 한 사람이 잘 지내는 것 같다.",
      a:[
        ["신경 안 쓴다",0],
        ["살짝 씁쓸하다",1],
        ["괜히 비교하게 된다",2],
        ["언젠가 후회하는 장면을 상상한다",3]
      ]
    },
    {
      q:"내 상상복수 스타일은?",
      a:[
        ["거의 안 한다",0],
        ["가끔 한다",1],
        ["꽤 자주 한다",2],
        ["머릿속에 복수극 제작사가 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"평화 종료형",
      name:"복수보다 퇴근이 빠른 사람",
      desc:"당신은 억울한 일이 있어도 오래 붙잡지 않는다. 기분은 나쁠 수 있지만, 복수 장면을 길게 만들기보다 빨리 일상으로 돌아가는 쪽을 택한다. 마음의 에너지를 쓸데없는 사람에게 오래 쓰지 않는 편이다.",
      traits:["억울함을 오래 끌지 않음","상상보다 현실 정리가 빠름","불필요한 감정 소모를 줄임","마음 회복이 빠른 편"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 반격형",
      name:"한두 마디는 다시 해보는 사람",
      desc:"당신은 가끔 머릿속에서 그때 못 한 말을 다시 해본다. 다만 복수극까지 크게 키우지는 않는다. 조금 아쉽고 조금 억울하지만, 시간이 지나면 결국 내 생활 쪽으로 돌아오는 타입이다.",
      traits:["못 한 말이 가끔 떠오름","짧은 상상 반격을 함","감정이 오래 머물진 않음","상대보다 내 시간을 더 챙김"]
    },
    {
      min:12,
      max:17,
      icon:"🤨",
      type:"머릿속 재판형",
      name:"혼자 변호사 검사 판사 다 하는 사람",
      desc:"당신은 억울한 일이 생기면 머릿속에서 사건을 다시 연다. 상대의 말, 내 반응, 주변 분위기까지 복기하며 더 좋은 대사를 찾는다. 현실에서는 조용했지만 상상 속에서는 꽤 논리적으로 이긴다.",
      traits:["그때 못 한 말이 오래 남음","머릿속 재대결이 잦음","반박 대사를 뒤늦게 완성함","상상 속 나는 꽤 강함"]
    },
    {
      min:18,
      max:24,
      icon:"🔥",
      type:"복수극 감독형",
      name:"머릿속에서 이미 시즌2까지 만든 사람",
      desc:"당신의 상상복수는 단순한 말싸움이 아니다. 상대가 후회하고, 내가 차분하게 이기고, 주변이 진실을 알아주는 장면까지 완성된다. 현실에서는 아무 일 없던 척하지만, 마음속에서는 이미 긴 서사가 끝났다.",
      traits:["복수 장면을 구체적으로 그림","상대가 후회하는 엔딩을 좋아함","못 한 말이 오래 재생됨","혼자 완벽한 반격 서사를 만듦"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
