<style>

}

  font-size:40px;

}

.score-bar-wrap{

  background:#ececec;

}

.trait{

}

.home-link{
  display:inline-block;
  margin-top:1rem;
  font-size:13px;
  color:#888;
  text-decoration:none;

.adsense-inpost-bottom{
  margin:24px 0 8px;
}
</style>

<div id="quiz" class="screen">

  <div class="prog-wrap">

      <div class="prog-fill" id="prog"></div>

         style="display:block; width:100%;"

         data-ad-format="auto"
         data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});

  <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>

</div>

</div>

<script>
const questions = [

{
q:"드라마나 영화 결말 여운이 오래 간다.",
a:[
["거의 없다",0],
["조금 남는다",1],
["하루 정도 간다",2],
["며칠 동안 계속 생각난다",3]
]
},

{
q:"좋아하는 사람이 무심한 말 한마디 했다.",
a:[
["금방 잊는다",0],
["조금 신경 쓰인다",1],
["혼자 의미를 생각한다",2],
["머릿속에서 장면이 반복된다",3]
]
},

{
q:"웹툰·연애프로·예능 볼 때",
a:[
["가볍게 본다",0],
["조금 감정 이입한다",1],
["상당히 몰입한다",2],
["거의 내 일처럼 본다",3]
]
},

{
q:"누가 나를 칭찬했다.",
a:[
["좋네 하고 끝",0],
["기분 좋다",1],
["하루 종일 생각난다",2],
["혼자 서사까지 만든다",3]
]
},

{
q:"연락 답장이 늦어졌다.",
a:[
["별 생각 없다",0],
["조금 궁금하다",1],
["혼자 이유를 상상한다",2],
["이미 결말까지 갔다",3]
]
},

{
q:"좋아하는 취미나 콘텐츠가 생기면",
a:[
["가볍게 즐긴다",0],
["조금 빠진다",1],
["꽤 깊게 판다",2],
["생활 전체가 그걸 중심으로 돈다",3]
]
},

{
q:"사람 관계에서 나는",
a:[
["거리를 잘 둔다",0],
["적당히 정 준다",1],
["감정이 깊은 편이다",2],
["한 번 빠지면 진짜 깊다",3]
]
},

{
q:"혼자 상상하는 시간이",
a:[
["거의 없다",0],
["가끔 있다",1],
["꽤 많다",2],
["하루 상당 부분 차지한다",3]
]
}

];

const results = [

{
min:0,max:5,
icon:"🪨",
type:"현실 유지형",
name:"과몰입 거의 없음",
desc:"감정과 현실의 거리를 잘 유지하는 타입입니다. 쉽게 빠지지 않고, 상황을 비교적 차분하게 바라보는 편입니다.",
traits:["현실 감각 강함","감정 정리 빠름","거리 조절 가능","담백한 편"]
},

{
min:6,max:11,
icon:"🙂",
type:"적당 몰입형",
name:"가끔 과몰입하는 사람",
desc:"좋아하는 것에는 몰입하지만, 어느 정도 선은 유지하는 타입입니다. 공감 능력도 있고 감정도 풍부하지만 현실도 놓치지 않습니다.",
traits:["균형감 있음","공감 능력 좋음","몰입과 현실 공존","감정 건강형"]
},

{
min:12,max:17,
icon:"🌙",
type:"감정 과몰입형",
name:"혼자 세계관 만드는 사람",
desc:"작은 감정도 깊게 받아들이고 오래 생각하는 타입입니다. 관계, 콘텐츠, 말투 하나에도 마음이 크게 움직이는 편입니다.",
traits:["여운 오래 감","상상력 풍부","감정 깊음","혼자 생각 많음"]
},

{
min:18,max:24,
icon:"🔥",
type:"과몰입 MAX형",
name:"혼자 드라마 찍는 사람",
desc:"감정에 완전히 몰입하는 타입입니다. 좋아하는 것에는 깊게 빠지고, 작은 신호에도 큰 의미를 부여할 가능성이 큽니다.",
traits:["몰입 강도 높음","감정 진폭 큼","상상 과다","여운 매우 김"]
}

];

let current = 0;
let scores = [];

function startQuiz(){
  current = 0;
  scores = [];
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){

  const q = questions[current];

  document.getElementById("prog").style.width =
    ((current)/questions.length)*100 + "%";

  document.getElementById("prog-label").innerText =
    (current+1)+" / "+questions.length;

  document.getElementById("q-num").innerText =
    "Q"+(current+1);

  document.getElementById("q-text").innerText = q.q;

  const wrap = document.getElementById("choices");
  wrap.innerHTML = "";

  q.a.forEach((item)=>{

    const btn = document.createElement("button");

    btn.className = "choice";

    btn.innerText = item[0];

    btn.onclick = ()=>{

      document.querySelectorAll(".choice")
        .forEach(el=>el.classList.remove("selected"));

      btn.classList.add("selected");

      scores[current] = item[1];

      document.getElementById("next-btn").disabled = false;
    };

    wrap.appendChild(btn);
  });

  document.getElementById("next-btn").disabled = true;
}

function nextQ(){

  if(current < questions.length-1){

    current++;
    renderQuestion();

  }else{

    showResult();
  }
}

function prevQ(){

  if(current===0)return;

  current--;

  renderQuestion();
}

function showResult(){

  const total = scores.reduce((a,b)=>a+b,0);

  const result = results.find(r =>
    total >= r.min && total <= r.max
  );

  showScreen("result");

  document.getElementById("r-icon").innerText = result.icon;
  document.getElementById("r-type").innerText = result.type;
  document.getElementById("r-name").innerText = result.name;
  document.getElementById("r-desc").innerText = result.desc;

  document.getElementById("r-bar").style.width =
    ((total/24)*100)+"%";

  document.getElementById("r-traits").innerHTML =
    result.traits.map(t=>`
      <div class="trait">
        <strong>특징</strong>
        ${t}
      </div>
    `).join("");
}

function restart(){

  showScreen("intro");
}

function showScreen(id){

  document.querySelectorAll(".screen")
    .forEach(el=>el.classList.remove("active"));

  document.getElementById(id)
    .classList.add("active");
}
</script>
