<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">망상력</h1>
    <p class="sub">나는 아무 일도 없는데 얼마나 머릿속에서 장면을 만드는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"길을 걷다가 음악이 딱 맞게 나온다.",
      a:[
        ["그냥 듣는다",0],
        ["기분이 조금 좋아진다",1],
        ["장면처럼 느껴진다",2],
        ["이미 내 인생 영화 오프닝이다",3]
      ]
    },
    {
      q:"상대가 의미심장한 말을 했다.",
      a:[
        ["그냥 그런 말로 듣는다",0],
        ["조금 생각한다",1],
        ["숨은 뜻을 찾아본다",2],
        ["혼자 3가지 해석본을 만든다",3]
      ]
    },
    {
      q:"잠들기 전 조용해졌다.",
      a:[
        ["바로 잔다",0],
        ["오늘 일을 조금 생각한다",1],
        ["내일 상황을 상상한다",2],
        ["머릿속 드라마가 시작된다",3]
      ]
    },
    {
      q:"누가 나를 쳐다본 것 같다.",
      a:[
        ["착각이겠지 한다",0],
        ["왜 봤지 싶다",1],
        ["내 모습이 이상한가 생각한다",2],
        ["혼자 시나리오를 몇 개 만든다",3]
      ]
    },
    {
      q:"갑자기 연락이 끊겼다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 신경 쓰인다",1],
        ["무슨 일 있나 싶다",2],
        ["이미 사건의 전말을 상상한다",3]
      ]
    },
    {
      q:"혼자 멍 때리는 시간이 생겼다.",
      a:[
        ["그냥 쉰다",0],
        ["잡생각이 조금 난다",1],
        ["상상이 이어진다",2],
        ["현실보다 머릿속이 더 바쁘다",3]
      ]
    },
    {
      q:"누가 내 얘기를 하는 것 같다.",
      a:[
        ["신경 안 쓴다",0],
        ["살짝 궁금하다",1],
        ["좋은 말인지 나쁜 말인지 생각한다",2],
        ["대화 내용을 혼자 재구성한다",3]
      ]
    },
    {
      q:"내 망상 스타일은?",
      a:[
        ["거의 현실 위주다",0],
        ["가끔 상상한다",1],
        ["자주 이어 붙인다",2],
        ["혼자 세계관을 만든다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"현실 고정형",
      name:"상상보다 눈앞의 일을 보는 사람",
      desc:"당신은 작은 장면에 큰 의미를 붙이지 않는다. 말은 말로, 상황은 상황으로 받아들이는 편이다. 상상력이 없는 게 아니라 굳이 없는 이야기를 크게 만들지 않는 사람이다.",
      traits:["상황을 있는 그대로 봄","숨은 뜻을 과하게 찾지 않음","생각이 오래 번지지 않음","현실 감각이 안정적임"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 상상형",
      name:"가끔 장면을 예쁘게 만드는 사람",
      desc:"당신은 현실을 살다가도 가끔 머릿속에서 작은 장면을 만든다. 음악, 말투, 우연한 타이밍이 겹치면 살짝 영화처럼 느껴진다. 다만 상상에 오래 빠지기보다 금방 현실로 돌아온다.",
      traits:["가끔 장면처럼 느껴짐","상상을 즐기지만 금방 돌아옴","의미를 조금 붙이는 편","머릿속이 적당히 바쁨"]
    },
    {
      min:12,
      max:17,
      icon:"💭",
      type:"서사 생성형",
      name:"아무 일 없는데 2화까지 본 사람",
      desc:"당신은 작은 일에도 이야기를 만든다. 말 한마디, 시선 하나, 연락 텀 하나가 머릿속에서 장면으로 이어진다. 현실은 아직 조용한데 마음속에서는 이미 사건이 진행 중일 때가 많다.",
      traits:["작은 신호에 의미를 붙임","혼자 상황을 이어 붙임","밤에 생각이 길어짐","현실보다 상상이 조금 빠름"]
    },
    {
      min:18,
      max:24,
      icon:"🎬",
      type:"망상 제작형",
      name:"혼자 드라마 편성표 짜는 사람",
      desc:"당신의 머릿속은 꽤 바쁜 제작사다. 아무 일도 없던 장면에 복선이 생기고, 평범한 말 한마디가 대사가 된다. 현실에서는 조용히 있지만 마음속에서는 이미 시즌제가 돌아가는 타입이다.",
      traits:["상상 전개가 매우 빠름","작은 상황도 크게 키움","혼자 장면을 구체적으로 만듦","머릿속 세계관이 풍부함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
