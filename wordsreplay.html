        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">말실수복기력</h1>
    <p class="sub">나는 내가 한 말 한마디를 얼마나 오래 다시 돌려보는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"대화가 끝나고 집에 왔다.",
      a:[
        ["그냥 쉰다",0],
        ["몇 장면만 떠오른다",1],
        ["내가 한 말을 다시 생각한다",2],
        ["대화 전체가 머릿속에서 재생된다",3]
      ]
    },
    {
      q:"말하고 나서 상대 표정이 애매했다.",
      a:[
        ["별일 아니겠지 한다",0],
        ["조금 신경 쓰인다",1],
        ["내 말을 다시 떠올린다",2],
        ["그 표정 하나로 밤이 길어진다",3]
      ]
    },
    {
      q:"농담을 했는데 반응이 약했다.",
      a:[
        ["그럴 수도 있다",0],
        ["살짝 민망하다",1],
        ["괜히 했나 싶다",2],
        ["내 유머 인생을 재검토한다",3]
      ]
    },
    {
      q:"단톡방에 보낸 말 뒤로 조용하다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 민망하다",1],
        ["문장을 다시 읽어본다",2],
        ["방금 단톡방 공기를 바꾼 것 같다",3]
      ]
    },
    {
      q:"누가 내 말을 다시 물어봤다.",
      a:[
        ["다시 설명한다",0],
        ["조금 당황한다",1],
        ["내가 이상하게 말했나 싶다",2],
        ["그 순간부터 머릿속이 꼬인다",3]
      ]
    },
    {
      q:"잠들기 전에 갑자기 낮의 말이 떠올랐다.",
      a:[
        ["금방 잊는다",0],
        ["잠깐 생각한다",1],
        ["이불 속에서 곱씹는다",2],
        ["오늘 잠은 이미 틀렸다",3]
      ]
    },
    {
      q:"내가 한 말이 오해될 수도 있다.",
      a:[
        ["필요하면 나중에 설명한다",0],
        ["조금 걱정한다",1],
        ["바로 정정할까 고민한다",2],
        ["이미 최악의 오해까지 상상했다",3]
      ]
    },
    {
      q:"내 말실수 복기 스타일은?",
      a:[
        ["거의 안 한다",0],
        ["가끔 떠올린다",1],
        ["꽤 자주 되감는다",2],
        ["내 머릿속에 대화 녹화본이 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😌",
      type:"대화 종료형",
      name:"말 끝나면 마음도 같이 끝나는 사람",
      desc:"당신은 대화가 끝나면 그 장면을 오래 붙잡지 않는다. 어색한 순간이 있어도 크게 의미를 키우지 않고 넘어간다. 말 한마디에 하루를 내주지 않는 편이라 마음 회복이 빠르다.",
      traits:["대화 후 복기가 적음","상대 반응에 덜 흔들림","민망한 순간도 빨리 넘김","말실수에 오래 머물지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 복기형",
      name:"가끔 떠올리지만 금방 돌아오는 사람",
      desc:"당신은 말하고 나서 가끔 신경 쓰이는 순간이 있다. 그래도 그 생각이 오래 머리를 차지하지는 않는다. 잠깐 민망해하고, 잠깐 되짚고, 다시 일상으로 돌아오는 사람이다.",
      traits:["가끔 말을 되짚음","상대 표정을 조금 신경 씀","민망함이 오래가진 않음","다시 현실로 잘 돌아옴"]
    },
    {
      min:12,
      max:17,
      icon:"🫣",
      type:"대화 리플레이형",
      name:"방금 한 말을 계속 다시 듣는 사람",
      desc:"당신은 대화가 끝난 뒤에도 머릿속에서 말이 계속 남는다. 그때 왜 그렇게 말했지, 다르게 말할 걸, 이상하게 들렸을까 같은 생각이 꼬리를 문다. 남들은 잊었을 말도 당신 안에서는 아직 재생 중이다.",
      traits:["말한 뒤 자주 곱씹음","상대 반응을 오래 생각함","단톡방 문장을 다시 읽음","오해 가능성을 자주 걱정함"]
    },
    {
      min:18,
      max:24,
      icon:"📼",
      type:"말실수 재방송형",
      name:"내 말 한마디로 밤을 새우는 사람",
      desc:"당신에게 말실수는 그냥 지나가는 일이 아니다. 상대의 표정, 침묵, 답장 속도까지 전부 신호처럼 느껴진다. 대화는 끝났는데 머릿속에서는 아직 편집본이 계속 돌아간다. 잠들기 전 이불킥 예약률이 높은 사람이다.",
      traits:["말실수를 오래 붙잡음","상대 침묵에 크게 흔들림","밤에 대화를 자주 복기함","최악의 오해까지 상상함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
