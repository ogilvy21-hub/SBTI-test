<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">시비력</h1>
    <p class="sub">나는 얼마나 참는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대가 은근히 긁는 말을 했다.",
      a:[
        ["그냥 넘긴다",0],
        ["살짝 기분은 나쁘다",1],
        ["표정이 조금 굳는다",2],
        ["바로 한마디가 목까지 올라온다",3]
      ]
    },
    {
      q:"누가 틀린 말을 자신 있게 한다.",
      a:[
        ["굳이 말 안 한다",0],
        ["조심스럽게 말한다",1],
        ["정정해주고 싶어진다",2],
        ["그 자리에서 바로잡아야 속이 풀린다",3]
      ]
    },
    {
      q:"내 말을 누가 끊었다.",
      a:[
        ["흘려보낸다",0],
        ["조금 불편하다",1],
        ["다시 말할 타이밍을 잡는다",2],
        ["끊은 거냐고 묻고 싶다",3]
      ]
    },
    {
      q:"상대가 말도 안 되는 핑계를 댄다.",
      a:[
        ["그럴 수도 있지 한다",0],
        ["속으로만 생각한다",1],
        ["눈빛이 달라진다",2],
        ["그 핑계의 빈틈을 바로 본다",3]
      ]
    },
    {
      q:"단톡방에서 누가 이상한 논리를 편다.",
      a:[
        ["그냥 넘긴다",0],
        ["조금 답답하다",1],
        ["반박하고 싶다",2],
        ["이미 손가락이 답장을 쓰고 있다",3]
      ]
    },
    {
      q:"상대가 나를 가볍게 보는 것 같다.",
      a:[
        ["신경 안 쓴다",0],
        ["조금 거슬린다",1],
        ["말투가 차가워진다",2],
        ["그 순간부터 시비 모드가 켜진다",3]
      ]
    },
    {
      q:"친구가 내 앞에서 허세를 부린다.",
      a:[
        ["웃고 넘긴다",0],
        ["속으로만 웃는다",1],
        ["살짝 꼬집고 싶다",2],
        ["팩트로 균형을 맞춰주고 싶다",3]
      ]
    },
    {
      q:"내 시비 버튼은?",
      a:[
        ["거의 안 눌린다",0],
        ["가끔 눌린다",1],
        ["꽤 자주 눌린다",2],
        ["이미 버튼이 밖에 나와 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"평화 유지형",
      name:"시비보다 평온이 먼저인 사람",
      desc:"당신은 웬만한 말에는 쉽게 흔들리지 않는다. 상대가 조금 거슬리는 말을 해도 바로 반응하기보다 분위기를 보고 넘긴다. 참는 게 답답해서가 아니라 굳이 내 에너지를 쓰고 싶지 않은 사람이다.",
      traits:["가벼운 말은 잘 넘김","감정 소모를 싫어함","분위기를 크게 깨지 않음","시비 버튼이 쉽게 눌리지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"속시비 보관형",
      name:"속으로는 이미 한마디 한 사람",
      desc:"당신은 겉으로는 무난하게 넘기지만, 속으로는 할 말이 꽤 많다. 바로 시비를 걸지는 않아도 상대의 말과 태도를 조용히 기억한다. 평화주의자처럼 보이지만 머릿속에는 짧은 반박문이 남는다.",
      traits:["겉으로는 차분함","속으로 반박을 자주 함","선 넘는 말은 기억함","필요할 때만 표현함"]
    },
    {
      min:12,
      max:17,
      icon:"🤨",
      type:"팩트 장전형",
      name:"참다가 정확히 찌르는 사람",
      desc:"당신은 아무 말이나 하지 않는다. 하지만 상대가 선을 넘거나 논리가 이상해지면 조용히 각을 잡는다. 말싸움을 즐긴다기보다 틀린 말과 무례한 태도를 그냥 두기 어려운 타입이다.",
      traits:["논리 빈틈을 잘 봄","선 넘는 말에 민감함","참다가 정확히 말함","표정에서 티가 나는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🔥",
      type:"시비 풀충전형",
      name:"말 한마디에 전투 준비 끝나는 사람",
      desc:"당신은 시비 버튼이 빠르게 켜지는 편이다. 무례한 말, 이상한 논리, 은근한 무시를 그냥 넘기기 어렵다. 겉으로는 참으려 해도 이미 머릿속에서는 반박 순서와 마무리 멘트까지 정리된다.",
      traits:["시비 버튼이 빠르게 눌림","은근한 무시에 예민함","반박 멘트가 빨리 떠오름","참아도 표정이 먼저 말함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
