<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">회피력</h1>
    <p class="sub">나는 불편한 일을 얼마나 자연스럽게 피하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"해야 할 일이 눈앞에 있다.",
      a:[
        ["바로 시작한다",0],
        ["조금 준비하고 한다",1],
        ["일단 마음의 준비를 한다",2],
        ["다른 쉬운 일부터 찾는다",3]
      ]
    },
    {
      q:"불편한 대화를 해야 한다.",
      a:[
        ["바로 말한다",0],
        ["조심스럽게 꺼낸다",1],
        ["타이밍을 계속 본다",2],
        ["가능하면 안 하는 쪽을 고른다",3]
      ]
    },
    {
      q:"문제가 생겼다는 걸 알았다.",
      a:[
        ["바로 확인한다",0],
        ["조금 긴장하며 본다",1],
        ["확인하기 전 망설인다",2],
        ["안 보면 없는 일 같아서 미룬다",3]
      ]
    },
    {
      q:"답장하기 애매한 메시지가 왔다.",
      a:[
        ["짧게라도 답한다",0],
        ["조금 고민하고 답한다",1],
        ["알림창에서만 본다",2],
        ["안 읽은 척 시간이 흐른다",3]
      ]
    },
    {
      q:"해야 할 결정이 생겼다.",
      a:[
        ["정보 보고 결정한다",0],
        ["조금 고민한다",1],
        ["선택이 부담스럽다",2],
        ["누가 대신 정해줬으면 한다",3]
      ]
    },
    {
      q:"갈등이 생길 것 같은 분위기다.",
      a:[
        ["필요하면 말한다",0],
        ["부드럽게 넘긴다",1],
        ["슬쩍 빠져나온다",2],
        ["내 존재감을 조용히 지운다",3]
      ]
    },
    {
      q:"밀린 일이 계속 쌓인다.",
      a:[
        ["하나씩 처리한다",0],
        ["쉬운 것부터 한다",1],
        ["볼 때마다 부담된다",2],
        ["부담돼서 더 안 본다",3]
      ]
    },
    {
      q:"내 회피 습관은?",
      a:[
        ["별로 없다",0],
        ["가끔 있다",1],
        ["꽤 자주 미룬다",2],
        ["피하는 기술이 생활화됐다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"✅",
      type:"정면 처리형",
      name:"불편해도 일단 보는 사람",
      desc:"당신은 불편한 일을 오래 피하지 않는다. 부담스러운 메시지, 해야 할 일, 애매한 대화도 결국 직접 확인하고 처리한다. 겁이 없는 게 아니라 피할수록 더 커진다는 걸 아는 사람이다.",
      traits:["문제를 바로 확인함","불편한 대화도 피하지 않음","결정이 비교적 빠름","미뤄둔 부담을 싫어함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"현실 타협형",
      name:"잠깐 미뤄도 결국 돌아오는 사람",
      desc:"당신은 가끔 불편한 일을 미루지만 완전히 도망가지는 않는다. 마음의 준비 시간이 필요할 뿐, 결국 다시 돌아와 처리한다. 회피와 책임감 사이에서 현실적인 타협을 하는 타입이다.",
      traits:["잠깐 미루지만 처리함","마음의 준비가 필요함","쉬운 일부터 시작함","회피가 오래가진 않음"]
    },
    {
      min:12,
      max:17,
      icon:"😶‍🌫️",
      type:"슬쩍 회피형",
      name:"안 보면 잠깐 편한 사람",
      desc:"당신은 불편한 일을 마주하기 전까지 시간이 오래 걸린다. 메시지도, 결정도, 문제 확인도 마음이 준비될 때까지 미뤄둔다. 안 보면 마음이 잠깐 편하지만, 뒤쪽에서 부담이 조용히 커지는 타입이다.",
      traits:["확인 자체를 미루는 편","불편한 대화를 피하고 싶어 함","결정을 오래 미룸","부담이 쌓이면 더 피곤해짐"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"회피 만렙형",
      name:"안 보면 없는 일인 사람",
      desc:"당신은 불편한 일을 피하는 능력이 꽤 발달했다. 문제를 확인하지 않고, 메시지를 안 읽고, 결정을 미루면 잠깐은 평온해진다. 하지만 마음 한쪽에서는 그 일이 계속 살아 있어서 결국 더 큰 피로로 돌아올 때가 있다.",
      traits:["불편한 일 확인을 오래 미룸","안 읽씹으로 평화를 지킴","결정 부담을 크게 느낌","회피한 일이 마음속에 계속 남음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
