        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">부탁거절력</h1>
    <p class="sub">나는 싫은 부탁을 얼마나 잘 거절하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"친구가 갑자기 귀찮은 부탁을 했다.",
      a:[
        ["할 수 없으면 바로 말한다",0],
        ["조금 고민하고 답한다",1],
        ["거절 멘트를 한참 찾는다",2],
        ["결국 해주고 혼자 지친다",3]
      ]
    },
    {
      q:"상대가 너무 당연하게 부탁한다.",
      a:[
        ["선을 분명히 긋는다",0],
        ["부담된다고 말한다",1],
        ["불편하지만 돌려 말한다",2],
        ["속으로만 화내고 받아준다",3]
      ]
    },
    {
      q:"거절하면 상대가 서운해할 것 같다.",
      a:[
        ["그래도 안 되는 건 안 된다",0],
        ["조심스럽게 거절한다",1],
        ["말을 꺼내기 어렵다",2],
        ["상대 서운함이 무서워서 들어준다",3]
      ]
    },
    {
      q:"회사에서 내 일이 아닌 일을 부탁받았다.",
      a:[
        ["업무 범위를 말한다",0],
        ["가능한 만큼만 한다",1],
        ["거절 타이밍을 놓친다",2],
        ["내 일처럼 하게 된다",3]
      ]
    },
    {
      q:"부탁을 거절한 뒤 마음은?",
      a:[
        ["크게 신경 쓰지 않는다",0],
        ["조금 미안하다",1],
        ["내가 너무했나 생각한다",2],
        ["괜히 죄책감이 오래 간다",3]
      ]
    },
    {
      q:"누가 반복해서 부탁한다.",
      a:[
        ["두 번째부터는 단호하다",0],
        ["조금 거리를 둔다",1],
        ["이번만 해주자고 생각한다",2],
        ["매번 해주다가 내가 지친다",3]
      ]
    },
    {
      q:"싫은데 거절 멘트가 떠오르지 않는다.",
      a:[
        ["간단히 어렵다고 말한다",0],
        ["상황을 설명한다",1],
        ["핑계를 오래 고민한다",2],
        ["말 못 하고 알겠다고 한다",3]
      ]
    },
    {
      q:"내 거절 스타일은?",
      a:[
        ["분명하게 말한다",0],
        ["조심스럽게 말한다",1],
        ["어렵게 말한다",2],
        ["거절보다 수락이 빠르다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😎",
      type:"단호 거절형",
      name:"안 되는 건 안 된다고 말하는 사람",
      desc:"당신은 부탁 앞에서 내 한계를 비교적 분명하게 말한다. 상대가 서운해할 수 있다는 걸 알아도, 무리한 부탁까지 떠안지는 않는다. 차가운 사람이 아니라 내 시간을 지킬 줄 아는 사람이다.",
      traits:["거절이 비교적 빠름","업무와 관계의 선이 분명함","죄책감에 오래 끌려가지 않음","내 시간을 잘 지킴"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"조심 거절형",
      name:"미안하지만 결국 말은 하는 사람",
      desc:"당신은 부탁을 거절할 때 조금 조심스럽다. 상대 기분을 살피고 표현을 고르지만, 무리라고 판단하면 결국 말한다. 거절을 못 하는 사람은 아니고, 최대한 관계를 부드럽게 지키려는 쪽에 가깝다.",
      traits:["상대 기분을 고려함","표현을 부드럽게 고름","부담되면 결국 말함","거절 후 조금 미안해함"]
    },
    {
      min:12,
      max:17,
      icon:"😶",
      type:"거절 고민형",
      name:"싫은데 멘트부터 막히는 사람",
      desc:"당신은 싫다는 마음은 분명하지만 말이 쉽게 나오지 않는다. 거절하면 분위기가 어색해질까 봐, 상대가 서운해할까 봐 오래 고민한다. 그러다 타이밍을 놓치고 마음보다 몸이 먼저 수락해버릴 때가 있다.",
      traits:["거절 멘트를 오래 고민함","상대 반응이 신경 쓰임","싫어도 바로 말하기 어려움","거절 후에도 마음이 불편함"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"부탁 자동수락형",
      name:"내 마음 빼고 다 들어주는 사람",
      desc:"당신은 부탁을 받으면 거절보다 수락이 먼저 나온다. 하기 싫어도 상대가 난처할까 봐, 나를 나쁘게 볼까 봐 결국 떠안는다. 문제는 그 친절이 반복될수록 내 마음이 조용히 닳아간다는 점이다.",
      traits:["거절보다 수락이 빠름","부탁받으면 죄책감이 생김","내 일처럼 떠안는 일이 많음","혼자 지친 뒤 후회함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
