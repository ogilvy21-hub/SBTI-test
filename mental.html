<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">멘탈회복력</h1>
    <p class="sub">나는 무너진 뒤 얼마나 빨리 다시 일어나는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"갑자기 일이 꼬였다.",
      a:[
        ["금방 방법을 찾는다",0],
        ["조금 당황하지만 정리한다",1],
        ["한동안 멍해진다",2],
        ["머릿속이 바로 정지된다",3]
      ]
    },
    {
      q:"실수를 했다.",
      a:[
        ["수습부터 한다",0],
        ["잠깐 자책하고 움직인다",1],
        ["계속 생각난다",2],
        ["하루 전체가 무너진다",3]
      ]
    },
    {
      q:"누군가 나를 지적했다.",
      a:[
        ["필요한 부분만 듣는다",0],
        ["조금 신경 쓰인다",1],
        ["오래 곱씹는다",2],
        ["내 존재 전체가 흔들린다",3]
      ]
    },
    {
      q:"계획이 틀어졌다.",
      a:[
        ["다른 방법을 찾는다",0],
        ["조금 짜증 나지만 바꾼다",1],
        ["기운이 빠진다",2],
        ["그날은 아무것도 하기 싫어진다",3]
      ]
    },
    {
      q:"기분 나쁜 말을 들었다.",
      a:[
        ["금방 넘긴다",0],
        ["조금 남는다",1],
        ["자꾸 떠오른다",2],
        ["밤까지 계속 마음에 걸린다",3]
      ]
    },
    {
      q:"하루가 너무 힘들었다.",
      a:[
        ["쉬면 회복된다",0],
        ["좋아하는 걸 하며 푼다",1],
        ["다음 날까지 여파가 있다",2],
        ["며칠 동안 마음이 처진다",3]
      ]
    },
    {
      q:"예상 밖의 문제가 생겼다.",
      a:[
        ["바로 대응한다",0],
        ["조금 흔들리지만 해결한다",1],
        ["누군가 도와줬으면 한다",2],
        ["혼자 감당하기 버겁다",3]
      ]
    },
    {
      q:"내 멘탈 회복 속도는?",
      a:[
        ["빠른 편이다",0],
        ["보통은 된다",1],
        ["느린 편이다",2],
        ["한번 무너지면 오래 간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"💪",
      type:"고속 회복형",
      name:"넘어져도 바로 먼지 터는 사람",
      desc:"당신은 멘탈 회복 속도가 빠른 편이다. 일이 꼬여도 오래 멈춰 있지 않고, 실수해도 수습을 먼저 생각한다. 감정이 없는 게 아니라 감정에 오래 붙잡히지 않는 사람이다.",
      traits:["문제 상황에서 대응이 빠름","실수 후 수습력이 좋음","감정을 오래 끌지 않음","회복 루틴이 비교적 안정적임"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"현실 회복형",
      name:"흔들려도 다시 돌아오는 사람",
      desc:"당신은 힘든 일이 생기면 잠깐 흔들리지만, 시간이 지나면 다시 자기 자리로 돌아온다. 완벽히 괜찮은 척하지는 않지만 무너진 상태에 오래 머물지도 않는다. 현실적인 회복력을 가진 타입이다.",
      traits:["잠깐 흔들려도 회복 가능","좋아하는 것으로 기분 전환함","문제 해결 감각이 있음","무너지기 전에 다시 정리함"]
    },
    {
      min:12,
      max:17,
      icon:"😮‍💨",
      type:"느린 회복형",
      name:"괜찮아지는 데 시간이 필요한 사람",
      desc:"당신은 마음이 한 번 흔들리면 회복까지 시간이 걸린다. 실수나 지적을 쉽게 털어내지 못하고, 밤이 되면 다시 떠올리는 일이 있다. 그래도 천천히 정리하면 결국 다시 일어나는 사람이다.",
      traits:["실수 후 자책이 오래 감","지적에 민감함","감정 정리에 시간이 필요함","혼자 회복하는 시간이 중요함"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"멘탈 장기입원형",
      name:"한 번 무너지면 마음이 결근하는 사람",
      desc:"당신은 작은 일에도 마음의 체력이 크게 닳는다. 실수, 지적, 계획 변경이 하루 전체를 흔들 수 있다. 겉으로는 버티고 있어도 속에서는 이미 멘탈이 병가를 낸 상태일 때가 많다.",
      traits:["작은 일에도 크게 지침","자책이 오래 이어짐","회복까지 시간이 많이 필요함","혼자 조용히 무너질 때가 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
