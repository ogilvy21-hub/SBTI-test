        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">소비합리화력</h1>
    <p class="sub">나는 사고 싶은 마음에 얼마나 그럴듯한 이유를 붙이는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"사고 싶은 물건이 생겼다.",
      a:[
        ["정말 필요한지 먼저 본다",0],
        ["가격을 비교해본다",1],
        ["오래 쓸 거라고 생각한다",2],
        ["이건 소비가 아니라 투자다",3]
      ]
    },
    {
      q:"할인 문구를 봤다.",
      a:[
        ["필요 없으면 안 산다",0],
        ["조금 흔들린다",1],
        ["지금 사면 이득이라 생각한다",2],
        ["안 사면 손해라는 마음이 든다",3]
      ]
    },
    {
      q:"장바구니 금액이 커졌다.",
      a:[
        ["몇 개 뺀다",0],
        ["필요한 것만 남긴다",1],
        ["배송비 아끼려면 어쩔 수 없다",2],
        ["어차피 언젠가 살 것들이다",3]
      ]
    },
    {
      q:"카드값이 걱정된다.",
      a:[
        ["이번 달 소비를 줄인다",0],
        ["조금 조심한다",1],
        ["다음 달의 나를 믿는다",2],
        ["미래의 내가 알아서 하겠지",3]
      ]
    },
    {
      q:"비싼 물건을 봤다.",
      a:[
        ["부담되면 포기한다",0],
        ["오래 고민한다",1],
        ["품질이 좋으면 괜찮다",2],
        ["싼 거 여러 번 사는 것보다 낫다",3]
      ]
    },
    {
      q:"친구가 왜 샀냐고 묻는다.",
      a:[
        ["필요해서 샀다고 한다",0],
        ["좋아서 샀다고 한다",1],
        ["나름 이유를 설명한다",2],
        ["구매 논문 발표가 가능하다",3]
      ]
    },
    {
      q:"택배가 도착했다.",
      a:[
        ["필요한 물건이라 좋다",0],
        ["조금 기분이 좋아진다",1],
        ["나에게 주는 보상 같다",2],
        ["문 앞에 도파민이 도착했다",3]
      ]
    },
    {
      q:"내 소비합리화 스타일은?",
      a:[
        ["합리화 거의 안 한다",0],
        ["가끔 이유를 붙인다",1],
        ["꽤 자주 설득한다",2],
        ["내 소비엔 항상 서사가 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🧾",
      type:"현실 결제형",
      name:"사기 전에 정신 차리는 사람",
      desc:"당신은 사고 싶은 마음이 생겨도 바로 결제하지 않는다. 필요한지, 가격은 괜찮은지, 지금 사야 하는지 먼저 따진다. 충동보다 기준이 앞서는 사람이라 장바구니에서도 꽤 냉정하다.",
      traits:["필요성을 먼저 따짐","충동구매가 적음","가격 비교를 잘함","결제 전 한 번 멈춤"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 설득형",
      name:"가끔 나를 납득시키는 사람",
      desc:"당신은 소비 앞에서 완전히 냉정하진 않다. 마음에 드는 물건이 있으면 이유를 붙여보지만, 선을 넘으면 멈출 줄도 안다. 사고 싶은 마음과 현실 감각이 적당히 줄다리기한다.",
      traits:["가끔 소비 이유를 만듦","할인에 조금 약함","그래도 과한 소비는 경계함","필요와 욕심을 구분하려 함"]
    },
    {
      min:12,
      max:17,
      icon:"🛍️",
      type:"자기설득형",
      name:"사고 싶은데 이유가 따라오는 사람",
      desc:"당신은 사고 싶은 마음이 먼저 오고, 그다음 이유가 붙는다. 오래 쓸 거니까, 지금 할인하니까, 나에게 필요한 거니까. 말하다 보면 꽤 그럴듯하다. 문제는 그 논리가 매번 너무 빨리 완성된다는 것이다.",
      traits:["소비 이유를 잘 만듦","할인 문구에 흔들림","보상 소비가 잦음","장바구니 정리가 어려움"]
    },
    {
      min:18,
      max:24,
      icon:"💳",
      type:"소비 서사형",
      name:"결제에 세계관을 부여하는 사람",
      desc:"당신에게 소비는 단순한 구매가 아니다. 나를 위한 보상, 미래를 위한 투자, 삶의 질 개선, 감정 회복까지 이유가 풍성하다. 결제 전에는 잠깐 고민하지만, 이미 마음속에서는 사용 후기까지 끝났다.",
      traits:["소비 합리화가 빠름","비싼 물건도 이유를 잘 붙임","보상 소비에 강함","결제 후에도 스스로를 설득함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
