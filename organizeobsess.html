        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">정리강박력</h1>
    <p class="sub">나는 주변이 어질러졌을 때 얼마나 마음이 불편한 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"책상 위에 물건이 쌓였다.",
      a:[
        ["크게 신경 안 쓴다",0],
        ["나중에 치워야겠다 생각한다",1],
        ["계속 눈에 밟힌다",2],
        ["치우기 전까지 집중이 안 된다",3]
      ]
    },
    {
      q:"카톡방이 너무 많다.",
      a:[
        ["그냥 둔다",0],
        ["가끔 정리한다",1],
        ["안 쓰는 방은 나가고 싶다",2],
        ["읽은 방도 정리돼 있어야 마음이 편하다",3]
      ]
    },
    {
      q:"휴대폰 사진첩이 엉망이다.",
      a:[
        ["그럴 수 있다",0],
        ["가끔 지운다",1],
        ["중복 사진이 신경 쓰인다",2],
        ["앨범 분류 안 되면 마음이 답답하다",3]
      ]
    },
    {
      q:"옷장이 어질러졌다.",
      a:[
        ["입을 수 있으면 괜찮다",0],
        ["시간 날 때 정리한다",1],
        ["보면 좀 불편하다",2],
        ["색깔이나 종류별로 맞춰야 속이 시원하다",3]
      ]
    },
    {
      q:"컴퓨터 바탕화면에 파일이 많다.",
      a:[
        ["찾을 수 있으면 된다",0],
        ["가끔 폴더에 넣는다",1],
        ["지저분하면 불편하다",2],
        ["바탕화면은 비어 있어야 한다",3]
      ]
    },
    {
      q:"누가 내 물건 위치를 바꿨다.",
      a:[
        ["다시 찾으면 된다",0],
        ["조금 불편하다",1],
        ["왜 옮겼는지 신경 쓰인다",2],
        ["내 질서가 침범당한 느낌이다",3]
      ]
    },
    {
      q:"정리하다가 시간이 오래 걸린다.",
      a:[
        ["적당히 하고 멈춘다",0],
        ["대충 마무리한다",1],
        ["끝까지 하고 싶다",2],
        ["시작했으면 완벽하게 끝내야 한다",3]
      ]
    },
    {
      q:"내 정리 스타일은?",
      a:[
        ["대충 살아도 괜찮다",0],
        ["필요할 때만 정리한다",1],
        ["정리돼 있어야 편하다",2],
        ["흐트러진 걸 보면 바로 손이 간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🧦",
      type:"자유 방치형",
      name:"어질러져도 잘 사는 사람",
      desc:"당신은 주변이 조금 어질러져도 크게 흔들리지 않는다. 물건이 제자리에 없어도 찾을 수 있으면 되고, 책상이 복잡해도 할 일은 한다. 정리보다 편안함을 더 중요하게 보는 사람이다.",
      traits:["어질러져도 크게 불편하지 않음","정리에 에너지를 많이 쓰지 않음","필요하면 그때 찾음","완벽한 질서보다 편안함을 선호함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"필요 정리형",
      name:"참다가 한 번에 치우는 사람",
      desc:"당신은 평소에는 어느 정도 두다가 불편해지면 정리한다. 매일 각 잡고 치우는 편은 아니지만, 선을 넘으면 갑자기 정리 모드가 켜진다. 어질러짐과 정돈 사이에서 현실적으로 살아가는 타입이다.",
      traits:["필요할 때 정리함","어느 정도는 참을 수 있음","한 번 치우면 꽤 열심히 함","실용적인 정리를 선호함"]
    },
    {
      min:12,
      max:17,
      icon:"🗂️",
      type:"질서 민감형",
      name:"정리돼 있어야 마음이 놓이는 사람",
      desc:"당신은 주변이 정리돼 있을 때 마음이 훨씬 편하다. 책상, 옷장, 파일, 사진첩까지 흐트러지면 묘하게 신경이 쓰인다. 꼭 남에게 보이기 위해서가 아니라, 내 머릿속까지 정돈되는 느낌이 필요하다.",
      traits:["정돈된 공간을 좋아함","물건 위치 변화에 민감함","파일과 사진 정리를 자주 함","정리 후 마음이 편해짐"]
    },
    {
      min:18,
      max:24,
      icon:"📐",
      type:"정리 강박형",
      name:"흐트러진 각도를 그냥 못 보는 사람",
      desc:"당신에게 정리는 선택이 아니라 안정 장치에 가깝다. 물건이 제자리에 있어야 마음이 놓이고, 바탕화면과 책상이 정리돼야 집중이 된다. 남들은 못 보는 어긋남도 당신 눈에는 너무 크게 보인다.",
      traits:["작은 어질러짐도 잘 봄","정리가 안 되면 집중이 어려움","물건 위치에 민감함","완벽하게 정리해야 속이 시원함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
