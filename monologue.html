<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">혼잣말력</h1>
    <p class="sub">나는 속으로 얼마나 많은 대화를 하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"혼자 방에 있을 때 갑자기 말이 나온다.",
      a:[
        ["거의 없다",0],
        ["가끔 중얼거린다",1],
        ["꽤 자주 말한다",2],
        ["거의 1인 토크쇼다",3]
      ]
    },
    {
      q:"뭔가 실수했을 때 첫 반응은?",
      a:[
        ["조용히 수습한다",0],
        ["속으로 아차 한다",1],
        ["작게 뭐하냐고 말한다",2],
        ["나 자신과 긴급 회의를 연다",3]
      ]
    },
    {
      q:"길을 걷다가 생각이 많아졌다.",
      a:[
        ["그냥 생각만 한다",0],
        ["속으로 정리한다",1],
        ["입모양이 살짝 움직인다",2],
        ["누가 보면 통화 중인 줄 안다",3]
      ]
    },
    {
      q:"혼자 물건을 찾고 있다.",
      a:[
        ["조용히 찾는다",0],
        ["속으로 어디 있지 한다",1],
        ["어디 갔냐고 말한다",2],
        ["물건과 대화까지 시도한다",3]
      ]
    },
    {
      q:"짜증나는 일이 생겼다.",
      a:[
        ["그냥 넘긴다",0],
        ["속으로만 투덜댄다",1],
        ["작게 한마디 나온다",2],
        ["혼자 상황극이 시작된다",3]
      ]
    },
    {
      q:"거울을 봤을 때 나는?",
      a:[
        ["그냥 본다",0],
        ["속으로 상태를 본다",1],
        ["오늘 좀 괜찮네 정도는 한다",2],
        ["거울 속 나와 대화한다",3]
      ]
    },
    {
      q:"혼자 밥 먹을 때 머릿속은?",
      a:[
        ["조용하다",0],
        ["생각이 조금 있다",1],
        ["속으로 계속 말한다",2],
        ["먹방 진행자처럼 멘트가 돈다",3]
      ]
    },
    {
      q:"내 혼잣말을 누가 들었다.",
      a:[
        ["별일 아니다",0],
        ["살짝 민망하다",1],
        ["못 들은 척한다",2],
        ["내 세계관이 들킨 기분이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"조용한 내면형",
      name:"생각은 많은데 입은 닫힌 사람",
      desc:"당신은 혼잣말이 많지 않다. 생각은 머릿속에서 조용히 정리하고, 감정도 밖으로 크게 새지 않는다. 겉으로는 차분해 보이지만, 머릿속에서는 이미 필요한 말들이 깔끔하게 지나간다.",
      traits:["말보다 생각이 먼저 움직임","겉으로는 차분한 편","혼자 있어도 조용함","감정을 밖으로 크게 꺼내지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"소곤소곤형",
      name:"가끔 나랑 대화하는 사람",
      desc:"당신은 필요할 때만 혼잣말이 나온다. 물건을 찾거나 실수했을 때 짧게 한마디가 새고, 혼자 있을 때 생각을 입 밖으로 살짝 정리한다. 아직은 귀여운 수준의 셀프 대화다.",
      traits:["가끔 작게 중얼거림","혼자 있을 때 말이 조금 늘어남","실수하면 짧은 탄식이 나옴","생각 정리에 혼잣말을 씀"]
    },
    {
      min:12,
      max:17,
      icon:"🤭",
      type:"셀프회의형",
      name:"혼자 질문하고 혼자 답하는 사람",
      desc:"당신의 혼잣말은 단순한 중얼거림을 넘어 대화에 가깝다. 내가 묻고 내가 답하고, 내가 혼내고 내가 위로한다. 혼자 있어도 심심할 틈이 없고, 머릿속 회의실은 자주 불이 켜진다.",
      traits:["혼자 대화가 자연스러움","상황 설명을 자주 함","셀프 위로와 셀프 지적을 다 함","머릿속이 늘 조금 시끄러움"]
    },
    {
      min:18,
      max:24,
      icon:"🎙️",
      type:"1인 방송형",
      name:"혼자 있어도 출연자가 많은 사람",
      desc:"당신의 혼잣말은 거의 콘텐츠다. 물건에게 말을 걸고, 과거의 나를 부르고, 미래의 나에게 경고한다. 혼자 있는 시간이 조용하지 않은 이유는 외로워서가 아니라 이미 안에 출연진이 많기 때문이다.",
      traits:["혼자 상황극이 자주 열림","물건에게도 말을 걺","입 밖으로 생각이 잘 나옴","혼자 있어도 절대 조용하지 않음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
