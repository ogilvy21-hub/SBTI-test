<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">현타력</h1>
    <p class="sub">나는 갑자기 현실을 맞고 얼마나 멍해지는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"즐겁게 놀고 집에 돌아왔다.",
      a:[
        ["기분 좋게 쉰다",0],
        ["조금 피곤하다",1],
        ["갑자기 공허해진다",2],
        ["내일 생각에 바로 현실로 끌려간다",3]
      ]
    },
    {
      q:"월급이 들어왔다가 바로 빠져나갔다.",
      a:[
        ["그럴 수 있다",0],
        ["조금 아쉽다",1],
        ["돈 벌기 어렵다 싶다",2],
        ["통장 보고 인생이 조용해진다",3]
      ]
    },
    {
      q:"SNS에서 남의 화려한 일상을 봤다.",
      a:[
        ["그냥 넘긴다",0],
        ["좋겠다 싶다",1],
        ["내 하루가 초라해 보인다",2],
        ["갑자기 내 현실이 선명해진다",3]
      ]
    },
    {
      q:"밤늦게 불 끄고 누웠다.",
      a:[
        ["바로 잔다",0],
        ["생각이 조금 난다",1],
        ["오늘 하루를 되짚는다",2],
        ["내 인생 전체가 회의에 들어간다",3]
      ]
    },
    {
      q:"열심히 했는데 결과가 별로다.",
      a:[
        ["다시 해본다",0],
        ["조금 속상하다",1],
        ["힘이 빠진다",2],
        ["내가 뭐 하고 있나 싶어진다",3]
      ]
    },
    {
      q:"친구들과 웃다가 갑자기 조용해졌다.",
      a:[
        ["그냥 쉰다",0],
        ["조금 허전하다",1],
        ["기분이 내려간다",2],
        ["즐거움 뒤의 공허함이 온다",3]
      ]
    },
    {
      q:"계획했던 미래와 현재가 다르게 느껴진다.",
      a:[
        ["아직 괜찮다고 본다",0],
        ["조금 생각한다",1],
        ["마음이 무거워진다",2],
        ["현실이 너무 크게 다가온다",3]
      ]
    },
    {
      q:"내 현타는 보통?",
      a:[
        ["거의 없다",0],
        ["가끔 온다",1],
        ["꽤 자주 온다",2],
        ["갑자기 인생 전체를 멈춰 세운다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"현실 적응형",
      name:"현타보다 회복이 빠른 사람",
      desc:"당신은 현실을 마주해도 오래 멈춰 있지 않는다. 힘든 순간이 와도 금방 할 일을 찾고, 감정이 깊게 내려가기 전에 일상으로 돌아온다. 현실감각은 있지만 그 현실에 오래 눌리지는 않는 사람이다.",
      traits:["현타가 오래가지 않음","일상 복귀가 빠름","비교에 크게 흔들리지 않음","현실을 비교적 담담히 봄"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 현타형",
      name:"잠깐 멍해졌다가 돌아오는 사람",
      desc:"당신은 가끔 현실을 맞고 멍해진다. 통장, 월요일, 남의 화려한 일상 앞에서 잠시 마음이 흔들리지만, 시간이 지나면 다시 평소의 나로 돌아온다. 현타는 오지만 생활을 완전히 멈추게 하지는 않는다.",
      traits:["가끔 공허함을 느낌","비교 후 금방 회복함","밤에 생각이 조금 많아짐","현실을 보며 다시 정리함"]
    },
    {
      min:12,
      max:17,
      icon:"🫥",
      type:"현실 타격형",
      name:"갑자기 조용히 인생 점검하는 사람",
      desc:"당신은 즐거운 순간 뒤에도 현실이 갑자기 크게 다가올 때가 있다. 웃다가도 통장, 미래, 일, 관계가 떠오르면 마음이 조용해진다. 겉으로는 아무렇지 않아 보여도 속으로는 자주 나를 점검한다.",
      traits:["즐거움 뒤 공허함이 옴","밤에 인생 생각이 많아짐","남과 비교하면 마음이 무거움","현실감에 자주 눌림"]
    },
    {
      min:18,
      max:24,
      icon:"🌑",
      type:"현타 폭격형",
      name:"현실 한 방에 영혼이 정지하는 사람",
      desc:"당신은 현타가 오면 마음이 크게 멈춘다. 방금까지 웃다가도 갑자기 내 현실, 내 미래, 내 통장이 선명해지고 에너지가 빠진다. 이 현타는 약함이 아니라, 내가 원하는 삶과 지금의 간격을 예민하게 느끼는 마음이다.",
      traits:["현타가 깊고 오래 감","갑자기 공허해질 때가 많음","미래 생각에 쉽게 눌림","비교와 현실감에 민감함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
