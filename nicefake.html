        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">착한척력</h1>
    <p class="sub">나는 속마음을 숨기고 얼마나 괜찮은 척하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"부탁을 받았는데 솔직히 하기 싫다.",
      a:[
        ["못 한다고 말한다",0],
        ["조금 고민하다 거절한다",1],
        ["일단 괜찮은 척한다",2],
        ["웃으면서 받지만 속으로 운다",3]
      ]
    },
    {
      q:"상대가 기분 나쁜 말을 했다.",
      a:[
        ["불편하다고 말한다",0],
        ["표정은 조금 굳는다",1],
        ["괜찮은 척 넘긴다",2],
        ["속으로는 이미 멀어졌다",3]
      ]
    },
    {
      q:"내가 손해 보는 상황이 생겼다.",
      a:[
        ["정확히 말한다",0],
        ["상황을 보고 말한다",1],
        ["분위기 때문에 참는다",2],
        ["괜찮다고 말하고 집 가서 곱씹는다",3]
      ]
    },
    {
      q:"누가 나를 계속 이용하는 것 같다.",
      a:[
        ["선을 긋는다",0],
        ["조심스럽게 거리 둔다",1],
        ["일단 티 안 낸다",2],
        ["착한 사람 역할에서 못 빠져나온다",3]
      ]
    },
    {
      q:"싫은 약속에 초대받았다.",
      a:[
        ["못 간다고 한다",0],
        ["핑계를 찾는다",1],
        ["가야 하나 고민한다",2],
        ["좋은 척하다가 에너지 방전된다",3]
      ]
    },
    {
      q:"상대가 내 배려를 당연하게 여긴다.",
      a:[
        ["그만하겠다고 말한다",0],
        ["조금 거리를 둔다",1],
        ["서운하지만 참는다",2],
        ["웃고 있지만 마음속엔 퇴사서가 있다",3]
      ]
    },
    {
      q:"화가 났는데 상대가 눈치 못 챈다.",
      a:[
        ["말로 설명한다",0],
        ["티는 조금 낸다",1],
        ["아무렇지 않은 척한다",2],
        ["속으로 혼자 재판을 연다",3]
      ]
    },
    {
      q:"내 착한 척 습관은?",
      a:[
        ["거의 없다",0],
        ["가끔 한다",1],
        ["꽤 자주 한다",2],
        ["이미 생활형 연기다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😎",
      type:"솔직 경계형",
      name:"착한 척보다 선 긋기가 빠른 사람",
      desc:"당신은 필요 이상으로 착한 사람 역할을 맡지 않는다. 불편하면 불편하다고 말하고, 하기 싫은 일에는 비교적 빠르게 선을 긋는다. 차가운 사람이 아니라 자기 마음을 방치하지 않는 사람이다.",
      traits:["거절이 비교적 빠름","불편한 점을 말할 수 있음","손해 보는 상황을 오래 참지 않음","착한 이미지에 덜 묶임"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"적당 배려형",
      name:"착하긴 한데 바보는 아닌 사람",
      desc:"당신은 배려를 하지만 무조건 참지는 않는다. 분위기를 보며 한두 번 맞춰주지만, 반복되면 조용히 거리를 둔다. 착해 보이고 싶다기보다 괜한 갈등을 만들고 싶지 않은 쪽에 가깝다.",
      traits:["배려와 거리두기를 함께 씀","한두 번은 맞춰줌","반복되면 마음이 식음","갈등을 크게 만들고 싶어 하지 않음"]
    },
    {
      min:12,
      max:17,
      icon:"😇",
      type:"괜찮은 척형",
      name:"웃으면서 마음속 계산서 쓰는 사람",
      desc:"당신은 싫어도 티를 잘 내지 않는다. 괜찮다고 말하지만 속으로는 조금씩 쌓이고, 웃으면서 넘긴 일들이 밤에 다시 떠오른다. 착한 사람으로 보이고 싶어서라기보다 불편한 공기를 견디기 싫어서 참는 경우가 많다.",
      traits:["괜찮다는 말을 자주 함","싫어도 바로 티 내지 않음","혼자 서운함을 쌓음","분위기 때문에 참는 일이 많음"]
    },
    {
      min:18,
      max:24,
      icon:"🎭",
      type:"착한 사람 고정형",
      name:"내 마음 빼고 모두에게 친절한 사람",
      desc:"당신은 착한 사람 역할을 너무 오래 맡아왔다. 싫은데 웃고, 힘든데 괜찮다 하고, 불편한데 상대 마음부터 챙긴다. 겉으로는 부드럽지만 속에서는 이미 여러 번 사직서를 쓴 사람이다.",
      traits:["거절이 매우 어려움","속마음을 오래 숨김","상대 기분을 먼저 챙김","혼자 지친 뒤 멀어질 수 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 착한척력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 착한척력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
