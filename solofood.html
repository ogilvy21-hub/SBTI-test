<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">혼밥력</h1>
    <p class="sub">나는 혼자 밥 먹는 시간을 얼마나 자연스럽게 즐기는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"점심시간에 같이 먹을 사람이 없다.",
      a:[
        ["조금 당황한다",0],
        ["근처 편한 곳을 찾는다",1],
        ["오히려 메뉴 고르기 편하다",2],
        ["혼밥 타임 확보라 기분 좋다",3]
      ]
    },
    {
      q:"혼자 식당에 들어가야 한다.",
      a:[
        ["괜히 눈치가 보인다",0],
        ["사람 적은 곳을 고른다",1],
        ["자연스럽게 들어간다",2],
        ["이미 메뉴판 스캔 끝났다",3]
      ]
    },
    {
      q:"직원이 몇 분이냐고 묻는다.",
      a:[
        ["살짝 민망하다",0],
        ["한 명이라고 작게 말한다",1],
        ["당당하게 한 명이라고 한다",2],
        ["혼자 온 내가 제일 효율적이다",3]
      ]
    },
    {
      q:"혼자 고기집에 가야 한다면?",
      a:[
        ["아직은 어렵다",0],
        ["사람 없는 시간엔 가능하다",1],
        ["먹고 싶으면 간다",2],
        ["고기는 원래 집중해서 먹는 음식이다",3]
      ]
    },
    {
      q:"혼밥 중 옆 테이블이 시끄럽다.",
      a:[
        ["괜히 더 신경 쓰인다",0],
        ["휴대폰을 본다",1],
        ["내 밥에 집중한다",2],
        ["내 세계에는 반찬과 나뿐이다",3]
      ]
    },
    {
      q:"혼자 맛집 웨이팅을 해야 한다.",
      a:[
        ["혼자는 좀 부담스럽다",0],
        ["짧으면 기다린다",1],
        ["먹고 싶으면 기다린다",2],
        ["오히려 혼자라 회전 빠를 것 같다",3]
      ]
    },
    {
      q:"혼밥할 때 휴대폰은?",
      a:[
        ["없으면 어색하다",0],
        ["거의 계속 본다",1],
        ["가끔 본다",2],
        ["밥이 맛있으면 휴대폰도 쉰다",3]
      ]
    },
    {
      q:"내 혼밥 스타일은?",
      a:[
        ["아직 누가 있어야 편하다",0],
        ["간단한 곳은 혼자 가능하다",1],
        ["대부분 혼자 잘 먹는다",2],
        ["혼밥은 내 소중한 식사 의식이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🥺",
      type:"혼밥 입문형",
      name:"혼자 앉으면 물부터 어색한 사람",
      desc:"당신은 혼자 밥 먹는 시간이 아직 조금 낯설다. 누가 보는 것도 아닌데 괜히 주변 시선이 신경 쓰이고, 주문할 때도 목소리가 작아진다. 그래도 한두 번 편한 곳부터 시작하면 생각보다 금방 익숙해질 사람이다.",
      traits:["혼자 식당 가는 게 아직 어색함","주변 시선을 신경 씀","휴대폰이 꼭 필요함","편한 장소부터 가능함"]
    },
    {
      min:6,
      max:11,
      icon:"🍙",
      type:"가벼운 혼밥형",
      name:"김밥집과 국밥집은 이미 내 구역인 사람",
      desc:"당신은 간단한 혼밥에는 꽤 익숙하다. 빠르게 먹고 나오는 식당이나 조용한 시간대에는 혼자도 괜찮다. 다만 오래 앉아야 하거나 분위기가 강한 식당은 아직 살짝 마음의 준비가 필요하다.",
      traits:["간단한 혼밥은 편함","사람 적은 시간대를 선호함","메뉴 선택이 빠름","조용한 식당을 좋아함"]
    },
    {
      min:12,
      max:17,
      icon:"🍜",
      type:"혼밥 안정형",
      name:"혼자 먹어야 음식 맛이 선명한 사람",
      desc:"당신은 혼밥을 어색해하지 않는다. 먹고 싶은 메뉴가 있으면 혼자서도 잘 간다. 대화를 맞추느라 정신없는 식사보다, 내 속도대로 먹는 시간이 더 편할 때가 많다. 혼자여도 식사는 충분히 괜찮다.",
      traits:["대부분의 식당을 혼자 갈 수 있음","먹고 싶은 메뉴를 우선함","혼자만의 속도를 좋아함","주변 시선에 크게 흔들리지 않음"]
    },
    {
      min:18,
      max:24,
      icon:"👑",
      type:"혼밥 고수형",
      name:"혼자 앉은 테이블이 제일 평화로운 사람",
      desc:"당신에게 혼밥은 외로움이 아니라 자유에 가깝다. 메뉴 선택, 식사 속도, 침묵까지 전부 내 마음대로다. 누군가와 먹는 밥도 좋지만, 혼자 먹는 밥에는 아무도 침범할 수 없는 작은 평화가 있다.",
      traits:["혼밥을 진심으로 즐김","어떤 식당도 크게 부담 없음","식사 시간을 혼자 누림","혼자여도 전혀 위축되지 않음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
