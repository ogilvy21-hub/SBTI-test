        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">불안예측력</h1>
    <p class="sub">나는 일어나지도 않은 일을 얼마나 먼저 걱정하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"연락이 평소보다 늦게 온다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 신경 쓰인다",1],
        ["무슨 일 있나 싶다",2],
        ["이미 최악의 시나리오가 열린다",3]
      ]
    },
    {
      q:"내일 중요한 일정이 있다.",
      a:[
        ["준비하고 쉰다",0],
        ["조금 긴장된다",1],
        ["여러 상황을 떠올린다",2],
        ["새벽에 리허설만 세 번 한다",3]
      ]
    },
    {
      q:"상사가 갑자기 보자고 했다.",
      a:[
        ["무슨 일인지 본다",0],
        ["살짝 긴장한다",1],
        ["혹시 문제인가 생각한다",2],
        ["머릿속에서 퇴사 면담까지 간다",3]
      ]
    },
    {
      q:"몸이 살짝 이상한 것 같다.",
      a:[
        ["쉬면 괜찮겠지 한다",0],
        ["조금 살핀다",1],
        ["검색해본다",2],
        ["검색하다 더 불안해진다",3]
      ]
    },
    {
      q:"돈이 예상보다 많이 나갔다.",
      a:[
        ["다음 달 조절한다",0],
        ["조금 아깝다",1],
        ["앞으로 지출을 걱정한다",2],
        ["노후까지 한 번에 걱정한다",3]
      ]
    },
    {
      q:"누가 평소보다 말수가 적다.",
      a:[
        ["피곤한가 보다 한다",0],
        ["조금 눈치 본다",1],
        ["나 때문인가 생각한다",2],
        ["관계가 틀어진 이유를 찾기 시작한다",3]
      ]
    },
    {
      q:"새로운 일을 시작해야 한다.",
      a:[
        ["일단 해본다",0],
        ["조금 걱정된다",1],
        ["실패 가능성을 따져본다",2],
        ["시작 전부터 엔딩까지 걱정한다",3]
      ]
    },
    {
      q:"내 걱정 스타일은?",
      a:[
        ["필요할 때만 한다",0],
        ["가끔 앞서 걱정한다",1],
        ["자주 미리 불안해한다",2],
        ["걱정이 먼저 출근하고 나는 뒤따라간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"현실 대응형",
      name:"일어나면 그때 보는 사람",
      desc:"당신은 아직 일어나지 않은 일을 오래 붙잡지 않는다. 걱정이 생겨도 지금 할 수 있는 것과 나중에 볼 일을 구분한다. 무모한 사람이 아니라, 불안을 필요 이상으로 키우지 않는 쪽에 가깝다.",
      traits:["미리 걱정에 오래 빠지지 않음","상황이 생긴 뒤 대응함","불안을 크게 키우지 않음","현재에 비교적 잘 머무름"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 대비형",
      name:"걱정은 하지만 금방 돌아오는 사람",
      desc:"당신은 걱정을 아예 안 하지는 않는다. 낯선 일정이나 애매한 반응 앞에서 잠깐 불안해지지만, 곧 현실적인 쪽으로 마음을 돌린다. 불안을 준비의 재료로 쓰는 편이다.",
      traits:["가끔 앞서 걱정함","그래도 현실 감각을 잃지 않음","준비하면 마음이 안정됨","불안에서 비교적 잘 빠져나옴"]
    },
    {
      min:12,
      max:17,
      icon:"😵‍💫",
      type:"시나리오 생성형",
      name:"아직 안 일어난 일도 예고편 보는 사람",
      desc:"당신은 작은 신호에서도 여러 가능성을 떠올린다. 답장이 늦거나 말투가 달라지면 마음속 예고편이 먼저 재생된다. 실제로는 별일 아닌 경우가 많지만, 그 전까지 마음은 이미 여러 장면을 지나간다.",
      traits:["작은 변화에 민감함","여러 상황을 미리 상상함","불안한 예고편이 자주 뜸","확인 전까지 마음이 바쁨"]
    },
    {
      min:18,
      max:24,
      icon:"🌪️",
      type:"최악 대비형",
      name:"걱정이 미래에서 먼저 다녀온 사람",
      desc:"당신의 불안은 속도가 빠르다. 아직 아무 일도 일어나지 않았는데 마음은 이미 결과, 후폭풍, 대처법까지 다녀온다. 그만큼 조심성은 크지만, 가끔은 일어나지도 않은 일 때문에 오늘의 에너지를 먼저 써버린다.",
      traits:["최악의 경우를 먼저 떠올림","확인 전까지 마음이 쉽게 흔들림","걱정의 속도가 빠름","미래 생각으로 현재 에너지를 많이 씀"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 불안예측력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 불안예측력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
