        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">정색력</h1>
    <p class="sub">나는 얼마나 순식간에 표정이 굳는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"재미없는 농담을 들었다.",
      a:[
        ["그래도 웃어준다",0],
        ["살짝 웃고 넘긴다",1],
        ["입꼬리만 움직인다",2],
        ["표정이 먼저 퇴근한다",3]
      ]
    },
    {
      q:"상대가 선 넘는 말을 했다.",
      a:[
        ["좋게 넘긴다",0],
        ["조금 불편해진다",1],
        ["표정 관리가 흔들린다",2],
        ["그 자리에서 얼굴이 닫힌다",3]
      ]
    },
    {
      q:"갑자기 억지 리액션을 해야 한다.",
      a:[
        ["잘 맞춰준다",0],
        ["어느 정도는 한다",1],
        ["티가 조금 난다",2],
        ["영혼이 없는 게 얼굴에 뜬다",3]
      ]
    },
    {
      q:"누가 뻔한 거짓말을 한다.",
      a:[
        ["일단 들어준다",0],
        ["속으로만 눈치챈다",1],
        ["눈빛이 차가워진다",2],
        ["얼굴에 '그걸 믿으라고?'가 뜬다",3]
      ]
    },
    {
      q:"단체사진을 찍어야 한다.",
      a:[
        ["자연스럽게 웃는다",0],
        ["웃으려고 노력한다",1],
        ["어색하게 굳는다",2],
        ["웃는 법을 잠깐 잊는다",3]
      ]
    },
    {
      q:"기분 나쁜 말을 들었는데 분위기는 좋다.",
      a:[
        ["분위기 맞춰 넘긴다",0],
        ["잠깐 굳었다가 푼다",1],
        ["웃긴 하는데 눈이 안 웃는다",2],
        ["내 표정이 먼저 항의한다",3]
      ]
    },
    {
      q:"회의에서 말도 안 되는 의견이 나왔다.",
      a:[
        ["일단 존중한다",0],
        ["속으로만 놀란다",1],
        ["표정이 살짝 새어 나온다",2],
        ["얼굴이 자동으로 심사위원이 된다",3]
      ]
    },
    {
      q:"내 표정 관리 능력은?",
      a:[
        ["꽤 좋은 편이다",0],
        ["보통은 된다",1],
        ["가끔 티가 난다",2],
        ["내 얼굴은 비밀을 못 지킨다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😊",
      type:"리액션 생존형",
      name:"웃음으로 웬만하면 넘기는 사람",
      desc:"당신은 표정 관리가 꽤 안정적이다. 불편한 상황에서도 바로 얼굴에 드러내지 않고, 일단 분위기를 맞춰준다. 속마음이 없어서가 아니라, 굳이 그 자리에서 티 내지 않는 쪽을 선택하는 사람이다.",
      traits:["표정 관리가 좋은 편","분위기를 먼저 생각함","어색한 상황도 잘 넘김","리액션 생존력이 있음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"살짝 굳음형",
      name:"웃고 있지만 눈은 체크 중인 사람",
      desc:"당신은 기본적으로는 잘 맞춰주지만, 불편한 순간에는 눈빛이 먼저 반응한다. 웃고 있어도 완전히 웃는 건 아니고, 상대의 말과 분위기를 조용히 재고 있다. 그래도 선을 넘기 전까지는 티를 크게 내지 않는다.",
      traits:["겉으로는 무난하게 대응함","눈빛에 감정이 조금 드러남","불편함을 어느 정도 참음","선을 넘으면 표정이 흔들림"]
    },
    {
      min:12,
      max:17,
      icon:"😐",
      type:"표정 누수형",
      name:"속마음이 얼굴에 자막으로 뜨는 사람",
      desc:"당신의 얼굴은 마음보다 빠르다. 머리로는 참아야 한다고 생각해도 눈썹, 입꼬리, 시선이 먼저 반응한다. 말로는 괜찮다고 해도 얼굴은 이미 회의록을 작성하고 있다.",
      traits:["표정에 생각이 잘 드러남","억지 리액션에 약함","불편하면 얼굴이 먼저 굳음","주변에서 표정 얘기를 들은 적 있음"]
    },
    {
      min:18,
      max:24,
      icon:"🧊",
      type:"냉동 표정형",
      name:"표정으로 이미 대답 끝낸 사람",
      desc:"당신은 마음에 안 드는 순간 얼굴이 바로 문을 닫는다. 억지 웃음은 오래 가지 않고, 선 넘는 말 앞에서는 눈빛부터 차가워진다. 말은 안 해도 표정 하나로 충분히 많은 내용을 전달한다.",
      traits:["정색 전환 속도가 빠름","억지 웃음 지속 시간이 짧음","불편하면 바로 얼굴에 드러남","표정 하나로 분위기를 바꿈"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;

  function startQuiz(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResult = results.find(r => score >= r.min && score <= r.max);

    document.getElementById("resultIcon").innerText = finalResult.icon;
    document.getElementById("resultType").innerText = finalResult.type;
    document.getElementById("resultName").innerText = finalResult.name;
    document.getElementById("resultDesc").innerText = finalResult.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";
    finalResult.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    document.getElementById("result").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const text = `SBTI 정색력 테스트 결과: ${finalResult.name}`;
    const url = location.href;

    if(navigator.share){
      navigator.share({
        title:"SBTI 정색력 테스트",
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(`${text}\n${url}`);
      alert("결과 링크가 복사됐습니다.");
    }
  }
</script>
