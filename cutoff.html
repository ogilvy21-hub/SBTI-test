<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">손절력</h1>
    <p class="sub">나는 관계를 잘 끊는 편일까, 오래 끄는 편일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대가 계속 나를 함부로 대한다.",
      a:[
        ["그래도 좋게 생각한다",0],
        ["조금 거리를 둔다",1],
        ["마음속으로 선을 긋는다",2],
        ["바로 관계 정리 모드가 켜진다",3]
      ]
    },
    {
      q:"반복해서 실망한 사람이 있다.",
      a:[
        ["한 번 더 믿어본다",0],
        ["조심스럽게 지켜본다",1],
        ["기대치를 낮춘다",2],
        ["내 마음속 연락처에서 삭제한다",3]
      ]
    },
    {
      q:"상대가 사과 없이 넘어가려 한다.",
      a:[
        ["그냥 넘긴다",0],
        ["살짝 서운하다",1],
        ["그 사람을 다르게 보기 시작한다",2],
        ["그 순간 정이 크게 떨어진다",3]
      ]
    },
    {
      q:"관계가 나를 계속 지치게 한다.",
      a:[
        ["내가 더 맞춰본다",0],
        ["잠시 쉬어간다",1],
        ["거리를 두기 시작한다",2],
        ["조용히 빠져나갈 준비를 한다",3]
      ]
    },
    {
      q:"상대가 내 선을 넘었다.",
      a:[
        ["말하지 못하고 참는다",0],
        ["조심스럽게 말한다",1],
        ["분명히 선을 긋는다",2],
        ["두 번 다시 같은 자리를 안 준다",3]
      ]
    },
    {
      q:"오래된 인연이지만 불편하다.",
      a:[
        ["오래됐으니 참는다",0],
        ["어쩔 수 없이 유지한다",1],
        ["만나는 횟수를 줄인다",2],
        ["오래됐다는 이유만으로 붙잡지 않는다",3]
      ]
    },
    {
      q:"내가 먼저 연락을 끊어야 할 때",
      a:[
        ["잘 못 한다",0],
        ["한참 고민한다",1],
        ["필요하면 한다",2],
        ["마음 정리되면 바로 조용해진다",3]
      ]
    },
    {
      q:"내 손절 방식은?",
      a:[
        ["끝까지 붙잡는 편이다",0],
        ["천천히 멀어진다",1],
        ["선을 넘으면 정리한다",2],
        ["마음 닫히면 다시 잘 안 열린다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🥺",
      type:"관계 붙잡기형",
      name:"상처받아도 오래 남아있는 사람",
      desc:"당신은 사람을 쉽게 끊지 못한다. 실망해도 한 번 더 이해하려 하고, 상처받아도 오래된 정을 먼저 생각한다. 다정한 사람이지만, 가끔은 그 다정함 때문에 나를 너무 늦게 구한다.",
      traits:["관계를 쉽게 포기하지 않음","상대 사정을 많이 생각함","오래된 정에 약함","손절보다 참는 쪽이 익숙함"]
    },
    {
      min:6,
      max:11,
      icon:"😶",
      type:"느린 거리두기형",
      name:"정리까지 시간이 필요한 사람",
      desc:"당신은 바로 끊지는 않지만, 마음속 거리는 조금씩 조절한다. 처음에는 참다가 반복되면 연락 빈도를 줄이고, 기대를 낮춘다. 겉으로는 평소처럼 보여도 안에서는 이미 정리표가 만들어진다.",
      traits:["천천히 멀어지는 편","기대치를 조용히 낮춤","반복된 실망을 기억함","관계 정리에 시간이 걸림"]
    },
    {
      min:12,
      max:17,
      icon:"✂️",
      type:"선 긋기형",
      name:"참다가 정확히 끊는 사람",
      desc:"당신은 무조건 참지도, 무조건 끊지도 않는다. 하지만 선을 넘었다고 느끼면 태도가 분명해진다. 한 번 마음이 돌아서면 예전처럼 대하기 어렵고, 필요 없는 감정 소모를 줄이려 한다.",
      traits:["선을 넘으면 분명히 반응함","불편한 관계를 오래 두지 않음","마음 정리 후 회복이 빠름","관계 기준이 비교적 뚜렷함"]
    },
    {
      min:18,
      max:24,
      icon:"🚪",
      type:"손절 고속형",
      name:"마음 닫히면 문까지 잠그는 사람",
      desc:"당신은 마음이 닫히는 순간이 분명하다. 계속 실망시키는 사람, 선을 넘는 사람, 사과 없이 넘어가는 사람에게 오래 머물지 않는다. 냉정해 보일 수 있지만, 당신에게는 나를 지키는 방식이다.",
      traits:["손절 속도가 빠름","반복된 실망을 잘 기억함","마음 닫히면 잘 돌아가지 않음","내 평화를 우선함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
