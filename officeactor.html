<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
  --color-background-primary:#fff;
  --color-background-secondary:#f5f5f5;
  --color-background-danger:#fff1f2;
  --color-text-primary:#111;
  --color-text-secondary:#555;
  --color-text-tertiary:#888;
  --color-text-danger:#e11d48;
  --color-border-primary:#222;
  --color-border-secondary:#d9d9d9;
  --color-border-tertiary:#e5e5e5;
  --color-border-danger:#f43f5e;
  --border-radius-lg:16px;
  --border-radius-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f3f3f3}
#app{max-width:560px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}
.screen.active{display:block}
.tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;padding:4px 10px;border-radius:20px;background:#fff1f2;color:#e11d48;margin-bottom:1rem}
h1{font-size:30px;line-height:1.2;margin-bottom:.8rem}
.sub{font-size:15px;color:#555;line-height:1.6;margin-bottom:1.5rem}
.divider{height:1px;background:#ddd;margin:1.3rem 0}
.start-btn,.retry-btn{width:100%;padding:15px;border:none;border-radius:16px;background:#111;color:#fff;font-size:15px;cursor:pointer}
.prog-wrap{margin-bottom:1.4rem}
.prog-bar{height:6px;background:#e8e8e8;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;width:0%;background:#e11d48;transition:.25s}
.prog-label{margin-top:.5rem;font-size:12px;color:#777}
.q-num{font-size:12px;color:#e11d48;margin-bottom:.4rem}
.q-text{font-size:22px;line-height:1.45;margin-bottom:1.2rem}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{width:100%;text-align:left;border:1px solid #ddd;background:#fff;padding:15px;border-radius:16px;font-size:15px;line-height:1.5;cursor:pointer;transition:.15s}
.choice:hover{border-color:#f43f5e;background:#fff1f2}
.choice.selected{border-color:#e11d48;background:#fff1f2}
.nav-row{display:flex;gap:10px;margin-top:1.2rem}
.nav-btn{flex:1;padding:13px;border-radius:14px;border:none;background:#e8e8e8;cursor:pointer}
.nav-btn.next{background:#111;color:#fff}
.result-icon{display:block;text-align:center;font-size:54px;margin-bottom:1rem}
.result-type{text-align:center;font-size:14px;color:#e11d48;margin-bottom:.4rem;font-weight:600}
.result-name{text-align:center;font-size:38px;margin-bottom:1rem;font-weight:700}
.score-bar-wrap{width:100%;height:14px;border-radius:999px;background:#ececec;overflow:hidden;margin-bottom:1.5rem}
.score-bar-fill{height:100%;width:0%;background:#e11d48;transition:1s}
.result-desc{background:#f5f5f5;border-radius:20px;padding:1.5rem;line-height:1.8;color:#555;font-size:15px;margin-bottom:1.5rem}
.traits{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.trait{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:14px;font-size:15px;color:#444}
.trait strong{display:block;color:#888;font-size:12px;margin-bottom:5px}
.home-link{display:inline-block;margin-top:1rem;font-size:13px;color:#888;text-decoration:none}
.adsense-inpost-bottom{margin:24px 0 8px}
</style>

<div id="app">

<div id="intro" class="screen active">
  <div class="tag">SBTI 사회생활연기력 테스트</div>
  <h1>출근하면 자동으로<br>연기 모드가 켜질까?</h1>
  <p class="sub">
    속마음은 이미 퇴근했는데 입은 웃고 있는 사람.<br>
    영혼은 OFF인데 직장인 모드는 ON 되는 사람.<br><br>
    당신의 사회생활연기력을 확인해보세요.
  </p>
  <div class="divider"></div>
  <button class="start-btn" onclick="startQuiz()">테스트 시작하기</button>
  <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
</div>

<div id="quiz" class="screen">
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="prog-label" id="prog-label">1 / 8</div>
  </div>

  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="choices" id="choices"></div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevQ()">이전</button>
    <button class="nav-btn next" id="next-btn" onclick="nextQ()" disabled>다음</button>
  </div>
</div>

<div id="result" class="screen">
  <span class="result-icon" id="r-icon"></span>
  <div class="result-type" id="r-type"></div>
  <div class="result-name" id="r-name"></div>

  <div class="score-bar-wrap">
    <div class="score-bar-fill" id="r-bar"></div>
  </div>

  <div class="result-desc" id="r-desc"></div>
  <div class="traits" id="r-traits"></div>

  <button class="retry-btn" onclick="restart()">다시 테스트하기</button>

  <div class="adsense-slot adsense-inpost-bottom">
    <ins class="adsbygoogle"
         style="display:block; width:100%;"
         data-ad-client="ca-pub-6295549457389423"
         data-ad-slot="4063532035"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
</div>

</div>

<script>
const questions=[
{
q:"출근하자마자 누가 밝게 인사했다.",
a:[
["내 기분 그대로 반응한다",0],
["적당히 인사한다",1],
["웃으면서 받아준다",2],
["피곤해도 완전 밝은 척한다",3]
]
},
{
q:"회의에서 별로인 아이디어가 나왔다.",
a:[
["표정에 티가 난다",0],
["말은 아끼고 듣는다",1],
["괜찮은 부분을 찾아 말한다",2],
["진심 아닌 리액션도 자연스럽게 한다",3]
]
},
{
q:"상사가 재미없는 농담을 했다.",
a:[
["못 웃겠다",0],
["어색하게 웃는다",1],
["사회적 웃음은 가능하다",2],
["마치 웃긴 것처럼 완벽히 받아준다",3]
]
},
{
q:"속으로는 화났는데 겉으로는",
a:[
["티가 바로 난다",0],
["조금 숨긴다",1],
["대체로 참는다",2],
["웃으면서 업무 이야기까지 한다",3]
]
},
{
q:"회사 사람과 사적인 대화를 해야 할 때",
a:[
["불편하면 티난다",0],
["짧게 맞춘다",1],
["분위기 맞춰 대화한다",2],
["관심 있는 척까지 잘한다",3]
]
},
{
q:"퇴근 직전 일이 생겼다.",
a:[
["짜증이 바로 난다",0],
["표정 관리가 어렵다",1],
["일단 침착하게 대응한다",2],
["속은 무너져도 겉은 프로다",3]
]
},
{
q:"회사에서 나의 실제 모습은",
a:[
["거의 그대로다",0],
["조금 다르다",1],
["꽤 다르다",2],
["회사 자아가 따로 있다",3]
]
},
{
q:"사회생활 멘트가 필요한 순간",
a:[
["잘 못한다",0],
["필요하면 한다",1],
["꽤 자연스럽게 한다",2],
["자동으로 대사가 나온다",3]
]
}
];

const results=[
{
min:0,max:5,
icon:"🌿",
type:"솔직 출근형",
name:"연기 거의 없음",
desc:"회사에서도 감정이 비교적 그대로 드러나는 타입입니다. 억지로 꾸미거나 과하게 맞추기보다 솔직한 반응이 먼저 나옵니다.",
traits:["표정 솔직함","연기 적음","감정 숨김 약함","담백한 편"]
},
{
min:6,max:11,
icon:"🙂",
type:"기본 사회형",
name:"필요할 때만 연기하는 사람",
desc:"사회생활에 필요한 정도의 표정 관리와 말투 조절은 가능한 타입입니다. 과하게 연기하진 않지만, 분위기에 맞출 줄 압니다.",
traits:["기본 사회성","적당한 리액션","상황 조절","현실형"]
},
{
min:12,max:17,
icon:"🎬",
type:"직장인 모드형",
name:"출근하면 다른 사람",
desc:"회사에서는 실제 감정보다 사회적 얼굴이 먼저 나오는 타입입니다. 피곤해도 웃고, 싫어도 맞춰주며, 업무용 자아를 꽤 잘 운영합니다.",
traits:["표정 관리 가능","업무용 자아 있음","리액션 능숙","속마음 숨김"]
},
{
min:18,max:24,
icon:"🎭",
type:"사회생활연기 MAX형",
name:"직장인 페르소나 장인",
desc:"회사에 들어가는 순간 완전히 다른 모드가 켜지는 타입입니다. 속으로는 퇴근을 외치고 있어도 겉으로는 친절하고 프로페셔널해 보입니다.",
traits:["페르소나 강함","영혼 OFF 가능","사회적 대사 자동화","퇴근 후 방전"]
}
];

let current=0;
let scores=[];

function startQuiz(){
  current=0;
  scores=[];
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){
  const q=questions[current];

  document.getElementById("prog").style.width=((current)/questions.length)*100+"%";
  document.getElementById("prog-label").innerText=(current+1)+" / "+questions.length;
  document.getElementById("q-num").innerText="Q"+(current+1);
  document.getElementById("q-text").innerText=q.q;

  const wrap=document.getElementById("choices");
  wrap.innerHTML="";

  q.a.forEach((item)=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.innerText=item[0];

    btn.onclick=()=>{
      document.querySelectorAll(".choice").forEach(el=>el.classList.remove("selected"));
      btn.classList.add("selected");
      scores[current]=item[1];
      document.getElementById("next-btn").disabled=false;
    };

    wrap.appendChild(btn);
  });

  document.getElementById("next-btn").disabled=true;
}

function nextQ(){
  if(current<questions.length-1){
    current++;
    renderQuestion();
  }else{
    showResult();
  }
}

function prevQ(){
  if(current===0)return;
  current--;
  renderQuestion();
}

function showResult(){
  const total=scores.reduce((a,b)=>a+b,0);
  const result=results.find(r=>total>=r.min&&total<=r.max);

  showScreen("result");

  document.getElementById("r-icon").innerText=result.icon;
  document.getElementById("r-type").innerText=result.type;
  document.getElementById("r-name").innerText=result.name;
  document.getElementById("r-desc").innerText=result.desc;
  document.getElementById("r-bar").style.width=((total/24)*100)+"%";

  document.getElementById("r-traits").innerHTML=result.traits.map(t=>`
    <div class="trait">
      <strong>특징</strong>
      ${t}
    </div>
  `).join("");
}

function restart(){
  showScreen("intro");
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(el=>el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>
