<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">사회생활연기력</h1>
    <p class="sub">나는 사람들 앞에서 얼마나 사회용 캐릭터로 살아가는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"회사에 도착하자마자 나는?",
      a:[
        ["그냥 평소의 나다",0],
        ["조금 차분해진다",1],
        ["사회용 표정이 켜진다",2],
        ["출근과 동시에 다른 인격이 로그인한다",3]
      ]
    },
    {
      q:"싫은 사람과 대화해야 한다.",
      a:[
        ["티가 조금 난다",0],
        ["예의 있게 대한다",1],
        ["웃으면서 맞춰준다",2],
        ["속마음과 정반대 얼굴로 대한다",3]
      ]
    },
    {
      q:"상사가 별로 안 웃긴 농담을 했다.",
      a:[
        ["안 웃기면 안 웃는다",0],
        ["살짝 웃는다",1],
        ["적당히 리액션한다",2],
        ["방청객처럼 반응한다",3]
      ]
    },
    {
      q:"회의에서 이해 안 되는 말이 나왔다.",
      a:[
        ["모른다고 묻는다",0],
        ["조심스럽게 확인한다",1],
        ["일단 고개를 끄덕인다",2],
        ["이해한 사람처럼 표정 연기한다",3]
      ]
    },
    {
      q:"기분이 안 좋은데 사람을 만나야 한다.",
      a:[
        ["기분이 드러난다",0],
        ["조금 숨긴다",1],
        ["괜찮은 척한다",2],
        ["밝은 사람 역할까지 수행한다",3]
      ]
    },
    {
      q:"단체 대화에서 분위기가 어색하다.",
      a:[
        ["그냥 둔다",0],
        ["조금 불편하다",1],
        ["말을 보태본다",2],
        ["내가 분위기 담당처럼 움직인다",3]
      ]
    },
    {
      q:"퇴근 후 집에 오면?",
      a:[
        ["그냥 쉰다",0],
        ["조금 피곤하다",1],
        ["말수가 줄어든다",2],
        ["사회용 캐릭터가 로그아웃된다",3]
      ]
    },
    {
      q:"내 사회생활 연기는?",
      a:[
        ["거의 안 한다",0],
        ["필요할 때 조금 한다",1],
        ["꽤 자주 한다",2],
        ["이미 직장용 부캐가 따로 있다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"자연 출근형",
      name:"회사에서도 나를 크게 안 바꾸는 사람",
      desc:"당신은 사회생활을 하면서도 자신을 크게 바꾸지 않는다. 싫은 건 어느 정도 티가 나고, 모르면 묻고, 억지 리액션도 오래 하지 않는다. 눈치가 없는 게 아니라 과한 연기로 스스로를 소모하지 않는 사람이다.",
      traits:["사회용 얼굴이 크지 않음","모르는 건 비교적 잘 물음","억지 리액션을 오래 못 함","퇴근 후 피로가 비교적 적음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"기본 사회형",
      name:"필요한 만큼만 회사용 얼굴 쓰는 사람",
      desc:"당신은 사회생활에서 필요한 정도의 연기는 한다. 싫어도 예의 있게 대하고, 어색한 상황에서는 적당히 맞춘다. 다만 내 모습을 완전히 숨길 정도는 아니라서 퇴근 후에도 크게 무너지지는 않는다.",
      traits:["기본적인 표정 관리가 가능함","상황에 맞춰 말투를 조절함","예의상 리액션을 할 수 있음","사회적 피로를 어느 정도 관리함"]
    },
    {
      min:12,
      max:17,
      icon:"🎭",
      type:"직장 부캐형",
      name:"출근하면 다른 버전으로 사는 사람",
      desc:"당신은 회사나 모임에서 사회용 캐릭터를 꽤 자주 꺼낸다. 괜찮은 척하고, 웃긴 척하고, 이해한 척하면서 하루를 넘긴다. 사람들과 잘 지내는 능력은 있지만, 그만큼 혼자 있을 때 방전되기 쉽다.",
      traits:["회사용 표정이 따로 있음","어색한 상황을 자주 수습함","싫어도 웃으며 넘김","퇴근 후 혼자 회복이 필요함"]
    },
    {
      min:18,
      max:24,
      icon:"🫥",
      type:"사회생활 배우형",
      name:"출근하면 자아가 의상 갈아입는 사람",
      desc:"당신은 사회생활에서 거의 연기자처럼 산다. 상사의 농담에 웃고, 이해한 척 고개를 끄덕이고, 힘든 날에도 밝은 사람 역할을 맡는다. 그 연기는 당신을 지켜주지만, 집에 오면 본체가 조용히 쓰러질 수 있다.",
      traits:["사회용 부캐가 강함","속마음과 겉표정이 자주 다름","리액션과 표정 연기가 능숙함","퇴근 후 급격히 방전됨"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
