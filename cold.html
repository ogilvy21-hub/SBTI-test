        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">정뚝떨력</h1>
    <p class="sub">나는 어떤 순간에 얼마나 빠르게 정이 떨어지는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대가 약한 사람에게 함부로 대한다.",
      a:[
        ["상황을 더 본다",0],
        ["조금 불편하다",1],
        ["마음이 식기 시작한다",2],
        ["그 순간 정이 크게 떨어진다",3]
      ]
    },
    {
      q:"상대가 계산할 때 유난히 이기적이다.",
      a:[
        ["그럴 수도 있다",0],
        ["살짝 신경 쓰인다",1],
        ["사람이 달라 보인다",2],
        ["마음속 호감이 바로 접힌다",3]
      ]
    },
    {
      q:"상대가 허세를 심하게 부린다.",
      a:[
        ["웃고 넘긴다",0],
        ["조금 민망하다",1],
        ["매력이 줄어든다",2],
        ["갑자기 멀리서 보게 된다",3]
      ]
    },
    {
      q:"상대가 사과해야 할 상황을 넘긴다.",
      a:[
        ["나중에 하겠지 한다",0],
        ["조금 서운하다",1],
        ["신뢰가 흔들린다",2],
        ["그 순간 마음이 닫힌다",3]
      ]
    },
    {
      q:"상대가 남을 무시하는 말을 한다.",
      a:[
        ["그냥 듣는다",0],
        ["불편하게 느낀다",1],
        ["다르게 보인다",2],
        ["정이 차갑게 식는다",3]
      ]
    },
    {
      q:"상대가 말과 행동이 너무 다르다.",
      a:[
        ["그럴 수도 있다",0],
        ["조금 의아하다",1],
        ["신뢰가 줄어든다",2],
        ["이미 마음속 체크아웃이다",3]
      ]
    },
    {
      q:"상대가 내 배려를 당연하게 여긴다.",
      a:[
        ["처음엔 넘긴다",0],
        ["조금 서운하다",1],
        ["거리 두고 싶어진다",2],
        ["정이 뚝 떨어진다",3]
      ]
    },
    {
      q:"내 정뚝떨 버튼은?",
      a:[
        ["잘 안 눌린다",0],
        ["가끔 눌린다",1],
        ["꽤 빨리 눌린다",2],
        ["한 번 눌리면 복구가 어렵다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"느린 판단형",
      name:"한 번쯤은 더 지켜보는 사람",
      desc:"당신은 쉽게 정을 접지 않는다. 불편한 장면을 봐도 바로 판단하기보다 상황을 더 보려 한다. 사람을 오래 보고 결정하는 편이라 관계가 쉽게 흔들리지는 않지만, 반복되면 조용히 마음이 멀어진다.",
      traits:["사람을 쉽게 판단하지 않음","상황을 더 보려 함","관계 유지력이 있음","반복되면 천천히 식음"]
    },
    {
      min:6,
      max:11,
      icon:"😶",
      type:"조용한 식음형",
      name:"티는 안 내도 마음 온도 내려가는 사람",
      desc:"당신은 한 번에 확 돌아서지는 않지만, 불편한 장면을 보면 마음속 온도가 내려간다. 상대에게 바로 말하지는 않아도 이전처럼 편하게 보기는 어렵다. 정이 떨어지는 속도보다 표정 관리가 더 빠른 편이다.",
      traits:["불편한 장면을 기억함","겉으로 티를 크게 내지 않음","마음속 온도가 천천히 내려감","신뢰가 줄면 거리 둠"]
    },
    {
      min:12,
      max:17,
      icon:"🧊",
      type:"정뚝떨 감지형",
      name:"작은 행동 하나에 사람 다시 보는 사람",
      desc:"당신은 사람의 말보다 행동에서 정이 떨어진다. 무례함, 이기심, 사과 없는 태도 같은 장면을 보면 호감이 빠르게 줄어든다. 한 번 다르게 보이면 예전처럼 돌려놓기까지 시간이 걸린다.",
      traits:["행동에서 마음이 많이 움직임","무례함에 민감함","사과 없는 태도에 약함","한 번 식으면 회복이 느림"]
    },
    {
      min:18,
      max:24,
      icon:"❄️",
      type:"정뚝떨 고속형",
      name:"정 떨어지는 소리가 들리는 사람",
      desc:"당신은 정이 떨어지는 순간이 매우 선명하다. 별것 아닌 말투, 무례한 행동, 얄팍한 태도 하나가 마음속 스위치를 끈다. 냉정해 보일 수 있지만, 당신에게 호감은 신뢰와 존중이 무너지면 오래 버티지 못한다.",
      traits:["정이 식는 속도가 빠름","무례한 행동에 바로 반응함","한 번 닫히면 회복이 어려움","사람 보는 기준이 분명함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
