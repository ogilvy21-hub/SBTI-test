<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">눈물력</h1>
    <p class="sub">나는 감정이 차오르면 얼마나 쉽게 눈물이 나는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"감동적인 영상을 봤다.",
      a:[
        ["담담하게 본다",0],
        ["조금 찡하다",1],
        ["눈물이 살짝 고인다",2],
        ["이미 휴지를 찾는다",3]
      ]
    },
    {
      q:"누가 따뜻하게 위로해줬다.",
      a:[
        ["고맙다고 한다",0],
        ["마음이 조금 풀린다",1],
        ["목이 살짝 메인다",2],
        ["괜찮다는 말 하다가 운다",3]
      ]
    },
    {
      q:"억울한 일이 생겼다.",
      a:[
        ["차분히 말한다",0],
        ["조금 답답하다",1],
        ["눈물이 날까 봐 말이 줄어든다",2],
        ["화났는데 눈물부터 나온다",3]
      ]
    },
    {
      q:"영화 속 이별 장면을 봤다.",
      a:[
        ["그냥 본다",0],
        ["조금 슬프다",1],
        ["눈가가 뜨거워진다",2],
        ["내 일처럼 울컥한다",3]
      ]
    },
    {
      q:"혼자 힘든 하루를 보냈다.",
      a:[
        ["그냥 쉰다",0],
        ["조금 지친다",1],
        ["씻다가 울컥한다",2],
        ["불 끄면 바로 눈물이 난다",3]
      ]
    },
    {
      q:"고마운 말을 들었다.",
      a:[
        ["기분 좋게 듣는다",0],
        ["마음이 따뜻해진다",1],
        ["살짝 울컥한다",2],
        ["고마운데 눈물이 먼저 난다",3]
      ]
    },
    {
      q:"누가 '괜찮아?'라고 물었다.",
      a:[
        ["응 괜찮아 한다",0],
        ["잠깐 멈춘다",1],
        ["그 말에 흔들린다",2],
        ["그 질문이 눈물 버튼이다",3]
      ]
    },
    {
      q:"내 눈물은 보통?",
      a:[
        ["잘 안 나는 편이다",0],
        ["가끔 난다",1],
        ["꽤 쉽게 난다",2],
        ["감정이 차오르면 바로 나온다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"담담 저장형",
      name:"눈물보다 생각이 먼저인 사람",
      desc:"당신은 감정이 생겨도 바로 눈물로 나오지는 않는다. 슬프거나 감동적인 순간에도 먼저 상황을 이해하고 마음속에 조용히 저장한다. 차가운 사람이 아니라 감정이 천천히 올라오는 사람이다.",
      traits:["눈물이 쉽게 나지 않음","감정을 조용히 정리함","사람들 앞에서 담담함","눈물보다 생각이 먼저 움직임"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 울컥형",
      name:"찡하긴 해도 금방 참는 사람",
      desc:"당신은 감정적인 장면 앞에서 마음이 흔들리지만, 눈물이 바로 쏟아지지는 않는다. 위로와 감동에 약하고, 억울한 순간에는 눈가가 뜨거워질 때가 있다. 그래도 대부분은 스스로를 다독이며 넘긴다.",
      traits:["감동에 살짝 약함","위로받으면 마음이 풀림","억울하면 울컥함","대부분은 참을 수 있음"]
    },
    {
      min:12,
      max:17,
      icon:"🥹",
      type:"눈가 대기형",
      name:"괜찮다 하면서 눈물 고이는 사람",
      desc:"당신은 감정이 어느 정도 차오르면 눈물 신호가 빠르게 온다. 고마움, 억울함, 위로, 슬픈 장면이 마음을 건드리면 얼굴이 먼저 반응한다. 울고 싶어서 우는 게 아니라 마음이 몸보다 먼저 차오르는 사람이다.",
      traits:["눈물이 고이는 일이 잦음","위로와 감동에 약함","억울하면 말보다 눈물이 먼저 남","혼자 있을 때 감정이 풀림"]
    },
    {
      min:18,
      max:24,
      icon:"😭",
      type:"눈물 자동재생형",
      name:"감정 들어오면 바로 수도꼭지 열리는 사람",
      desc:"당신은 감정이 깊게 들어오면 눈물이 빠르게 따라온다. 슬퍼도 울고, 고마워도 울고, 화가 나도 운다. 약해서가 아니라 마음이 작은 자극도 크게 받아들이는 섬세한 사람이다.",
      traits:["눈물이 빠르게 나옴","감동과 위로에 매우 약함","화가 나도 눈물이 남","감정이 얼굴에 바로 드러남"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
