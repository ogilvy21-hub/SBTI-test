<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">결정장애력</h1>
    <p class="sub">나는 작은 선택 앞에서 얼마나 오래 멈춰 서는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"점심 메뉴를 골라야 한다.",
      a:[
        ["바로 고른다",0],
        ["몇 개 중에 고른다",1],
        ["계속 고민한다",2],
        ["남이 정해주길 기다린다",3]
      ]
    },
    {
      q:"옷을 사야 한다.",
      a:[
        ["필요한 걸 바로 산다",0],
        ["색상 정도만 고민한다",1],
        ["후기와 사이즈를 오래 본다",2],
        ["결국 장바구니만 무거워진다",3]
      ]
    },
    {
      q:"카페에서 음료를 고른다.",
      a:[
        ["늘 먹던 걸 시킨다",0],
        ["잠깐 보고 고른다",1],
        ["메뉴판 앞에서 멈춘다",2],
        ["뒤 사람 눈치에 아무거나 말한다",3]
      ]
    },
    {
      q:"친구가 아무거나 먹자고 한다.",
      a:[
        ["그럼 이거 먹자고 한다",0],
        ["몇 개 제안한다",1],
        ["나도 아무거나라며 미룬다",2],
        ["아무거나라는 말이 제일 어렵다",3]
      ]
    },
    {
      q:"두 가지 선택지가 비슷하다.",
      a:[
        ["더 끌리는 걸 고른다",0],
        ["장단점을 본다",1],
        ["계속 비교한다",2],
        ["비슷해서 더 못 고르겠다",3]
      ]
    },
    {
      q:"결제 직전 마음이 흔들린다.",
      a:[
        ["괜찮으면 바로 산다",0],
        ["한 번 더 확인한다",1],
        ["다른 상품을 다시 본다",2],
        ["처음부터 다시 검색한다",3]
      ]
    },
    {
      q:"선택하고 나서 드는 생각은?",
      a:[
        ["잘 골랐다고 생각한다",0],
        ["괜찮겠지 한다",1],
        ["다른 게 나았나 싶다",2],
        ["선택 후에도 선택이 안 끝난다",3]
      ]
    },
    {
      q:"내 결정 스타일은?",
      a:[
        ["빠르게 고르는 편",0],
        ["조금 고민하는 편",1],
        ["꽤 오래 고민하는 편",2],
        ["선택지가 많으면 정신이 나간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"⚡",
      type:"즉시 결정형",
      name:"고민보다 선택이 빠른 사람",
      desc:"당신은 선택 앞에서 오래 멈춰 있지 않는다. 메뉴든 물건이든 일정이든 마음이 가는 쪽을 비교적 빠르게 고른다. 틀리면 바꾸면 된다는 쪽에 가까워서 작은 선택에 하루를 빼앗기지 않는다.",
      traits:["선택 속도가 빠름","작은 일에 오래 고민하지 않음","후회가 비교적 짧음","직감으로 고르는 편"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"적당 고민형",
      name:"고민은 하지만 결국 고르는 사람",
      desc:"당신은 선택할 때 어느 정도 고민하지만 끝없이 붙잡지는 않는다. 장단점을 보고, 가격도 보고, 주변 의견도 참고하지만 결국 하나를 고른다. 선택에 시간이 필요할 뿐 멈춰버리는 사람은 아니다.",
      traits:["장단점을 비교함","고민 후 결정을 내림","선택 후 크게 흔들리진 않음","무난한 선택을 선호함"]
    },
    {
      min:12,
      max:17,
      icon:"🤔",
      type:"선택 지연형",
      name:"고르기 전부터 기가 빠지는 사람",
      desc:"당신은 선택지가 많아지면 머리가 복잡해진다. 하나를 고르면 다른 하나가 아쉽고, 더 좋은 선택이 있을 것 같아 쉽게 손이 가지 않는다. 결국 선택보다 고민에 에너지를 더 쓰는 날이 많다.",
      traits:["선택지가 많으면 피곤함","후기와 비교를 오래 봄","선택 후에도 다시 고민함","남의 추천에 기대는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🌀",
      type:"결정 정지형",
      name:"메뉴판 앞에서 인생을 잃는 사람",
      desc:"당신에게 선택은 작은 일이 아니다. 메뉴 하나, 색상 하나, 버튼 하나도 묘하게 어렵다. 고르기 전엔 못 고르겠고, 고른 뒤엔 다른 게 나았나 싶다. 선택지가 많을수록 마음은 점점 로딩 화면이 된다.",
      traits:["작은 선택도 오래 걸림","남이 정해주면 편함","결정 후 후확인이 많음","선택지가 많으면 멈춤"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
