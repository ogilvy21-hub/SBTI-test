<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">예민력</h1>
    <p class="sub">나는 작은 변화에 얼마나 빨리 반응하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대 말투가 평소보다 조금 다르다.",
      a:[
        ["크게 신경 안 쓴다",0],
        ["조금 느낀다",1],
        ["계속 생각난다",2],
        ["그 차이가 하루 종일 남는다",3]
      ]
    },
    {
      q:"방 안의 작은 소음이 들린다.",
      a:[
        ["잘 못 느낀다",0],
        ["들리긴 한다",1],
        ["은근히 거슬린다",2],
        ["그 소리 때문에 집중이 깨진다",3]
      ]
    },
    {
      q:"누가 내 물건 위치를 바꿔놨다.",
      a:[
        ["상관없다",0],
        ["조금 어색하다",1],
        ["바로 알아챈다",2],
        ["마음이 불편해서 다시 돌려놓는다",3]
      ]
    },
    {
      q:"단톡방 분위기가 살짝 식었다.",
      a:[
        ["잘 모른다",0],
        ["조금 이상하긴 하다",1],
        ["바로 눈치챈다",2],
        ["왜 그런지 계속 분석한다",3]
      ]
    },
    {
      q:"옷에 작은 불편함이 있다.",
      a:[
        ["그냥 입는다",0],
        ["조금 신경 쓰인다",1],
        ["계속 만지게 된다",2],
        ["그날 기분까지 영향을 받는다",3]
      ]
    },
    {
      q:"상대가 약속 시간에 살짝 늦었다.",
      a:[
        ["괜찮다",0],
        ["조금 신경 쓰인다",1],
        ["왜 늦었는지 궁금하다",2],
        ["내가 덜 중요한가 싶어진다",3]
      ]
    },
    {
      q:"분위기가 애매한 공간에 있다.",
      a:[
        ["그냥 있는다",0],
        ["조금 불편하다",1],
        ["몸이 먼저 긴장한다",2],
        ["그 공간의 공기까지 피곤하다",3]
      ]
    },
    {
      q:"내 예민함은 보통?",
      a:[
        ["낮은 편이다",0],
        ["가끔 올라온다",1],
        ["꽤 자주 느낀다",2],
        ["작은 변화도 크게 들어온다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"무던 안정형",
      name:"웬만한 건 그냥 지나가는 사람",
      desc:"당신은 작은 변화에 크게 흔들리지 않는다. 말투, 소음, 분위기 변화가 있어도 오래 붙잡지 않고 넘긴다. 둔한 사람이 아니라, 일상의 자극을 크게 키우지 않는 사람이다.",
      traits:["작은 변화에 덜 흔들림","소음이나 분위기에 무던함","감정 회복이 빠름","일상을 담백하게 넘김"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"보통 감지형",
      name:"느끼긴 하지만 크게 안 흔들리는 사람",
      desc:"당신은 작은 변화를 어느 정도 알아차린다. 다만 그 변화가 마음 전체를 흔들 정도는 아니다. 불편함을 느껴도 시간이 지나면 자연스럽게 정리하는 편이다.",
      traits:["작은 변화는 감지함","불편해도 오래 끌지 않음","대체로 균형을 유지함","상황에 따라 민감해짐"]
    },
    {
      min:12,
      max:17,
      icon:"🫨",
      type:"섬세 감지형",
      name:"작은 차이도 바로 느끼는 사람",
      desc:"당신은 말투, 표정, 소리, 분위기의 미세한 차이를 빠르게 느낀다. 남들이 그냥 넘기는 장면도 당신에게는 꽤 선명하게 들어온다. 예민함이 피로가 되기도 하지만, 덕분에 놓치지 않는 것들도 많다.",
      traits:["말투 변화에 민감함","소음과 공간 분위기를 잘 느낌","상대 반응을 세밀하게 봄","작은 불편함이 오래 남음"]
    },
    {
      min:18,
      max:24,
      icon:"🌡️",
      type:"초고감도형",
      name:"공기 온도까지 마음에 닿는 사람",
      desc:"당신은 주변 자극을 깊게 받아들이는 편이다. 작은 소리, 말투의 차이, 미묘한 분위기까지 몸과 마음이 먼저 반응한다. 피곤할 때는 세상이 너무 크게 들리고 보일 수 있다.",
      traits:["작은 변화도 크게 느껴짐","감각 자극에 쉽게 피곤해짐","분위기와 말투에 매우 민감함","혼자 조용히 회복할 시간이 필요함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
