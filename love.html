        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">연애집착력</h1>
    <p class="sub">연애할 때 나는 집착형일까 무던형일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대 답장이 평소보다 늦다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 신경 쓰인다",1],
        ["몇 번 확인한다",2],
        ["무슨 일인지 상상하기 시작한다",3]
      ]
    },
    {
      q:"상대가 친구들과 약속이 있다.",
      a:[
        ["재밌게 놀라고 한다",0],
        ["조금 궁금하긴 하다",1],
        ["누구랑 있는지 신경 쓰인다",2],
        ["시간대별 상황이 머릿속에 뜬다",3]
      ]
    },
    {
      q:"상대가 내 연락을 읽고 답이 없다.",
      a:[
        ["나중에 하겠지 한다",0],
        ["살짝 서운하다",1],
        ["왜 안 하지 생각한다",2],
        ["읽씹의 의미를 분석한다",3]
      ]
    },
    {
      q:"상대 SNS에 낯선 사람이 보인다.",
      a:[
        ["그냥 넘긴다",0],
        ["누군가 싶긴 하다",1],
        ["조금 찾아본다",2],
        ["관계도를 머릿속에 그린다",3]
      ]
    },
    {
      q:"상대 말투가 평소보다 건조하다.",
      a:[
        ["피곤한가 보다 한다",0],
        ["조금 눈치 본다",1],
        ["내가 뭘 했나 생각한다",2],
        ["관계 온도가 내려간 것 같다",3]
      ]
    },
    {
      q:"상대가 혼자만의 시간이 필요하다고 했다.",
      a:[
        ["존중한다",0],
        ["살짝 아쉽다",1],
        ["나랑 거리 두는 건가 싶다",2],
        ["마음이 바로 불안해진다",3]
      ]
    },
    {
      q:"상대가 약속을 갑자기 미뤘다.",
      a:[
        ["사정이 있겠지 한다",0],
        ["조금 서운하다",1],
        ["이유를 자세히 알고 싶다",2],
        ["내 우선순위가 밀린 것 같다",3]
      ]
    },
    {
      q:"내 연애 불안 스타일은?",
      a:[
        ["대체로 편안하다",0],
        ["가끔 흔들린다",1],
        ["자주 확인하고 싶다",2],
        ["사랑하면 신경 쓰이는 게 너무 많다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"무던 안정형",
      name:"사랑해도 각자 숨 쉬는 사람",
      desc:"당신은 연애를 해도 상대를 과하게 붙잡지 않는다. 연락이 늦어도 먼저 상황을 생각하고, 혼자만의 시간도 자연스럽게 존중한다. 애정이 없는 게 아니라 관계 안에서도 여유를 지키는 사람이다.",
      traits:["연락 텀에 크게 흔들리지 않음","상대의 시간을 존중함","관계 안에서도 독립적임","불안을 크게 키우지 않음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"살짝 확인형",
      name:"좋아하니까 조금은 신경 쓰는 사람",
      desc:"당신은 기본적으로 무던하지만, 좋아하는 사람에게는 어느 정도 신경이 쓰인다. 답장이 늦거나 말투가 달라지면 마음이 살짝 움직인다. 그래도 현실적인 이유를 떠올리며 스스로를 진정시킬 수 있다.",
      traits:["가끔 연락 텀을 의식함","말투 변화에 살짝 민감함","확인 욕구가 있지만 조절 가능","서운해도 금방 정리함"]
    },
    {
      min:12,
      max:17,
      icon:"🥺",
      type:"애정 확인형",
      name:"사랑받는지 자주 확인하고 싶은 사람",
      desc:"당신은 사랑 안에서 안정감을 자주 확인하고 싶어 한다. 답장 속도, 말투, 약속의 우선순위가 마음에 크게 들어온다. 상대를 믿고 싶지만 작은 변화가 생기면 마음은 먼저 불안 쪽으로 움직인다.",
      traits:["답장 속도에 민감함","상대 말투를 자주 살핌","혼자 서운함을 키울 때가 있음","애정 표현을 중요하게 느낌"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"집착 경보형",
      name:"사랑하면 머릿속이 바빠지는 사람",
      desc:"당신은 연애가 시작되면 마음속 알림이 너무 자주 울린다. 상대의 답장, 표정, SNS, 약속 하나까지 의미를 찾게 된다. 사랑이 깊은 만큼 불안도 빠르게 커져서 혼자 지치는 순간이 생긴다.",
      traits:["연락 변화에 크게 흔들림","SNS와 말투를 자주 확인함","작은 변화도 크게 해석함","사랑 안에서 불안이 빨리 켜짐"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
