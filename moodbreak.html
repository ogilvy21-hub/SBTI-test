        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">분위기망침력</h1>
    <p class="sub">나는 의도치 않게 분위기를 얼마나 멈추게 하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"다 같이 웃고 있는데 나만 이해를 못 했다.",
      a:[
        ["그냥 같이 웃는다",0],
        ["나중에 조용히 물어본다",1],
        ["왜 웃는지 바로 묻는다",2],
        ["그 질문으로 웃음이 멈춘다",3]
      ]
    },
    {
      q:"친구가 신나게 이야기하고 있다.",
      a:[
        ["잘 들어준다",0],
        ["적당히 맞장구친다",1],
        ["현실적인 말을 살짝 한다",2],
        ["팩트 한마디로 공기를 식힌다",3]
      ]
    },
    {
      q:"모임 분위기가 한창 좋다.",
      a:[
        ["분위기를 맞춘다",0],
        ["조용히 즐긴다",1],
        ["갑자기 딴생각을 말한다",2],
        ["뜬금없는 주제로 방향을 바꾼다",3]
      ]
    },
    {
      q:"누가 자기 자랑을 하고 있다.",
      a:[
        ["좋게 들어준다",0],
        ["조금 어색해도 넘긴다",1],
        ["궁금한 척 질문한다",2],
        ["정확한 반박 포인트를 찾아낸다",3]
      ]
    },
    {
      q:"단체 사진을 찍는 중이다.",
      a:[
        ["자연스럽게 찍는다",0],
        ["조금 어색하지만 맞춘다",1],
        ["타이밍을 자꾸 놓친다",2],
        ["내 표정 때문에 한 번 더 찍는다",3]
      ]
    },
    {
      q:"누가 감성적인 말을 했다.",
      a:[
        ["공감해준다",0],
        ["조용히 듣는다",1],
        ["살짝 민망해서 농담한다",2],
        ["현실적인 말로 감성을 접는다",3]
      ]
    },
    {
      q:"대화가 부드럽게 이어지고 있다.",
      a:[
        ["흐름을 잘 탄다",0],
        ["대체로 맞춘다",1],
        ["가끔 타이밍을 놓친다",2],
        ["내 한마디 뒤에 정적이 온 적 있다",3]
      ]
    },
    {
      q:"내 분위기 감각은?",
      a:[
        ["꽤 좋은 편이다",0],
        ["보통은 된다",1],
        ["가끔 어긋난다",2],
        ["분위기가 나를 피해간다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😄",
      type:"분위기 탑승형",
      name:"공기 잘 타고 웃음 잘 맞추는 사람",
      desc:"당신은 분위기를 잘 읽고 자연스럽게 맞춘다. 웃어야 할 때 웃고, 조용해야 할 때 조용히 있는 편이다. 모임 안에서 튀기보다 흐트러진 공기를 부드럽게 잡아주는 사람에 가깝다.",
      traits:["대화 타이밍이 좋은 편","분위기를 잘 맞춤","어색한 순간을 잘 넘김","모임에서 무난하게 어울림"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가끔 엇박형",
      name:"대체로 괜찮지만 가끔 삐끗하는 사람",
      desc:"당신은 분위기를 망치는 편은 아니다. 다만 가끔 타이밍이 살짝 어긋나거나, 너무 솔직한 말이 튀어나올 때가 있다. 그래도 금방 수습하거나 웃음으로 넘길 수 있는 정도다.",
      traits:["대부분 분위기에 잘 맞춤","가끔 말 타이밍이 어긋남","민망해도 수습 가능","솔직함이 살짝 튈 때 있음"]
    },
    {
      min:12,
      max:17,
      icon:"😶",
      type:"정적 유발형",
      name:"한마디 뒤에 공기가 멈춘 적 있는 사람",
      desc:"당신은 의도 없이 분위기를 멈추게 할 때가 있다. 웃자고 한 말이 너무 현실적이거나, 궁금해서 물은 질문이 정적을 부른다. 나쁜 뜻은 없지만 말이 나간 뒤에야 주변 공기가 보이는 타입이다.",
      traits:["말하고 나서 분위기를 느낌","팩트가 가끔 너무 빠름","질문 타이밍이 독특함","정적 뒤에 민망해지는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🧊",
      type:"공기 냉각형",
      name:"분위기 온도 낮추는 재능이 있는 사람",
      desc:"당신은 본의 아니게 분위기를 멈추게 하는 재능이 있다. 감성에는 현실을, 농담에는 질문을, 자랑에는 팩트를 꺼내는 순간이 있다. 악의는 없지만 당신의 한마디가 모임의 BGM을 잠시 끈다.",
      traits:["팩트로 분위기를 식힌 적 있음","뜬금없는 질문이 자주 나옴","웃음 타이밍을 놓칠 때가 있음","말하고 나서 공기를 확인함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
