<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">서운함력</h1>
    <p class="sub">나는 작은 말과 행동에 얼마나 오래 서운해하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"친한 사람이 내 말을 대충 넘겼다.",
      a:[
        ["그럴 수 있다",0],
        ["조금 아쉽다",1],
        ["계속 생각난다",2],
        ["나만 진심이었나 싶다",3]
      ]
    },
    {
      q:"내 생일을 가까운 사람이 늦게 챙겼다.",
      a:[
        ["챙겨준 게 고맙다",0],
        ["살짝 서운하다",1],
        ["왜 늦었는지 신경 쓰인다",2],
        ["마음속 기념일 순위가 바뀐다",3]
      ]
    },
    {
      q:"단톡방에서 내 말만 반응이 적다.",
      a:[
        ["타이밍이 안 맞았겠지 한다",0],
        ["조금 민망하다",1],
        ["괜히 서운해진다",2],
        ["대화방을 조용히 떠나고 싶다",3]
      ]
    },
    {
      q:"약속을 잡는데 내 일정은 별로 안 물어본다.",
      a:[
        ["맞출 수 있으면 맞춘다",0],
        ["조금 아쉽다",1],
        ["나를 덜 생각하나 싶다",2],
        ["그 약속 자체가 가기 싫어진다",3]
      ]
    },
    {
      q:"상대가 다른 사람에게는 더 다정하다.",
      a:[
        ["그냥 성격이겠지 한다",0],
        ["살짝 비교된다",1],
        ["나한테만 다른가 싶다",2],
        ["마음속에서 거리 두기가 시작된다",3]
      ]
    },
    {
      q:"서운한 마음을 말해야 할 때 나는?",
      a:[
        ["바로 말한다",0],
        ["조심스럽게 말한다",1],
        ["말할까 말까 오래 고민한다",2],
        ["말 못 하고 혼자 쌓아둔다",3]
      ]
    },
    {
      q:"상대가 내 서운함을 모르는 것 같다.",
      a:[
        ["설명하면 된다고 본다",0],
        ["조금 답답하다",1],
        ["알아줬으면 싶다",2],
        ["말 안 해도 알아야 하는 거 아닌가 싶다",3]
      ]
    },
    {
      q:"내 서운함은 보통?",
      a:[
        ["금방 풀린다",0],
        ["조금 남는다",1],
        ["꽤 오래 간다",2],
        ["혼자 장편으로 커진다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"금방 해소형",
      name:"서운함보다 이해가 빠른 사람",
      desc:"당신은 작은 서운함에 오래 머물지 않는다. 상대의 상황을 먼저 생각하고, 감정이 생겨도 금방 정리하려 한다. 무심한 사람이 아니라 마음을 오래 다치게 두지 않는 사람이다.",
      traits:["서운함 회복이 빠름","상대 상황을 먼저 생각함","감정을 크게 키우지 않음","대화를 통해 풀 수 있음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 서운형",
      name:"섭섭해도 금방 돌아오는 사람",
      desc:"당신은 서운함을 느끼지만 오래 붙잡지는 않는다. 작은 말투나 반응에 마음이 살짝 흔들려도, 시간이 지나면 다시 균형을 찾는다. 다만 가까운 사람에게는 조금 더 예민해지는 편이다.",
      traits:["가까운 사람에게 조금 민감함","서운해도 회복 가능","혼자 생각하는 시간이 있음","대화하면 풀리는 편"]
    },
    {
      min:12,
      max:17,
      icon:"🥲",
      type:"속상함 저장형",
      name:"괜찮다 하고 마음속에 적어두는 사람",
      desc:"당신은 서운한 마음을 바로 꺼내지 못하고 안쪽에 보관하는 편이다. 겉으로는 괜찮다고 말하지만, 마음속에서는 그 말과 장면이 꽤 오래 남는다. 상대가 몰라주는 순간 더 깊게 서운해진다.",
      traits:["괜찮다는 말을 자주 함","서운함을 혼자 저장함","상대 반응을 오래 곱씹음","말하기 전까지 마음이 무거움"]
    },
    {
      min:18,
      max:24,
      icon:"🌧️",
      type:"서운함 폭우형",
      name:"혼자 마음속 장마 시작하는 사람",
      desc:"당신은 작은 서운함도 마음속에서 크게 번질 수 있다. 말하지 못한 감정이 쌓이면 어느 순간 거리감으로 바뀐다. 상처받기 싫어서 조용해지지만, 사실은 알아봐주길 바라는 마음도 함께 있다.",
      traits:["서운함이 오래 지속됨","말하지 못한 감정이 쌓임","상대의 작은 변화에 민감함","조용히 거리 두기를 할 수 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
