        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">질투력</h1>
    <p class="sub">나는 남이 잘될 때 얼마나 마음이 흔들리는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"친구가 좋은 성과를 냈다.",
      a:[
        ["진심으로 축하한다",0],
        ["축하하면서 살짝 부럽다",1],
        ["나랑 비교하게 된다",2],
        ["축하보다 내 인생 점검이 먼저 시작된다",3]
      ]
    },
    {
      q:"비슷하게 시작한 사람이 나보다 앞서간다.",
      a:[
        ["자극받는다",0],
        ["조금 부럽다",1],
        ["괜히 초조해진다",2],
        ["내가 뒤처진 것 같아 마음이 무겁다",3]
      ]
    },
    {
      q:"누가 SNS에 잘 사는 모습을 올렸다.",
      a:[
        ["좋아 보인다고 생각한다",0],
        ["살짝 부럽다",1],
        ["내 하루가 초라해 보인다",2],
        ["갑자기 SNS를 끄고 싶어진다",3]
      ]
    },
    {
      q:"친한 사람이 나보다 더 인정받는다.",
      a:[
        ["기분 좋게 본다",0],
        ["조금 복잡하다",1],
        ["나도 인정받고 싶어진다",2],
        ["웃고 있지만 마음속은 시끄럽다",3]
      ]
    },
    {
      q:"상대가 내가 원하던 걸 먼저 이뤘다.",
      a:[
        ["축하하고 배운다",0],
        ["부럽긴 하다",1],
        ["괜히 조급해진다",2],
        ["그 소식이 하루 종일 남는다",3]
      ]
    },
    {
      q:"남의 칭찬을 들을 때 나는?",
      a:[
        ["편하게 듣는다",0],
        ["좋겠다 싶다",1],
        ["나도 저런 말 듣고 싶다",2],
        ["왜 나는 아닌가 생각한다",3]
      ]
    },
    {
      q:"누가 좋은 기회를 얻었다.",
      a:[
        ["잘됐다고 생각한다",0],
        ["조금 부럽다",1],
        ["나는 왜 없나 싶다",2],
        ["세상이 나만 빼고 움직이는 것 같다",3]
      ]
    },
    {
      q:"내 질투는 보통?",
      a:[
        ["금방 지나간다",0],
        ["살짝 있다",1],
        ["꽤 자주 올라온다",2],
        ["비교 버튼이 자동으로 켜진다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"담백 축하형",
      name:"남의 성공을 내 실패로 보지 않는 사람",
      desc:"당신은 남이 잘되는 일을 비교적 편하게 받아들인다. 부러움이 아예 없는 건 아니지만, 그 감정이 나를 크게 흔들지는 않는다. 남의 성취와 내 속도를 따로 볼 줄 아는 사람이다.",
      traits:["남의 성과를 편하게 축하함","비교에 오래 머물지 않음","내 속도를 비교적 믿음","부러움을 자극으로 바꿀 수 있음"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 부러움형",
      name:"부럽지만 금방 제자리 찾는 사람",
      desc:"당신은 남이 잘되면 부럽다는 마음이 살짝 올라온다. 하지만 그 감정에 오래 끌려가지 않고, 다시 내 자리로 돌아온다. 질투보다 자극에 가까운 감정으로 넘길 수 있는 타입이다.",
      traits:["부러움은 있지만 오래가지 않음","비교 후 다시 현실로 돌아옴","상대 성과를 인정할 수 있음","내 일도 다시 챙기려 함"]
    },
    {
      min:12,
      max:17,
      icon:"🥲",
      type:"비교 점화형",
      name:"남의 좋은 소식에 내 인생 점검하는 사람",
      desc:"당신은 남의 성과를 들으면 자연스럽게 나와 비교하게 된다. 축하는 하지만 마음 한쪽에서는 나는 어디쯤인지 따져본다. 상대가 미운 것보다 내 속도가 불안해지는 쪽에 가깝다.",
      traits:["남의 성과에 내 위치를 떠올림","축하와 부러움이 같이 옴","SNS 비교에 약한 편","내 속도에 불안해질 때가 있음"]
    },
    {
      min:18,
      max:24,
      icon:"🔥",
      type:"질투 과열형",
      name:"남의 성공 소식에 마음속 회의 여는 사람",
      desc:"당신은 남이 잘되는 장면 앞에서 마음이 크게 흔들린다. 겉으로는 축하하지만 속에서는 비교, 초조함, 자책이 한꺼번에 올라온다. 사실 질투의 바닥에는 나도 잘되고 싶다는 강한 욕망이 있다.",
      traits:["비교 버튼이 자주 켜짐","남의 성과가 오래 남음","축하와 초조함이 같이 올라옴","인정받고 싶은 마음이 강함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
