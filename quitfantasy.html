        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">퇴사상상력</h1>
    <p class="sub">나는 출근 중 퇴사를 얼마나 자주 상상하는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"월요일 아침 알람이 울렸다.",
      a:[
        ["그냥 일어난다",0],
        ["조금 한숨 쉰다",1],
        ["출근하기 싫다 생각한다",2],
        ["퇴사 후 인생을 이미 상상한다",3]
      ]
    },
    {
      q:"상사가 갑자기 일을 던졌다.",
      a:[
        ["일단 처리한다",0],
        ["속으로 조금 짜증난다",1],
        ["퇴사 생각이 스친다",2],
        ["사직서 문구가 머릿속에 뜬다",3]
      ]
    },
    {
      q:"회의가 길어진다.",
      a:[
        ["필요하면 듣는다",0],
        ["조금 지루하다",1],
        ["이 시간이 아깝다",2],
        ["나는 왜 여기 앉아 있나 싶다",3]
      ]
    },
    {
      q:"친구가 자유롭게 사는 것 같다.",
      a:[
        ["좋겠다 하고 넘긴다",0],
        ["살짝 부럽다",1],
        ["나도 회사 그만두고 싶다",2],
        ["내 퇴사 후 브이로그까지 떠오른다",3]
      ]
    },
    {
      q:"월급날이 지났다.",
      a:[
        ["그래도 다녀야지 한다",0],
        ["잠깐 안정감을 느낀다",1],
        ["월급 아니면 진작 나갔다",2],
        ["월급은 퇴사를 막는 인질 같다",3]
      ]
    },
    {
      q:"업무 메신저 알림이 계속 온다.",
      a:[
        ["확인하고 답한다",0],
        ["조금 피곤하다",1],
        ["알림 끄고 싶다",2],
        ["노트북을 닫고 사라지고 싶다",3]
      ]
    },
    {
      q:"퇴사 후 뭘 할지 상상해본다.",
      a:[
        ["거의 안 한다",0],
        ["가끔 생각한다",1],
        ["꽤 자주 생각한다",2],
        ["이미 마음속 창업계획서가 있다",3]
      ]
    },
    {
      q:"내 퇴사상상 스타일은?",
      a:[
        ["현실적으로 거의 안 한다",0],
        ["힘들 때만 한다",1],
        ["자주 머릿속에 온다",2],
        ["출근과 동시에 퇴사를 상상한다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"💼",
      type:"현실 출근형",
      name:"퇴사보다 출근 버튼이 빠른 사람",
      desc:"당신은 회사가 힘들어도 퇴사 상상에 오래 빠지지 않는다. 해야 할 일은 하고, 월급과 현실을 함께 본다. 불만이 없는 건 아니지만 감정만으로 회사를 박차고 나가지는 않는 사람이다.",
      traits:["퇴사 생각이 적음","현실 판단이 빠름","업무를 비교적 담담히 처리함","월급과 안정감을 중요하게 봄"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가끔 퇴사형",
      name:"힘든 날만 사직서가 떠오르는 사람",
      desc:"당신은 평소엔 버티지만 피곤한 날엔 퇴사를 상상한다. 상사의 한마디, 긴 회의, 쌓이는 알림 앞에서 잠깐 마음이 흔들린다. 그래도 다음 날이 되면 다시 현실로 돌아오는 편이다.",
      traits:["힘든 날 퇴사를 상상함","그래도 쉽게 행동하진 않음","현실 감각이 남아 있음","월급날엔 마음이 조금 진정됨"]
    },
    {
      min:12,
      max:17,
      icon:"📝",
      type:"사직서 저장형",
      name:"마음속에 사직서 초안이 있는 사람",
      desc:"당신은 퇴사를 꽤 자주 상상한다. 회의 중에도, 출근길에도, 업무 알림을 볼 때도 다른 삶을 떠올린다. 아직 실행은 못 했지만 마음속 폴더 어딘가에는 사직서 초안이 저장돼 있다.",
      traits:["퇴사 후 삶을 자주 상상함","업무 스트레스에 민감함","회사 밖 가능성을 자주 봄","사직서 문구를 생각해본 적 있음"]
    },
    {
      min:18,
      max:24,
      icon:"🚪",
      type:"퇴사 시뮬레이션형",
      name:"몸은 회사, 마음은 이미 퇴사한 사람",
      desc:"당신은 회사에 앉아 있어도 마음은 자주 바깥에 있다. 퇴사 후 여행, 창업, 프리랜서, 아무것도 안 하는 삶까지 머릿속에서 여러 번 살아봤다. 아직 출근은 하지만 마음속 출입증은 반납 직전이다.",
      traits:["퇴사 상상이 일상적임","회사 알림에 피로가 큼","퇴사 후 계획을 자주 그림","마음은 이미 회사 밖에 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
