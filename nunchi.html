<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">눈치력</h1>
    <p class="sub">분위기 파악 능력은 어느 정도일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"대화 중 상대 표정이 살짝 바뀌었다.",
      a:[
        ["잘 못 느낀다",0],
        ["나중에야 떠오른다",1],
        ["그 순간 조금 느낀다",2],
        ["바로 분위기를 읽는다",3]
      ]
    },
    {
      q:"단톡방에 갑자기 정적이 생겼다.",
      a:[
        ["그냥 내 말 계속한다",0],
        ["왜 조용하지 싶다",1],
        ["뭔가 애매한가 싶다",2],
        ["바로 멈추고 분위기를 본다",3]
      ]
    },
    {
      q:"상대가 '괜찮아'라고 했다.",
      a:[
        ["진짜 괜찮은 줄 안다",0],
        ["조금 헷갈린다",1],
        ["괜찮지 않을 수도 있다고 본다",2],
        ["그 말투에서 이미 답을 읽는다",3]
      ]
    },
    {
      q:"모임에서 누가 말이 줄었다.",
      a:[
        ["별생각 없다",0],
        ["조금 이상하긴 하다",1],
        ["기분이 안 좋은가 싶다",2],
        ["바로 챙기거나 화제를 바꾼다",3]
      ]
    },
    {
      q:"누가 돌려서 부탁하는 것 같다.",
      a:[
        ["못 알아듣는다",0],
        ["나중에 알게 된다",1],
        ["대충 눈치챈다",2],
        ["말 끝나기 전에 감 잡는다",3]
      ]
    },
    {
      q:"회의 중 상사가 애매하게 말을 멈췄다.",
      a:[
        ["그냥 넘어간다",0],
        ["무슨 뜻이지 고민한다",1],
        ["원하는 답을 짐작한다",2],
        ["바로 필요한 말을 이어준다",3]
      ]
    },
    {
      q:"친구가 평소보다 답장이 짧다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 신경 쓰인다",1],
        ["기분을 살핀다",2],
        ["말투 변화까지 바로 잡아낸다",3]
      ]
    },
    {
      q:"내 분위기 파악 속도는?",
      a:[
        ["느린 편이다",0],
        ["뒤늦게 깨닫는다",1],
        ["보통은 된다",2],
        ["공기 흐름까지 읽는다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😐",
      type:"눈치 휴면형",
      name:"분위기가 지나간 뒤 도착하는 사람",
      desc:"당신은 분위기 변화에 바로 반응하는 편은 아니다. 상대 표정이나 말투가 바뀌어도 그 순간에는 잘 모르고, 시간이 지난 뒤에야 아까 그게 그런 뜻이었나 싶어진다. 편한 사람들과 있을 때 가장 자연스럽다.",
      traits:["돌려 말하면 잘 못 알아들음","뒤늦게 깨닫는 일이 많음","상대 말투 변화에 둔한 편","직접 말해주는 관계가 편함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"느린 감지형",
      name:"집 가는 길에 분위기 파악하는 사람",
      desc:"당신은 눈치가 아예 없는 사람은 아니다. 다만 반응 속도가 조금 늦다. 그 자리에서는 넘겼던 말과 표정이 집에 가는 길에 다시 떠오르고, 뒤늦게 상황의 뜻을 이해하는 경우가 있다.",
      traits:["상황 복기를 자주 함","나중에야 말뜻을 이해함","애매한 분위기에 약함","그래도 큰 선은 넘기지 않음"]
    },
    {
      min:12,
      max:17,
      icon:"🧐",
      type:"평균 감지형",
      name:"필요한 만큼은 읽는 사람",
      desc:"당신은 대부분의 상황에서 분위기를 무난하게 읽는다. 아주 미세한 신호까지 다 잡지는 못해도, 상대가 불편해하는 순간이나 대화가 어긋나는 지점은 어느 정도 파악한다. 사회생활에서 크게 무리 없는 눈치력이다.",
      traits:["대부분의 분위기를 파악함","상대 반응을 어느 정도 봄","필요할 때 말수를 조절함","사회생활 기본 감각이 있음"]
    },
    {
      min:18,
      max:24,
      icon:"👀",
      type:"공기 판독형",
      name:"말투보다 침묵을 먼저 읽는 사람",
      desc:"당신은 말보다 분위기를 먼저 읽는 편이다. 표정, 말투, 답장 속도, 침묵의 길이까지 빠르게 감지한다. 덕분에 상황 대처가 빠르지만, 남의 기분까지 너무 많이 읽어서 혼자 피곤해질 때도 있다.",
      traits:["표정 변화에 민감함","말투와 침묵을 잘 읽음","분위기 수습이 빠름","남의 기분까지 떠안을 때가 있음"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
