        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">계획붕괴력</h1>
    <p class="sub">나는 세워둔 계획이 틀어졌을 때 얼마나 쉽게 흔들리는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"약속 시간이 갑자기 바뀌었다.",
      a:[
        ["괜찮다고 맞춘다",0],
        ["조금 불편하지만 바꾼다",1],
        ["머릿속 일정이 흔들린다",2],
        ["하루 전체가 다시 짜여야 한다",3]
      ]
    },
    {
      q:"가려던 식당이 문을 닫았다.",
      a:[
        ["근처 다른 곳을 찾는다",0],
        ["조금 아쉽다",1],
        ["괜히 짜증이 난다",2],
        ["오늘의 기분이 같이 닫혔다",3]
      ]
    },
    {
      q:"주말 계획이 갑자기 취소됐다.",
      a:[
        ["다른 걸 하면 된다",0],
        ["잠깐 허전하다",1],
        ["뭘 해야 할지 모르겠다",2],
        ["내 주말이 길을 잃었다",3]
      ]
    },
    {
      q:"하루 일정을 다 정해뒀다.",
      a:[
        ["상황에 따라 바꾼다",0],
        ["큰 틀만 지키면 된다",1],
        ["되도록 그대로 하고 싶다",2],
        ["순서가 틀어지면 마음도 틀어진다",3]
      ]
    },
    {
      q:"친구가 갑자기 즉흥 제안을 했다.",
      a:[
        ["재밌겠다 하고 간다",0],
        ["가능하면 간다",1],
        ["원래 계획이 신경 쓰인다",2],
        ["즉흥이라는 단어부터 부담이다",3]
      ]
    },
    {
      q:"예상보다 일이 오래 걸린다.",
      a:[
        ["남은 시간을 조정한다",0],
        ["조금 초조해진다",1],
        ["뒤 일정까지 계속 계산한다",2],
        ["이미 머릿속 일정표가 무너졌다",3]
      ]
    },
    {
      q:"계획 없이 하루를 보내야 한다.",
      a:[
        ["오히려 편하다",0],
        ["나쁘지 않다",1],
        ["뭘 해야 할지 애매하다",2],
        ["계획 없는 하루는 불안하다",3]
      ]
    },
    {
      q:"내 계획 스타일은?",
      a:[
        ["유연한 편이다",0],
        ["큰 틀만 있으면 된다",1],
        ["계획이 있어야 편하다",2],
        ["계획이 틀어지면 멘탈도 흔들린다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🌊",
      type:"유연 적응형",
      name:"계획이 바뀌어도 잘 흘러가는 사람",
      desc:"당신은 계획이 틀어져도 크게 흔들리지 않는다. 가려던 곳이 닫히면 다른 곳을 찾고, 시간이 바뀌면 그에 맞춰 움직인다. 계획은 있으면 좋지만, 삶이 꼭 그 순서대로 흘러야 한다고 생각하지는 않는다.",
      traits:["상황 변화에 유연함","즉흥적인 일정도 받아들임","계획보다 현재 상황을 봄","예상 밖 상황에 비교적 침착함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 조정형",
      name:"틀어져도 다시 맞추는 사람",
      desc:"당신은 계획이 바뀌면 잠깐 불편함을 느끼지만 금방 다시 맞춘다. 원래 생각한 순서가 깨지는 건 아쉽지만, 그렇다고 하루 전체를 망쳤다고 보지는 않는다. 현실과 계획 사이에서 균형을 잡는 편이다.",
      traits:["변화에 잠깐 흔들림","다시 조정하는 힘이 있음","큰 틀의 계획을 선호함","예상 밖 상황도 어느 정도 수용함"]
    },
    {
      min:12,
      max:17,
      icon:"📋",
      type:"일정 민감형",
      name:"계획표가 흔들리면 마음도 바쁜 사람",
      desc:"당신은 세워둔 계획이 틀어지면 마음이 쉽게 분주해진다. 한 가지가 바뀌면 뒤 일정까지 다시 계산하고, 원래 생각한 흐름이 깨지면 묘하게 불안해진다. 계획은 당신에게 안정감을 주는 안전벨트에 가깝다.",
      traits:["일정 변경에 민감함","계획대로 되는 걸 좋아함","뒤 일정까지 자주 계산함","즉흥 제안에 부담을 느낌"]
    },
    {
      min:18,
      max:24,
      icon:"🧩",
      type:"계획 붕괴형",
      name:"순서 하나 틀어지면 하루가 흔들리는 사람",
      desc:"당신에게 계획은 단순한 참고사항이 아니다. 마음의 질서를 잡아주는 지도에 가깝다. 약속 시간, 동선, 순서, 장소 중 하나만 바뀌어도 머릿속에서 하루 전체를 다시 조립해야 한다. 즉흥은 자유보다 변수에 가깝다.",
      traits:["계획 변경에 크게 흔들림","예상 밖 상황을 싫어함","즉흥 일정이 부담스러움","계획 없는 시간이 불안함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
