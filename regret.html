        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">후회력</h1>
    <p class="sub">나는 지나간 선택을 얼마나 오래 다시 돌려보는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"말하고 나서 괜히 신경 쓰인다.",
      a:[
        ["별생각 없이 넘긴다",0],
        ["잠깐 떠올린다",1],
        ["몇 번 다시 생각한다",2],
        ["그 말만 머릿속에서 재방송된다",3]
      ]
    },
    {
      q:"선택을 잘못한 것 같다.",
      a:[
        ["다음엔 다르게 하면 된다",0],
        ["조금 아쉽다",1],
        ["계속 다른 선택을 상상한다",2],
        ["내 머릿속에 선택지 회의가 열린다",3]
      ]
    },
    {
      q:"집에 와서 하루를 떠올린다.",
      a:[
        ["그냥 씻고 쉰다",0],
        ["기억나는 장면만 생각한다",1],
        ["아쉬운 장면을 되짚는다",2],
        ["오늘의 나를 심문한다",3]
      ]
    },
    {
      q:"누군가 표정이 안 좋았다.",
      a:[
        ["그럴 수도 있다고 넘긴다",0],
        ["조금 신경 쓰인다",1],
        ["내가 뭘 했나 생각한다",2],
        ["이미 내 잘못으로 결론났다",3]
      ]
    },
    {
      q:"물건을 사고 나서 마음이 흔들린다.",
      a:[
        ["필요하면 괜찮다",0],
        ["조금 비교해본다",1],
        ["다른 걸 살 걸 싶다",2],
        ["결제 순간으로 돌아가고 싶다",3]
      ]
    },
    {
      q:"예전 실수가 갑자기 떠올랐다.",
      a:[
        ["금방 잊는다",0],
        ["잠깐 민망하다",1],
        ["한동안 생각난다",2],
        ["이불킥 예약이다",3]
      ]
    },
    {
      q:"거절하지 못하고 해줬다.",
      a:[
        ["그럴 수도 있다",0],
        ["조금 후회한다",1],
        ["왜 그랬나 계속 생각한다",2],
        ["마음속에서 나 자신과 싸운다",3]
      ]
    },
    {
      q:"내 후회 스타일은?",
      a:[
        ["금방 털어낸다",0],
        ["가끔 아쉬워한다",1],
        ["꽤 오래 곱씹는다",2],
        ["후회가 거의 취미 활동이다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🌤️",
      type:"빠른 정리형",
      name:"후회보다 다음을 보는 사람",
      desc:"당신은 지나간 선택을 오래 붙잡지 않는다. 실수했어도 다음에 다르게 하면 된다고 생각한다. 마음이 가볍다는 건 대충 산다는 뜻이 아니다. 이미 지나간 일에 오늘을 오래 내주지 않는 사람이다.",
      traits:["후회를 오래 끌지 않음","실수 후 회복이 빠름","다음 행동을 먼저 생각함","과거보다 현재에 가까움"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 복기형",
      name:"아쉽지만 금방 돌아오는 사람",
      desc:"당신은 가끔 후회하지만 그 안에 오래 갇히지는 않는다. 말 한마디, 선택 하나가 잠깐 마음에 남아도 다시 일상으로 돌아온다. 후회가 당신을 흔들긴 해도 멈춰 세우지는 못한다.",
      traits:["가끔 아쉬움을 느낌","실수를 되짚어봄","감정 회복이 비교적 빠름","후회를 배움으로 바꿈"]
    },
    {
      min:12,
      max:17,
      icon:"🫠",
      type:"계속 복기형",
      name:"끝난 장면을 다시 편집하는 사람",
      desc:"당신은 지나간 장면을 자주 다시 돌려본다. 그때 이렇게 말했으면, 저걸 선택했으면, 조금만 다르게 했으면 하는 생각이 꼬리를 문다. 이미 끝난 일이라는 걸 알지만 마음은 아직 편집실에 남아 있다.",
      traits:["말과 행동을 자주 되짚음","다른 선택을 자주 상상함","상대 반응을 신경 씀","후회가 오래 남는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🛏️",
      type:"이불킥 장인형",
      name:"어제의 나를 매일 재판하는 사람",
      desc:"당신의 후회는 그냥 스쳐 지나가지 않는다. 말실수, 선택, 표정, 결제, 거절 못 한 순간까지 마음속 재판대에 오른다. 남들은 잊었을 일도 당신 안에서는 아직 판결이 끝나지 않았다.",
      traits:["작은 일도 오래 후회함","자책이 빠르게 시작됨","과거 장면이 자주 떠오름","내 선택을 반복해서 의심함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
