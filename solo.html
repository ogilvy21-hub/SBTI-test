<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">혼자력</h1>
    <p class="sub">나는 혼자 있는 시간을 얼마나 잘 즐기는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"주말에 약속이 하나도 없다.",
      a:[
        ["조금 허전하다",0],
        ["쉬는 날이라 괜찮다",1],
        ["오히려 편하다",2],
        ["내가 제일 좋아하는 일정이다",3]
      ]
    },
    {
      q:"혼자 밥을 먹어야 한다.",
      a:[
        ["누구랑 먹고 싶다",0],
        ["가끔은 괜찮다",1],
        ["편하게 먹을 수 있어 좋다",2],
        ["혼밥은 거의 의식주 중 하나다",3]
      ]
    },
    {
      q:"갑자기 약속이 취소됐다.",
      a:[
        ["아쉽다",0],
        ["조금 아쉽지만 쉰다",1],
        ["속으로 살짝 좋다",2],
        ["취소 알림이 작은 선물 같다",3]
      ]
    },
    {
      q:"혼자 카페에 앉아 있다.",
      a:[
        ["조금 어색하다",0],
        ["금방 적응한다",1],
        ["꽤 편하다",2],
        ["내 세계가 제일 잘 열리는 시간이다",3]
      ]
    },
    {
      q:"하루 종일 아무도 안 만났다.",
      a:[
        ["외롭다",0],
        ["조금 심심하다",1],
        ["충전된 느낌이다",2],
        ["이 정도 고요함은 필요하다",3]
      ]
    },
    {
      q:"단체 모임 후 집에 왔다.",
      a:[
        ["즐거웠다",0],
        ["조금 피곤하다",1],
        ["혼자 있는 게 편해진다",2],
        ["집 문 닫는 순간 영혼이 돌아온다",3]
      ]
    },
    {
      q:"여행을 혼자 가야 한다면?",
      a:[
        ["조금 부담된다",0],
        ["가까운 곳은 가능하다",1],
        ["오히려 자유로울 것 같다",2],
        ["이미 혼자 여행 코스가 머릿속에 있다",3]
      ]
    },
    {
      q:"내 혼자 있는 시간은?",
      a:[
        ["길면 외롭다",0],
        ["적당히 필요하다",1],
        ["꽤 중요하다",2],
        ["없으면 내가 나를 잃는다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🤝",
      type:"함께 충전형",
      name:"혼자보다 같이 있을 때 살아나는 사람",
      desc:"당신은 혼자 있는 시간보다 사람과 함께 있을 때 에너지가 더 잘 돈다. 약속이 없으면 허전하고, 좋은 사람과의 대화가 하루를 살린다. 혼자 있는 시간이 싫다기보다 함께 웃는 시간이 더 필요한 사람이다.",
      traits:["사람과 있을 때 에너지가 남","혼자 긴 시간은 조금 허전함","약속 취소가 아쉽게 느껴짐","대화로 기분이 풀리는 편"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"균형 혼자형",
      name:"같이도 좋고 혼자도 괜찮은 사람",
      desc:"당신은 사람과의 시간도 즐기고 혼자 있는 시간도 받아들인다. 약속이 있으면 나가고, 없으면 쉬면 된다. 외로움과 편안함 사이에서 비교적 균형을 잘 잡는 타입이다.",
      traits:["혼자 있는 시간에 적당히 익숙함","약속과 휴식의 균형을 좋아함","혼밥도 가끔은 가능함","상황에 따라 잘 적응함"]
    },
    {
      min:12,
      max:17,
      icon:"🏠",
      type:"혼자 충전형",
      name:"혼자 있어야 다시 사람 되는 사람",
      desc:"당신은 혼자 있는 시간이 꽤 중요하다. 사람을 싫어하는 건 아니지만 오래 만나고 나면 조용한 시간이 필요하다. 혼자 밥 먹고, 혼자 걷고, 혼자 쉬는 시간이 당신의 배터리를 채운다.",
      traits:["혼자 있어야 회복됨","약속 취소가 가끔 반가움","혼밥과 혼카페가 편함","사람 만난 뒤 휴식이 필요함"]
    },
    {
      min:18,
      max:24,
      icon:"🛋️",
      type:"혼자 만렙형",
      name:"혼자 있는 시간이 본업인 사람",
      desc:"당신은 혼자 있을 때 가장 자연스럽다. 약속이 없는 날이 비어 있는 날이 아니라 나를 되찾는 날이다. 조용한 방, 혼자 먹는 밥, 아무도 부르지 않는 시간이 당신에게는 거의 휴양지다.",
      traits:["혼자 시간이 매우 중요함","약속 취소에 내적 환호함","혼자 노는 계획이 풍부함","고요함 속에서 가장 편안함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
