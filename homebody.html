<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">집순력</h1>
    <p class="sub">나는 집 밖보다 집 안에서 얼마나 살아나는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"주말 아침, 아무 약속이 없다.",
      a:[
        ["조금 심심하다",0],
        ["쉬는 날이라 좋다",1],
        ["집에서 뭐 할지 생각한다",2],
        ["이미 최고의 일정이다",3]
      ]
    },
    {
      q:"친구가 갑자기 나오라고 한다.",
      a:[
        ["바로 나간다",0],
        ["상황 보고 나간다",1],
        ["준비가 귀찮아진다",2],
        ["집에 있는 나를 방해하지 않았으면 한다",3]
      ]
    },
    {
      q:"하루 종일 집에 있었다.",
      a:[
        ["답답하다",0],
        ["그럭저럭 괜찮다",1],
        ["편하고 좋다",2],
        ["오히려 하루가 안정된다",3]
      ]
    },
    {
      q:"밖에서 오래 놀고 집에 들어왔다.",
      a:[
        ["즐거웠다",0],
        ["조금 피곤하다",1],
        ["집이 제일 편하다",2],
        ["현관문 닫는 순간 영혼이 돌아온다",3]
      ]
    },
    {
      q:"집에서 혼자 밥을 먹는다.",
      a:[
        ["누구랑 먹고 싶다",0],
        ["가끔은 괜찮다",1],
        ["편하게 먹어서 좋다",2],
        ["혼밥에 최적화된 사람이다",3]
      ]
    },
    {
      q:"약속이 갑자기 취소됐다.",
      a:[
        ["아쉽다",0],
        ["조금 아쉽지만 쉰다",1],
        ["속으로 살짝 좋다",2],
        ["취소 문자가 선물처럼 느껴진다",3]
      ]
    },
    {
      q:"집에 있으면 시간이 어떻게 간다.",
      a:[
        ["조금 느리다",0],
        ["그냥 쉰다",1],
        ["할 게 은근 많다",2],
        ["집 안에서도 하루가 모자라다",3]
      ]
    },
    {
      q:"내 집순력은?",
      a:[
        ["낮은 편이다",0],
        ["보통이다",1],
        ["꽤 높은 편이다",2],
        ["집 밖은 가끔 이벤트다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🌤️",
      type:"외출 충전형",
      name:"집보다 밖에서 에너지 나는 사람",
      desc:"당신은 집에만 오래 있으면 오히려 답답해지는 편이다. 사람을 만나고, 바깥 공기를 느끼고, 움직이는 일정이 있어야 하루가 살아난다. 집은 쉬는 곳이지만 삶의 무대는 밖에 더 가깝다.",
      traits:["약속 없는 날이 조금 허전함","밖에서 기분 전환이 잘 됨","사람 만남에 에너지를 얻음","집에만 있으면 답답해질 때가 있음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"균형 휴식형",
      name:"나가도 좋고 집도 좋은 사람",
      desc:"당신은 집과 밖의 균형을 비교적 잘 잡는다. 약속이 있으면 나가고, 없으면 집에서 쉰다. 집순이라고 하기엔 밖도 즐기고, 외향형이라고 하기엔 집의 평화도 꽤 좋아하는 타입이다.",
      traits:["집과 외출의 균형이 좋음","약속 취소도 크게 나쁘지 않음","혼자 쉬는 시간도 필요함","상황에 따라 잘 적응함"]
    },
    {
      min:12,
      max:17,
      icon:"🏠",
      type:"집 충전형",
      name:"집에 있어야 다시 살아나는 사람",
      desc:"당신은 집에서 에너지가 회복된다. 밖에서 즐거운 시간을 보내도 결국 집에 들어와야 마음이 놓인다. 혼자 밥 먹고, 누워 있고, 조용히 보내는 시간이 당신의 하루를 다시 정리해준다.",
      traits:["집에서 회복이 잘 됨","약속 취소가 가끔 반가움","혼자 있는 시간을 좋아함","외출 후 집에서 충전 필요"]
    },
    {
      min:18,
      max:24,
      icon:"🛋️",
      type:"집순 만렙형",
      name:"집 밖은 특별 출연인 사람",
      desc:"당신에게 집은 단순한 공간이 아니라 세계관이다. 침대, 소파, 냉장고, 충전기, 와이파이가 있는 곳에서 가장 자연스럽다. 외출은 할 수 있지만 마음속 본진은 언제나 집이다.",
      traits:["집에 있을 때 가장 편함","약속 취소에 내적 환호함","집 안에서도 할 일이 많음","외출 준비부터 에너지가 듦"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
