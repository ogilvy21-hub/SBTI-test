<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">회사생활력</h1>
    <p class="sub">나는 회사에서 얼마나 잘 버티는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"월요일 아침 알람이 울렸다.",
      a:[
        ["바로 일어난다",0],
        ["조금 힘들지만 준비한다",1],
        ["출근 생각에 한숨이 난다",2],
        ["퇴근하고 싶다는 생각부터 든다",3]
      ]
    },
    {
      q:"상사가 갑자기 일을 추가했다.",
      a:[
        ["바로 정리해서 한다",0],
        ["우선순위를 조정한다",1],
        ["속으로 조금 무너진다",2],
        ["표정 관리부터 위기다",3]
      ]
    },
    {
      q:"회의가 길어지고 있다.",
      a:[
        ["필요한 이야기라면 괜찮다",0],
        ["조금 피곤하다",1],
        ["언제 끝나나 본다",2],
        ["영혼이 회의실 밖에 있다",3]
      ]
    },
    {
      q:"동료가 은근히 일을 넘긴다.",
      a:[
        ["상황 보고 돕는다",0],
        ["조금 불편하다",1],
        ["선을 그어야겠다고 생각한다",2],
        ["마음속 퇴사 사유에 추가한다",3]
      ]
    },
    {
      q:"회사 단톡방 알림이 밤에 울린다.",
      a:[
        ["확인하고 처리한다",0],
        ["필요한 것만 본다",1],
        ["기분이 바로 가라앉는다",2],
        ["내 밤이 침범당한 기분이다",3]
      ]
    },
    {
      q:"업무 피드백을 받았다.",
      a:[
        ["수정하면 된다고 생각한다",0],
        ["조금 신경 쓰인다",1],
        ["하루 종일 생각난다",2],
        ["내 능력 전체를 의심한다",3]
      ]
    },
    {
      q:"퇴근 10분 전에 일이 생겼다.",
      a:[
        ["처리하고 간다",0],
        ["가능한 만큼 한다",1],
        ["속으로 무너진다",2],
        ["컴퓨터와 눈싸움을 시작한다",3]
      ]
    },
    {
      q:"내 회사생활 방식은?",
      a:[
        ["꽤 안정적이다",0],
        ["그럭저럭 버틴다",1],
        ["자주 방전된다",2],
        ["출근하면 다른 사람이 된다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"💼",
      type:"회사 적응형",
      name:"회사에서도 멘탈이 살아있는 사람",
      desc:"당신은 회사의 기본 압박을 비교적 잘 견딘다. 업무가 생기면 정리하고, 피드백도 일의 일부로 받아들인다. 회사가 편한 곳은 아니지만, 적어도 하루 전체를 빼앗기지는 않는 사람이다.",
      traits:["업무 정리가 빠른 편","피드백을 비교적 담담히 받음","회사 스트레스 회복이 빠름","출근 후에도 자기 페이스가 있음"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"현실 버티기형",
      name:"힘들지만 월급 생각하며 버티는 사람",
      desc:"당신은 회사가 쉽지 않다는 걸 알지만, 매일 어떻게든 하루를 넘긴다. 짜증나는 순간도 있고 피곤한 날도 있지만, 무너질 만큼은 아니다. 회사생활 생존 기술을 조금씩 익힌 타입이다.",
      traits:["힘들어도 버티는 편","업무 스트레스를 어느 정도 조절함","퇴근 후 회복이 필요함","현실 감각이 강함"]
    },
    {
      min:12,
      max:17,
      icon:"😵‍💫",
      type:"출근 방전형",
      name:"회사에 에너지를 두고 오는 사람",
      desc:"당신은 회사에서 꽤 많은 에너지를 쓴다. 회의, 단톡방, 갑작스러운 업무, 애매한 인간관계가 하루를 빠르게 소모시킨다. 퇴근하면 쉬는 게 아니라 충전부터 필요한 사람이다.",
      traits:["회사 인간관계에 쉽게 지침","갑작스러운 업무에 스트레스가 큼","퇴근 후 말수가 줄어듦","혼자 회복하는 시간이 필요함"]
    },
    {
      min:18,
      max:24,
      icon:"🫠",
      type:"회사생활 연명형",
      name:"출근하면 자아가 분리되는 사람",
      desc:"당신은 회사에서 거의 다른 사람으로 산다. 괜찮은 척하고, 이해한 척하고, 버틸 수 있는 척하지만 속에서는 이미 여러 번 퇴사했다. 월급과 책임감이 당신을 매일 책상 앞에 앉힌다.",
      traits:["출근 전부터 피곤함","회사 단톡방에 예민함","퇴근 후 완전 방전됨","마음속 퇴사가 자주 열림"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
