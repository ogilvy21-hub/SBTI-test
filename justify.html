        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">자기합리화력</h1>
    <p class="sub">나는 얼마나 내 선택에 그럴듯한 이유를 붙이는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"돈을 쓰고 나서 후회가 밀려왔다.",
      a:[
        ["그냥 후회한다",0],
        ["조금 이유를 찾는다",1],
        ["꽤 그럴듯하게 포장한다",2],
        ["이건 미래의 나를 위한 투자다",3]
      ]
    },
    {
      q:"해야 할 일을 미뤘다.",
      a:[
        ["그냥 미룬 거다",0],
        ["조금 피곤했다고 생각한다",1],
        ["타이밍이 아니었다고 믿는다",2],
        ["오히려 숙성의 시간이었다",3]
      ]
    },
    {
      q:"괜히 예민하게 반응했다.",
      a:[
        ["내가 좀 예민했다",0],
        ["상대도 조금 문제였다",1],
        ["그 상황이면 누구나 그랬다",2],
        ["나는 선을 지킨 사람이다",3]
      ]
    },
    {
      q:"계획과 다른 선택을 했다.",
      a:[
        ["그냥 바꿨다",0],
        ["그럴 수도 있다고 본다",1],
        ["더 나은 선택이었다고 생각한다",2],
        ["원래 내 무의식은 이걸 알고 있었다",3]
      ]
    },
    {
      q:"충동적으로 뭔가를 샀다.",
      a:[
        ["충동구매 맞다",0],
        ["조금 필요하긴 했다",1],
        ["언젠가 쓸 물건이었다",2],
        ["안 샀으면 오히려 손해였다",3]
      ]
    },
    {
      q:"약속 시간에 늦었다.",
      a:[
        ["내가 늦었다",0],
        ["교통이 좀 문제였다",1],
        ["상황이 나를 늦게 만들었다",2],
        ["정확히 도착하면 너무 딱딱하다",3]
      ]
    },
    {
      q:"실수한 뒤 마음속 첫 반응은?",
      a:[
        ["아, 내가 실수했다",0],
        ["그래도 큰일은 아니다",1],
        ["이건 누구나 할 수 있다",2],
        ["이 실수에도 의미가 있다",3]
      ]
    },
    {
      q:"내 선택을 누가 지적했다.",
      a:[
        ["들어보고 인정한다",0],
        ["조금 방어하게 된다",1],
        ["속으로 반박문을 쓴다",2],
        ["내 인생을 제일 잘 아는 건 나다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"합리화 입문형",
      name:"그냥 인정하고 눕는 사람",
      desc:"당신은 자기합리화를 오래 끌고 가지 않는다. 실수하면 실수했다고 보고, 후회하면 후회한다고 인정한다. 덕분에 마음은 빨리 정리되는 편이다. 가끔은 너무 빨리 인정해서 스스로를 조금 심심하게 만들기도 한다.",
      traits:["핑계보다 인정이 빠름","후회해도 오래 포장하지 않음","실수 앞에서 비교적 담백함","마음 정리가 빠른 편"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"생활형 합리화러",
      name:"이유 하나쯤은 챙기는 사람",
      desc:"당신은 무리한 포장은 하지 않지만, 마음이 다치지 않을 정도의 이유는 챙긴다. 늦은 데는 이유가 있고, 산 데도 이유가 있고, 미룬 데도 나름의 사정이 있다. 스스로를 너무 몰아붙이지 않는 현실적인 타입이다.",
      traits:["적당히 나를 보호함","핑계와 사정의 경계를 잘 탐","후회해도 회복이 빠름","일상형 자기방어에 능함"]
    },
    {
      min:12,
      max:17,
      icon:"🤔",
      type:"논리 장인형",
      name:"세상 모든 일에 사연 붙이는 사람",
      desc:"당신은 선택 하나에도 서사가 있다. 그냥 산 게 아니라 필요해서 산 것이고, 그냥 미룬 게 아니라 더 좋은 결과를 위한 대기였다. 주변에서는 핑계라고 해도 당신 머릿속에서는 이미 꽤 그럴듯한 보고서가 완성된다.",
      traits:["반박문이 머릿속에서 자동 생성됨","실수에도 의미를 부여함","충동도 전략처럼 포장함","내 선택을 쉽게 버리지 않음"]
    },
    {
      min:18,
      max:24,
      icon:"😎",
      type:"세계관 완성형",
      name:"내가 하면 다 이유가 있는 사람",
      desc:"당신의 자기합리화는 거의 세계관에 가깝다. 남이 하면 핑계인데 내가 하면 맥락이고, 남이 미루면 게으름인데 내가 미루면 타이밍 조절이다. 가끔은 스스로도 웃기지만, 그 덕분에 오늘도 멘탈은 무사히 살아남는다.",
      traits:["모든 선택에 철학이 생김","불리한 상황도 내 편으로 해석함","후회보다 해석이 먼저 나옴","멘탈 방어력이 은근히 강함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
