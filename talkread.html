        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">카톡해석력</h1>
    <p class="sub">나는 짧은 답장 하나에 얼마나 많은 뜻을 찾는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"상대가 'ㅇㅇ'만 보냈다.",
      a:[
        ["그냥 알겠다는 뜻이다",0],
        ["조금 성의 없어 보인다",1],
        ["기분이 별로인가 싶다",2],
        ["대화 종료 통보처럼 느껴진다",3]
      ]
    },
    {
      q:"평소보다 답장이 짧아졌다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 신경 쓰인다",1],
        ["내가 뭘 잘못했나 본다",2],
        ["이미 관계 변화 분석에 들어간다",3]
      ]
    },
    {
      q:"상대가 이모티콘 없이 답했다.",
      a:[
        ["별생각 없다",0],
        ["조금 건조해 보인다",1],
        ["기분이 안 좋은가 싶다",2],
        ["온도 차이가 확 느껴진다",3]
      ]
    },
    {
      q:"읽고 한참 뒤에 답장이 왔다.",
      a:[
        ["바빴나 보다 한다",0],
        ["조금 늦었다고 느낀다",1],
        ["답장 텀의 의미를 생각한다",2],
        ["그 사이 무슨 일이 있었는지 추리한다",3]
      ]
    },
    {
      q:"상대가 'ㅋㅋ'를 하나만 보냈다.",
      a:[
        ["웃겼나 보다 한다",0],
        ["약간 애매하다",1],
        ["진짜 웃은 건 아닌 것 같다",2],
        ["대화가 식었다고 판단한다",3]
      ]
    },
    {
      q:"내 메시지에는 반응이 짧고 다른 사람에게는 길다.",
      a:[
        ["그럴 수도 있다",0],
        ["살짝 비교된다",1],
        ["나한테만 다른가 싶다",2],
        ["마음속 비교표가 열린다",3]
      ]
    },
    {
      q:"상대가 갑자기 존댓말을 썼다.",
      a:[
        ["그냥 말투가 바뀐 거다",0],
        ["조금 어색하다",1],
        ["거리 두나 싶다",2],
        ["관계 온도가 내려간 것 같다",3]
      ]
    },
    {
      q:"내 카톡 해석 습관은?",
      a:[
        ["있는 그대로 본다",0],
        ["가끔 의미를 본다",1],
        ["말투와 텀을 꽤 본다",2],
        ["카톡 하나로 심리극을 쓴다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"문자 그대로형",
      name:"카톡을 카톡으로만 보는 사람",
      desc:"당신은 짧은 답장에 큰 의미를 붙이지 않는다. 'ㅇㅇ'은 알겠다는 말이고, 답장이 늦으면 바빴던 일이다. 대화의 온도를 과하게 재지 않아서 마음이 비교적 편한 편이다.",
      traits:["답장을 있는 그대로 봄","말투 변화에 크게 흔들리지 않음","답장 텀을 과하게 해석하지 않음","대화 후유증이 적은 편"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"가벼운 감지형",
      name:"말투 온도는 살짝 보는 사람",
      desc:"당신은 카톡을 완전히 문자 그대로만 보지는 않는다. 평소보다 짧거나 건조하면 조금 신경 쓰지만, 금방 다른 가능성도 생각한다. 해석은 하지만 마음을 오래 묶어두지는 않는 타입이다.",
      traits:["말투 변화를 조금 느낌","답장 텀에 살짝 민감함","그래도 현실적으로 넘김","과한 추리는 피하려고 함"]
    },
    {
      min:12,
      max:17,
      icon:"🧐",
      type:"대화 분석형",
      name:"짧은 답장에도 온도계 대는 사람",
      desc:"당신은 답장의 길이, 말투, 이모티콘, 텀을 꽤 세심하게 본다. 별일 아닐 수도 있다는 걸 알지만, 마음은 이미 작은 신호들을 모아 해석하고 있다. 카톡창 하나가 가끔 감정 분석지가 된다.",
      traits:["말투와 텀을 자주 비교함","짧은 답장에 신경이 감","이모티콘 유무를 느낌","상대 기분을 추리하는 편"]
    },
    {
      min:18,
      max:24,
      icon:"🔍",
      type:"카톡 수사대형",
      name:"ㅇㅇ 하나로 관계사 쓰는 사람",
      desc:"당신은 짧은 답장 하나에서도 많은 걸 읽어낸다. 답장 시간, 문장 길이, 이모티콘 개수, 평소와 다른 말투가 모두 자료가 된다. 문제는 상대는 그냥 보냈는데 당신 마음속에서는 이미 장편 해석본이 완성된다는 점이다.",
      traits:["답장 하나에 의미를 크게 둠","상대 말투 변화에 민감함","혼자 관계 온도를 측정함","카톡창을 오래 들여다봄"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
