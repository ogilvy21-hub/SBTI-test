<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">감사력</h1>
    <p class="sub">나는 작은 일에도 얼마나 고마움을 느끼는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"누가 문을 잡아줬다.",
      a:[
        ["그냥 지나간다",0],
        ["가볍게 고맙다고 한다",1],
        ["기분이 좋아진다",2],
        ["하루가 조금 따뜻해진다",3]
      ]
    },
    {
      q:"친구가 내 말을 기억해줬다.",
      a:[
        ["그럴 수 있다",0],
        ["고맙다",1],
        ["괜히 감동이다",2],
        ["그 사람을 더 소중하게 느낀다",3]
      ]
    },
    {
      q:"작은 도움을 받았다.",
      a:[
        ["당연하게 넘긴다",0],
        ["고맙다고 말한다",1],
        ["마음에 남는다",2],
        ["나중에 꼭 갚고 싶어진다",3]
      ]
    },
    {
      q:"힘든 날 누가 안부를 물었다.",
      a:[
        ["별생각 없다",0],
        ["고맙긴 하다",1],
        ["마음이 조금 풀린다",2],
        ["그 한마디가 오래 남는다",3]
      ]
    },
    {
      q:"식당 직원이 친절했다.",
      a:[
        ["그냥 서비스라고 생각한다",0],
        ["기분 좋다",1],
        ["괜히 감사하다",2],
        ["그 가게 이미지가 좋아진다",3]
      ]
    },
    {
      q:"누가 내 작은 변화를 알아봤다.",
      a:[
        ["그냥 그런가 보다 한다",0],
        ["기분은 좋다",1],
        ["고맙고 반갑다",2],
        ["내가 보인 느낌이라 오래 기억한다",3]
      ]
    },
    {
      q:"하루가 별일 없이 지나갔다.",
      a:[
        ["그냥 하루다",0],
        ["나쁘지 않았다",1],
        ["무사해서 다행이다",2],
        ["이런 평범함도 고맙다고 느낀다",3]
      ]
    },
    {
      q:"내 감사 표현은 보통?",
      a:[
        ["잘 안 하는 편이다",0],
        ["필요할 때 한다",1],
        ["자주 하는 편이다",2],
        ["고마움이 생기면 꼭 표현하고 싶다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"😐",
      type:"담백 반응형",
      name:"고마움도 조용히 지나가는 사람",
      desc:"당신은 작은 일에 크게 감정이 움직이는 편은 아니다. 도움을 받아도 당황하지 않고 담담하게 받아들인다. 고마움이 없는 게 아니라 표현이 크지 않고, 마음 안에서 짧게 정리되는 사람이다.",
      traits:["감정 표현이 담백함","작은 친절에 크게 흔들리지 않음","고마움을 조용히 받아들임","표현보다 행동이 편함"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"기본 감사형",
      name:"고마우면 말은 하는 사람",
      desc:"당신은 고마운 일이 생기면 적당히 표현할 줄 안다. 작은 친절에 기분이 좋아지고, 도움을 받으면 고맙다고 말한다. 과하게 감동하지는 않아도 관계 안의 따뜻함을 놓치지는 않는다.",
      traits:["고마움을 표현할 줄 앎","친절을 기분 좋게 받아들임","관계 예의를 중요하게 생각함","감사 표현이 자연스러움"]
    },
    {
      min:12,
      max:17,
      icon:"☺️",
      type:"따뜻한 기억형",
      name:"작은 친절도 오래 기억하는 사람",
      desc:"당신은 작은 도움과 다정한 말을 마음에 잘 담아둔다. 누가 나를 기억해주거나 챙겨주면 그 장면이 오래 남는다. 고마움을 느끼는 감각이 살아 있어서 사람 사이의 온기를 잘 발견한다.",
      traits:["작은 도움을 오래 기억함","안부와 배려에 쉽게 감동함","고마움을 자주 표현함","사람의 다정함을 잘 알아봄"]
    },
    {
      min:18,
      max:24,
      icon:"🌷",
      type:"감사 과몰입형",
      name:"문 잡아줘도 마음속 꽃다발 주는 사람",
      desc:"당신은 작은 친절에도 마음이 따뜻하게 반응한다. 누군가의 말 한마디, 배려 하나, 평범한 하루까지 고맙게 느낄 때가 많다. 세상을 조금 더 부드럽게 보는 능력이 있는 사람이다.",
      traits:["작은 친절에도 크게 감동함","평범한 하루에도 의미를 느낌","고마움을 꼭 표현하고 싶어함","사람의 좋은 면을 잘 발견함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
