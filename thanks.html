<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
  --color-background-primary:#fff;--color-background-secondary:#f5f5f5;--color-background-danger:#fff1f2;
  --color-text-primary:#111;--color-text-secondary:#555;--color-text-tertiary:#888;--color-text-danger:#e11d48;
  --color-border-primary:#222;--color-border-secondary:#d9d9d9;--color-border-tertiary:#e5e5e5;--color-border-danger:#f43f5e;
  --border-radius-lg:16px;--border-radius-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f3f3f3}
#app{max-width:560px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}.screen.active{display:block}
.tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--color-background-danger);color:var(--color-text-danger);margin-bottom:1rem}
h1{font-size:28px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-bottom:.75rem}
.sub{font-size:15px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1.5rem}
.start-btn{width:100%;padding:14px;border-radius:var(--border-radius-lg);border:1.5px solid var(--color-border-primary);background:var(--color-background-primary);font-size:16px;font-weight:500;color:var(--color-text-primary);cursor:pointer}
.start-btn:hover{background:var(--color-background-secondary)}
.prog-wrap{margin-bottom:1.5rem}.prog-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-bottom:.5rem}.prog-fill{height:100%;background:var(--color-text-danger);border-radius:2px;transition:width .3s ease}.prog-label{font-size:12px;color:var(--color-text-tertiary)}
.q-num{font-size:12px;font-weight:500;color:var(--color-text-danger);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem}
.q-text{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.5;margin-bottom:1.25rem}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:14px 16px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:14px;color:var(--color-text-primary);cursor:pointer;text-align:left;line-height:1.5}
.choice:hover,.choice.selected{border-color:var(--color-border-danger);background:var(--color-background-danger);color:var(--color-text-danger)}
.nav-row{display:flex;gap:8px;margin-top:1.25rem}
.nav-btn{flex:1;padding:12px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;font-weight:500;color:var(--color-text-secondary);cursor:pointer}
.nav-btn.next{border-color:var(--color-border-danger);color:var(--color-text-danger)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.result-icon{font-size:48px;margin-bottom:1rem;display:block;text-align:center}
.result-type{font-size:13px;font-weight:500;color:var(--color-text-danger);text-align:center;margin-bottom:.4rem;letter-spacing:.06em}
.result-name{font-size:26px;font-weight:500;color:var(--color-text-primary);text-align:center;margin-bottom:1rem}
.score-bar-wrap{background:var(--color-background-secondary);border-radius:4px;height:8px;margin-bottom:1.5rem;overflow:hidden}
.score-bar-fill{height:100%;background:var(--color-text-danger);border-radius:4px;transition:width 1s ease}
.result-desc{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;font-size:14px;color:var(--color-text-secondary);line-height:1.7;margin-bottom:1.5rem}
.traits{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.trait{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-secondary)}
.trait strong{display:block;font-size:12px;color:var(--color-text-tertiary);font-weight:400;margin-bottom:2px}
.retry-btn{width:100%;padding:13px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;font-weight:500;color:var(--color-text-secondary);cursor:pointer}
.divider{height:.5px;background:var(--color-border-tertiary);margin:1.25rem 0}
.home-link{display:inline-block;margin-top:1rem;font-size:13px;color:var(--color-text-tertiary);text-decoration:none}
.adsense-inpost-bottom{margin:24px 0 8px;}
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;left:-9999px">감사력 테스트 — 나는 얼마나 작은 일에도 감사하는 사람일까?</h2>

  <div id="intro" class="screen active">
    <div class="tag">SBTI 감사력 테스트</div>
    <h1>나는 과연<br>얼마나 감사가 많은 사람일까?</h1>
    <p class="sub">8가지 상황에서 당신의 반응을 선택하면<br>당신의 감사력 유형을 알려드립니다.</p>
    <div class="divider"></div>
    <button class="start-btn" onclick="startQuiz()">테스트 시작하기</button>
    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </div>

  <div id="quiz" class="screen">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
      <div class="prog-label" id="prog-label">1 / 8</div>
    </div>
    <div class="q-num" id="q-num">Q 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="prevQ()" disabled>이전</button>
      <button class="nav-btn next" id="next-btn" onclick="nextQ()" disabled>다음</button>
    </div>
  </div>

  <div id="result" class="screen">
    <span class="result-icon" id="r-icon"></span>
    <div class="result-type" id="r-type"></div>
    <div class="result-name" id="r-name"></div>
    <div class="score-bar-wrap"><div class="score-bar-fill" id="r-bar" style="width:0%"></div></div>
    <div class="result-desc" id="r-desc"></div>
    <div class="traits" id="r-traits"></div>
    <button class="retry-btn" onclick="restart()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle" style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </div>
</div>

<script>
const qs=[
  {q:"누군가 작은 도움을 줬다.",c:["당연한 일이라 생각한다.","고맙다고 말은 한다.","꽤 고맙게 느낀다.","작은 도움도 오래 기억한다."]},
  {q:"하루가 큰 문제 없이 지나갔다.",c:["그냥 평범한 하루다.","나쁘지 않았다고 생각한다.","무탈해서 다행이라 느낀다.","이 정도면 꽤 감사한 하루라고 생각한다."]},
  {q:"식당에서 직원이 친절하게 대해줬다.",c:["서비스니까 자연스럽다.","기분은 좋다.","고마운 마음이 든다.","괜히 하루가 따뜻해진다."]},
  {q:"친구가 내 이야기를 오래 들어줬다.",c:["친구니까 그럴 수 있다.","고맙다고 느낀다.","꽤 큰 위로가 된다.","이런 사람이 곁에 있다는 게 감사하다."]},
  {q:"예상보다 일이 조금 잘 풀렸다.",c:["운이 좋았네 한다.","다행이라고 생각한다.","감사한 마음이 든다.","작은 행운도 크게 느낀다."]},
  {q:"몸이 아프지 않고 평소처럼 움직이는 날",c:["당연한 일이다.","가끔 다행이라 느낀다.","건강이 소중하다고 생각한다.","평범하게 움직이는 것 자체가 감사하다."]},
  {q:"누군가 나를 기억하고 챙겨줬다.",c:["그럴 수도 있지 싶다.","고맙긴 하다.","마음이 따뜻해진다.","그 마음이 오래 남는다."]},
  {q:"힘든 날에도 작은 좋은 일이 있었다.",c:["그 정도로는 위로가 안 된다.","조금은 낫다.","작은 좋은 일에 마음이 풀린다.","그 작은 일 때문에 버틸 힘이 생긴다."]},
];

const results=[
  {min:0,max:6,icon:"🪨",type:"무덤덤 현실형",name:"감사 표현이 적은 사람",desc:"고마움을 못 느끼는 건 아니지만, 작은 일에 크게 의미를 두는 편은 아닙니다. 현실적이고 담담한 타입이라 감정보다 상황 판단이 먼저 나옵니다.",traits:["담담한 편","현실 중심","표현 적음","큰 일에 반응"]},
  {min:7,max:12,icon:"🙂",type:"보통 감사형",name:"고마우면 고맙다고 하는 사람",desc:"감사한 순간을 느끼고 표현할 줄 아는 타입입니다. 과하게 감동하지는 않지만, 필요한 순간에는 따뜻한 반응을 보입니다.",traits:["균형감 있음","표현 가능","무난한 감사력","현실적 따뜻함"]},
  {min:13,max:18,icon:"🌷",type:"따뜻한 감사형",name:"작은 일도 소중히 여기는 사람",desc:"작은 배려와 평범한 하루에서도 고마움을 잘 발견하는 타입입니다. 주변 사람의 마음을 잘 알아차리고, 그 마음을 오래 간직하는 편입니다.",traits:["작은 배려 감지","마음이 따뜻함","기억 오래 함","표현도 잘함"]},
  {min:19,max:24,icon:"🙏",type:"감사 MAX형",name:"뭐든 감사한 사람",desc:"작은 일상, 사소한 친절, 우연히 잘 풀린 일까지 감사하게 받아들이는 타입입니다. 긍정 에너지가 크고, 주변에도 따뜻한 영향을 주기 쉽습니다.",traits:["감사 빈도 높음","긍정 에너지 큼","작은 행운도 느낌","따뜻한 영향력"]},
];

let cur=0,scores=Array(qs.length).fill(-1);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){cur=0;scores=Array(qs.length).fill(-1);renderQ();show('quiz')}
function renderQ(){
  const q=qs[cur];
  document.getElementById('prog').style.width=((cur+1)/qs.length*100)+'%';
  document.getElementById('prog-label').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('q-num').textContent='Q '+(cur+1);
  document.getElementById('q-text').textContent=q.q;
  const ch=document.getElementById('choices');ch.innerHTML='';
  q.c.forEach((c,i)=>{const btn=document.createElement('button');btn.className='choice'+(scores[cur]===i?' selected':'');btn.textContent=c;btn.onclick=()=>pick(i);ch.appendChild(btn)});
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=scores[cur]===-1;
  document.getElementById('next-btn').textContent=cur===qs.length-1?'결과 보기':'다음';
}
function pick(i){scores[cur]=i;document.querySelectorAll('.choice').forEach((b,idx)=>b.classList.toggle('selected',idx===i));document.getElementById('next-btn').disabled=false}
function prevQ(){if(cur>0){cur--;renderQ()}}
function nextQ(){if(scores[cur]===-1)return;if(cur<qs.length-1){cur++;renderQ()}else{showResult()}}
function showResult(){
  const total=scores.reduce((a,b)=>a+b,0);
  const r=results.find(x=>total>=x.min&&total<=x.max);
  document.getElementById('r-icon').textContent=r.icon;
  document.getElementById('r-type').textContent=r.type;
  document.getElementById('r-name').textContent=r.name;
  document.getElementById('r-desc').textContent=r.desc;
  document.getElementById('r-traits').innerHTML=r.traits.map(t=>`<div class="trait"><strong>특징</strong>${t}</div>`).join('');
  show('result');
  setTimeout(()=>{document.getElementById('r-bar').style.width=Math.round(total/24*100)+'%'},100);
}
function restart(){cur=0;scores=Array(qs.length).fill(-1);document.getElementById('r-bar').style.width='0%';show('intro')}
</script>
