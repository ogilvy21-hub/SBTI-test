<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6295549457389423"
        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">인정중독력</h1>
    <p class="sub">나는 남의 반응에 얼마나 쉽게 마음이 흔들리는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"내가 한 일에 반응이 없다.",
      a:[
        ["크게 신경 안 쓴다",0],
        ["조금 아쉽다",1],
        ["괜히 마음이 쓰인다",2],
        ["내가 뭘 잘못했나 싶다",3]
      ]
    },
    {
      q:"누가 내 의견에 고개를 끄덕였다.",
      a:[
        ["그냥 지나간다",0],
        ["조금 기분 좋다",1],
        ["더 말하고 싶어진다",2],
        ["오늘 나 꽤 괜찮은 사람 같다",3]
      ]
    },
    {
      q:"단톡방에서 내 말에 답이 없다.",
      a:[
        ["바쁜가 보다 한다",0],
        ["조금 민망하다",1],
        ["내 말을 다시 읽어본다",2],
        ["방금 사회적으로 사망한 것 같다",3]
      ]
    },
    {
      q:"사람들이 나를 어떻게 볼지 생각한다.",
      a:[
        ["거의 안 한다",0],
        ["가끔 생각한다",1],
        ["꽤 자주 신경 쓴다",2],
        ["내 머릿속에 평가단이 산다",3]
      ]
    },
    {
      q:"칭찬을 받으면 행동이 달라진다.",
      a:[
        ["크게 달라지진 않는다",0],
        ["조금 힘이 난다",1],
        ["더 잘하고 싶어진다",2],
        ["그 방향으로 인생을 틀 수도 있다",3]
      ]
    },
    {
      q:"누가 무심하게 비판했다.",
      a:[
        ["필요한 말만 듣는다",0],
        ["살짝 기분이 가라앉는다",1],
        ["한동안 신경 쓰인다",2],
        ["그 말이 머릿속에 입주한다",3]
      ]
    },
    {
      q:"SNS에 올린 글 반응이 적다.",
      a:[
        ["그럴 수도 있다",0],
        ["살짝 아쉽다",1],
        ["조회수나 좋아요를 다시 본다",2],
        ["삭제할까 진지하게 고민한다",3]
      ]
    },
    {
      q:"내 인정 욕구는?",
      a:[
        ["큰 편은 아니다",0],
        ["가끔 신경 쓰인다",1],
        ["꽤 많이 흔들린다",2],
        ["남의 반응이 내 날씨를 바꾼다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🪨",
      type:"자기기준형",
      name:"남의 반응에 크게 흔들리지 않는 사람",
      desc:"당신은 인정받으면 좋지만, 그 반응에 오래 매달리지는 않는다. 누가 알아주지 않아도 내 기준이 크게 무너지지 않는다. 차갑다기보다 중심이 비교적 안쪽에 있는 사람이다.",
      traits:["남의 평가에 덜 흔들림","자기 기준이 분명함","반응이 없어도 크게 무너지지 않음","비판을 비교적 담담히 봄"]
    },
    {
      min:6,
      max:11,
      icon:"🙂",
      type:"가벼운 인정형",
      name:"좋은 반응이면 기분 좋아지는 사람",
      desc:"당신은 사람들의 반응에 어느 정도 영향을 받는다. 칭찬을 들으면 힘이 나고, 무반응이면 살짝 아쉽다. 그래도 남의 평가가 하루 전체를 완전히 흔들 정도는 아니다.",
      traits:["칭찬에 기분이 좋아짐","무반응에 조금 아쉬움","비판은 잠깐 신경 씀","다시 자기 페이스를 찾음"]
    },
    {
      min:12,
      max:17,
      icon:"👀",
      type:"반응 확인형",
      name:"남의 표정을 자꾸 스캔하는 사람",
      desc:"당신은 내가 어떻게 보이는지 자주 살핀다. 말한 뒤 반응을 보고, 올린 뒤 숫자를 보고, 분위기를 보며 내 위치를 확인한다. 인정이 부족하면 마음이 쉽게 허전해지는 편이다.",
      traits:["반응을 자주 확인함","말한 뒤 분위기를 살핌","비판에 오래 신경 씀","인정받으면 의욕이 크게 생김"]
    },
    {
      min:18,
      max:24,
      icon:"📡",
      type:"인정 레이더형",
      name:"남의 반응으로 하루가 정해지는 사람",
      desc:"당신은 사람들의 시선과 반응에 민감하게 흔들린다. 칭찬 한마디에 살아나고, 무심한 침묵 하나에 가라앉는다. 머리로는 괜찮다고 생각해도 마음은 이미 주변 반응을 실시간으로 수신 중이다.",
      traits:["인정 욕구가 강함","무반응에 크게 흔들림","비판을 오래 곱씹음","남의 평가가 기분을 좌우함"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
