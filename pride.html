        crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
    background:#f3f3f3;
    color:#222;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .title{
    font-size:28px;
    font-weight:800;
    line-height:1.25;
    margin:0 0 10px;
  }
  .sub{
    font-size:16px;
    color:#555;
    line-height:1.6;
    margin:0 0 20px;
  }
  .badge{
    display:inline-block;
    margin-bottom:12px;
    padding:6px 10px;
    border-radius:999px;
    background:#ffe8ef;
    color:#d94b73;
    font-size:13px;
    font-weight:700;
  }
  button{
    width:100%;
    border:0;
    border-radius:16px;
    padding:15px 16px;
    font-size:16px;
    font-weight:700;
    background:#ff8fab;
    color:#fff;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}
  .choice{
    display:block;
    width:100%;
    margin-top:10px;
    padding:15px 14px;
    border:1px solid #e2e2e2;
    border-radius:16px;
    background:#fff;
    color:#333;
    text-align:left;
    font-size:15px;
    font-weight:600;
  }
  .choice:hover{
    background:#fff3f7;
    border-color:#ffb6c9;
  }
  .progress{
    width:100%;
    height:10px;
    background:#e9e9e9;
    border-radius:999px;
    overflow:hidden;
    margin:18px 0 20px;
  }
  .bar{
    width:0%;
    height:100%;
    background:#ff8fab;
    border-radius:999px;
    transition:.25s;
  }
  .qnum{
    font-size:13px;
    color:#999;
    font-weight:700;
    margin-bottom:8px;
  }
  .question{
    font-size:22px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:18px;
  }
  .result-icon{
    font-size:48px;
    margin-bottom:10px;
  }
  .result-type{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    background:#f1f1f1;
    color:#777;
    font-size:13px;
    font-weight:800;
    margin-bottom:10px;
  }
  .result-name{
    font-size:27px;
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .result-desc{
    font-size:16px;
    color:#444;
    line-height:1.7;
    margin-bottom:18px;
  }
  .traits{
    display:grid;
    gap:8px;
    margin:18px 0 22px;
  }
  .trait{
    background:#fff4f7;
    border-radius:14px;
    padding:12px 13px;
    font-size:14px;
    color:#444;
    font-weight:700;
  }
  .share{
    background:#222;
    margin-top:8px;
  }
  .restart{
    background:#aaa;
    margin-top:8px;
  }
  .hidden{display:none}
  .adsense-inpost-bottom{
    margin:24px 0 8px;
  }
  .home-link{
    display:inline-block;
    margin-top:1rem;
    font-size:13px;
    color:#888;
    text-decoration:none;
  }
</style>

<div class="wrap">
  <section id="intro" class="card">
    <div class="badge">SBTI테스트</div>
    <h1 class="title">자존심력</h1>
    <p class="sub">나는 자존심 때문에 얼마나 쉽게 먼저 못 움직이는 사람일까?</p>
    <button onclick="startQuiz()">테스트 시작하기</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="qnum" id="qnum"></div>
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
    <div class="question" id="question"></div>
    <div id="choices"></div>
  </section>

  <section id="result" class="card hidden">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="traits" id="traits"></div>

    <button class="share" onclick="shareResult()">결과 공유하기</button>
    <button class="restart" onclick="restartQuiz()">다시 테스트하기</button>

    <div class="adsense-slot adsense-inpost-bottom">
      <ins class="adsbygoogle"
           style="display:block; width:100%;"
           data-ad-client="ca-pub-6295549457389423"
           data-ad-slot="4063532035"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <a class="home-link" href="./index.html">← 테스트 모음으로 돌아가기</a>
  </section>
</div>

<script>
  const questions = [
    {
      q:"내가 먼저 연락하고 싶은데 애매하다.",
      a:[
        ["그냥 먼저 한다",0],
        ["조금 고민하다 한다",1],
        ["상대가 먼저 하길 기다린다",2],
        ["하고 싶은데 절대 먼저 못 한다",3]
      ]
    },
    {
      q:"분명 내가 잘못한 상황이다.",
      a:[
        ["바로 사과한다",0],
        ["조금 정리하고 사과한다",1],
        ["타이밍을 계속 본다",2],
        ["미안한데 입이 잘 안 떨어진다",3]
      ]
    },
    {
      q:"상대가 나를 무시한 것 같다.",
      a:[
        ["오해일 수 있다고 본다",0],
        ["조금 신경 쓰인다",1],
        ["말투가 차가워진다",2],
        ["그 순간부터 절대 안 진다",3]
      ]
    },
    {
      q:"싸운 뒤 화해해야 한다.",
      a:[
        ["먼저 풀려고 한다",0],
        ["분위기 보고 말한다",1],
        ["상대 반응을 기다린다",2],
        ["먼저 다가가면 진 것 같다",3]
      ]
    },
    {
      q:"내가 모르는 걸 누가 알려줬다.",
      a:[
        ["고맙게 받아들인다",0],
        ["조금 민망하다",1],
        ["괜히 변명하고 싶다",2],
        ["틀린 사람처럼 보인 게 신경 쓰인다",3]
      ]
    },
    {
      q:"누가 내 약점을 건드렸다.",
      a:[
        ["넘길 수 있다",0],
        ["기분은 조금 상한다",1],
        ["방어적으로 변한다",2],
        ["그 말은 오래 기억한다",3]
      ]
    },
    {
      q:"상대가 먼저 미안하다고 했다.",
      a:[
        ["바로 풀린다",0],
        ["조금 있다 풀린다",1],
        ["그래도 티를 덜 낸다",2],
        ["좋은데 바로 받아주기 싫다",3]
      ]
    },
    {
      q:"내 자존심은 보통?",
      a:[
        ["크게 세지 않다",0],
        ["가끔 올라온다",1],
        ["꽤 자주 버틴다",2],
        ["속마음보다 자존심이 먼저 나온다",3]
      ]
    }
  ];

  const results = [
    {
      min:0,
      max:5,
      icon:"🙂",
      type:"유연 자존형",
      name:"자존심보다 관계가 먼저인 사람",
      desc:"당신은 자존심에 오래 묶이지 않는다. 먼저 연락할 수 있고, 잘못했으면 사과할 수 있다. 자존심이 없는 게 아니라, 관계를 지키는 일이 더 중요할 때를 아는 사람이다.",
      traits:["먼저 다가가는 데 부담이 적음","사과가 비교적 빠름","관계 회복을 중요하게 봄","자존심보다 현실을 먼저 봄"]
    },
    {
      min:6,
      max:11,
      icon:"😌",
      type:"적당 자존형",
      name:"상처는 받지만 풀 줄 아는 사람",
      desc:"당신은 자존심이 아예 없는 사람은 아니다. 무시당했다고 느끼면 기분이 상하고, 먼저 움직이기 전 잠깐 망설인다. 그래도 시간이 지나면 마음을 풀고 관계를 다시 정리할 수 있다.",
      traits:["자존심이 가끔 올라옴","먼저 말하기 전 고민함","그래도 화해할 줄 앎","상처받아도 오래 버티진 않음"]
    },
    {
      min:12,
      max:17,
      icon:"😐",
      type:"자존심 대기형",
      name:"미안한데 먼저 말은 잘 못 하는 사람",
      desc:"당신은 마음속으로는 풀고 싶어도 쉽게 먼저 움직이지 못한다. 사과하고 싶어도 타이밍을 보고, 연락하고 싶어도 상대 반응을 기다린다. 자존심이 감정을 막아서는 일이 꽤 자주 있다.",
      traits:["먼저 연락을 망설임","사과 타이밍을 오래 봄","무시당했다는 느낌에 민감함","속마음보다 태도가 늦게 풀림"]
    },
    {
      min:18,
      max:24,
      icon:"🧱",
      type:"자존심 철벽형",
      name:"마음은 가는데 몸은 절대 안 가는 사람",
      desc:"당신은 자존심이 마음의 문 앞에 오래 서 있다. 먼저 다가가고 싶어도 지는 느낌이 들고, 풀고 싶어도 바로 받아주기 어렵다. 사실 속은 여린데 겉으로는 쉽게 무너지지 않는 사람이다.",
      traits:["먼저 움직이는 게 어렵다","사과보다 침묵이 먼저 나옴","무시당한 기억을 오래 잡음","마음과 태도가 자주 따로 감"]
    }
  ];

  let current = 0;
  let score = 0;
  let finalResult = null;
  let finalResultIndex = null;

  function startQuiz(){
    history.replaceState(null, "", location.pathname);
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
  }

  function showQuestion(){
    const q = questions[current];
    document.getElementById("qnum").innerText = `${current + 1} / ${questions.length}`;
    document.getElementById("bar").style.width = `${((current) / questions.length) * 100}%`;
    document.getElementById("question").innerText = q.q;

    const choices = document.getElementById("choices");
    choices.innerHTML = "";

    q.a.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerText = item[0];
      btn.onclick = () => selectAnswer(item[1]);
      choices.appendChild(btn);
    });
  }

  function selectAnswer(point){
    score += point;
    current++;

    if(current < questions.length){
      showQuestion();
    }else{
      showResult();
    }
  }

  function showResult(){
    document.getElementById("bar").style.width = "100%";
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    finalResultIndex = results.findIndex(r => score >= r.min && score <= r.max);
    finalResult = results[finalResultIndex];

    renderResult(finalResult);
  }

  function renderResult(resultData){
    document.getElementById("resultIcon").innerText = resultData.icon;
    document.getElementById("resultType").innerText = resultData.type;
    document.getElementById("resultName").innerText = resultData.name;
    document.getElementById("resultDesc").innerText = resultData.desc;

    const traits = document.getElementById("traits");
    traits.innerHTML = "";

    resultData.traits.forEach(t => {
      const div = document.createElement("div");
      div.className = "trait";
      div.innerText = t;
      traits.appendChild(div);
    });
  }

  function openSharedResult(){
    const params = new URLSearchParams(location.search);
    const resultParam = params.get("r");

    if(resultParam === null) return;

    const index = Number(resultParam);

    if(Number.isNaN(index) || !results[index]) return;

    finalResultIndex = index;
    finalResult = results[index];

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    renderResult(finalResult);
  }

  function restartQuiz(){
    current = 0;
    score = 0;
    finalResult = null;
    finalResultIndex = null;

    history.replaceState(null, "", location.pathname);

    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("intro").classList.remove("hidden");
  }

  function shareResult(){
    const testName = document.querySelector(".title")?.innerText || "SBTI";
    const pageUrl = `${location.origin}${location.pathname}?r=${finalResultIndex}`;

    const shareText =
`SBTI ${testName} 테스트 결과: ${finalResult.name}

나도 테스트 해보기
${pageUrl}`;

    if(navigator.share){
      navigator.share({
        title:`SBTI ${testName} 테스트`,
        text:shareText
      });
    }else{
      navigator.clipboard.writeText(shareText);
      alert("결과가 복사됐습니다. 카톡이나 SNS에 붙여넣어 주세요.");
    }
  }

  window.addEventListener("DOMContentLoaded", openSharedResult);
</script>
